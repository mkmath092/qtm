function parseCSV(text){
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){ cell+='"'; i++; } else q=false; } else cell+=c; }
    else { if(c==='"') q=true; else if(c===','){ row.push(cell); cell=""; } else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=""; } else if(c==='\r'){} else cell+=c; }
  }
  if(cell.length||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(x=>x&&x.trim()!==""));
}

function _mergeArr(key,base,local,remote){
  const idf=ID_ARRAY_KEYS[key];
  if(!idf) return _scalar3(base,local,remote);
  base=base||[]; local=local||[]; remote=remote||[];
  const bm=_idx(base,idf), lm=_idx(local,idf), rm=_idx(remote,idf);
  const ids=new Set([...Object.keys(lm),...Object.keys(rm)]); const out=[];
  for(const id of ids){ const b=bm[id], l=lm[id], r=rm[id];
    if(l&&!r){ if(b&&_eq(b,l)) continue; out.push(l); continue; }   // ?怨?揶쎛 ????& ??롫뮉 域밸챶?嚥???????
    if(!l&&r){ if(b&&_eq(b,r)) continue; out.push(r); continue; }
    out.push(_isObj(l)&&_isObj(r)? _mergeObj(b,l,r) : _scalar3(b,l,r));
  }
  return out;
}
function _mergeObj(base,local,remote){
  base=base||{}; local=local||{}; remote=remote||{};
  const out={}; const keys=new Set([...Object.keys(local),...Object.keys(remote)]);
  for(const k of keys){ const b=base[k], l=local[k], r=remote[k]; const inL=k in local, inR=k in remote;
    if(inL&&!inR){ if((k in base)&&_eq(b,l)) continue; out[k]=l; continue; } // ?怨?揶쎛 ????
    if(!inL&&inR){ if((k in base)&&_eq(b,r)) continue; out[k]=r; continue; }
    if(_isObj(l)&&_isObj(r)) out[k]=_mergeObj(b,l,r);
    else if(Array.isArray(l)&&Array.isArray(r)) out[k]=_mergeArr(k,b,l,r);
    else out[k]=_scalar3(b,l,r);
  }
  return out;
}
function mergeDB(base,local,remote){
  // ????怨뺣굡揶쎛 ??쑴堉??뉕탢????덇문 ?怨쀬뵠?怨? ??곸몵筌?嚥≪뮇類??怨쀪퐨 (癰귣벊??筌욊낱????
  if(!remote || Object.keys(remote).length===0 || !(remote.students&&remote.students.length)) return local;
  if(!local || Object.keys(local).length===0) return remote;
  const merged=_mergeObj(base||{},local,remote);
  merged._v=Math.max(local._v||0, remote._v||0, DB_VERSION);
  return merged;
}

async function driveCreate(token,obj){

  const boundary="eduapp"+Date.now();
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(obj)}\r\n--${boundary}--`;
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    {method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"multipart/related; boundary="+boundary},body});
  if(!r.ok) throw new Error("???뵬 ??밴쉐 ??쎈솭("+r.status+")");

}
async function driveDownload(token,id){

  if(r.status===404) return null;
  if(!r.ok) throw new Error("??쇱뒲嚥≪뮆諭???쎈솭("+r.status+")");
  const t=await r.text(); if(!t) return {};
  try{ return JSON.parse(t); }catch(e){ return {}; }
}
async function driveUpload(token,id,obj){
  const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
    {method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(obj)});
  if(!r.ok) throw new Error("??낆쨮????쎈솭("+r.status+")");
  return true;
}

function studentSort(a,b){
  const clsCmp=String(a.cls||"").localeCompare(String(b.cls||""),undefined,{numeric:true});
  return clsCmp || (Number(a.no)||0)-(Number(b.no)||0) || String(a.name||"").localeCompare(String(b.name||""));
}
function buildStudentIndex(students){
  const byClass={}, byGrade={}, classesByGrade={}, grades=new Set();
  (students||[]).forEach(s=>{
    if(!s) return;
    grades.add(s.grade);
    (byClass[s.cls]=byClass[s.cls]||[]).push(s);
    (byGrade[s.grade]=byGrade[s.grade]||[]).push(s);
    (classesByGrade[s.grade]=classesByGrade[s.grade]||new Set()).add(s.cls);
  });
  Object.values(byClass).forEach(l=>l.sort(studentSort));
  Object.values(byGrade).forEach(l=>l.sort(studentSort));
  const classLists={};
  Object.keys(classesByGrade).forEach(g=>{ classLists[g]=[...classesByGrade[g]].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})); });
  return { all:[...(students||[])].sort(studentSort), byClass, byGrade, classesByGrade:classLists, grades:[...grades].sort((a,b)=>Number(a)-Number(b)) };
}

function MonthCalendar({db,onDayClick}){
  const cal=db.cal||{};
  const today=todayStr();
  const now=new Date();
  const [ym,setYm]=useState({y:now.getFullYear(), m:now.getMonth()}); // m: 0~11

  const first=new Date(ym.y, ym.m, 1);
  const startDow=first.getDay(); // 0=??  const daysInMonth=new Date(ym.y, ym.m+1, 0).getDate();
  // ?? 獄쏄퀣肉?(????뜆萸?+ ?醫롮?)
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const typeColor={off:"#ffd7d2", exam:"#ffe6c2", event:"#cfe2f7"};
  function dateStr(d){ return `${ym.y}-${String(ym.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
  function move(delta){ const nd=new Date(ym.y, ym.m+delta, 1); setYm({y:nd.getFullYear(), m:nd.getMonth()}); }
  function goToday(){ setYm({y:now.getFullYear(), m:now.getMonth()}); }

  const WK=["??,"??,"??,"??,"筌?,"疫?,"??];
  // ??????깆젟 筌뤴뫖以?(??롫뼊 甕곕뗀???
  const monthEvents=[];
  for(let d=1;d<=daysInMonth;d++){ const ev=cal[dateStr(d)]; if(ev) monthEvents.push({d,...ev}); }

  return (
    <div style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 14px",backdropFilter:"blur(2px)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>move(-1)} style={calNavStyle}>??/button>
        <div style={{fontSize:14,fontWeight:700}}>{ym.y}??{ym.m+1}??/div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={goToday} style={{...calNavStyle,width:"auto",padding:"0 10px",fontSize:11}}>??삳뮎</button>
          <button onClick={()=>move(1)} style={calNavStyle}>??/button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {WK.map((w,i)=>(
          <div key={w} style={{textAlign:"center",fontSize:10.5,fontWeight:600,opacity:.75,padding:"2px 0",color:i===0?"#ffd0c8":i===6?"#cfe0f5":"#fff"}}>{w}</div>
        ))}
        {cells.map((d,i)=>{
          if(d===null) return <div key={"e"+i}/>;
          const ds=dateStr(d);
          const ev=cal[ds];
          const isToday=ds===today;
          const dow=(startDow+d-1)%7;
          return (
            <div key={d} title={ev?ev.label:""} className={onDayClick?"cal-day":""}
              onClick={()=>onDayClick&&onDayClick(ds)} style={{
              position:"relative", textAlign:"center", fontSize:11.5, padding:"4px 0", borderRadius:6,
              minHeight:26,
              background:isToday?"rgba(255,255,255,0.9)":(ev?"rgba(255,255,255,0.08)":"transparent"),
              color:isToday?"var(--accent)":(dow===0?"#ffd0c8":dow===6?"#cfe0f5":"#fff"),

            </div>

        </div>
      )}
    </div>
  );

// ??μ뜚/?怨몃열/??뽰뵠?袁⑦?筌욌쵌??(item 筌뤴뫀諭???덇문筌?揶쎛??
function analyzeBreakdown(exam){
  const units={}, domains={}, diffs={};
  exam.items.forEach(it=>{
    units[it.unit]=units[it.unit]||{name:it.unit,max:0,got:0,answered:0};
    units[it.unit].max += Number(it.pts)||0;
    domains[it.domain]=domains[it.domain]||{name:it.domain,max:0,got:0,answered:0};
    domains[it.domain].max += Number(it.pts)||0;
    if(it.diff){ diffs[it.diff]=diffs[it.diff]||{name:it.diff,max:0,got:0,answered:0}; diffs[it.diff].max+=Number(it.pts)||0; }
  });
  let itemStudents=0;
  Object.values(exam.scores||{}).forEach(sc=>{
    if(sc.mode!=="item"||!sc.marks) return;
    itemStudents++;
    exam.items.forEach(it=>{
      const ok = sc.marks[it.no];
      units[it.unit].answered += Number(it.pts)||0;
      domains[it.domain].answered += Number(it.pts)||0;
      if(it.diff){ diffs[it.diff].answered+=Number(it.pts)||0; }
      if(ok){
        units[it.unit].got += Number(it.pts)||0;
        domains[it.domain].got += Number(it.pts)||0;
        if(it.diff) diffs[it.diff].got+=Number(it.pts)||0;
      }
    });
  });
  const u = Object.values(units).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const d = Object.values(domains).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const df = Object.values(diffs).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  return {units:u, domains:d, diffs:df, itemStudents};
}

  const gradeCuts = calc5GradeCuts(allSc);

  const gradeLabels = GRADE5_LABELS;

  // 5???닌덉퍢 ?브쑵猷?
  const bucketMap={};
  allSc.forEach(s=>{ const b=Math.floor(s/5)*5; bucketMap[b]=(bucketMap[b]||0)+1; });
  const buckets=[];
  let cumul=0;
  for(let b=95; b>=0; b-=5){
    const cnt=bucketMap[b]||0;
    cumul+=cnt;
    // ???닌덉퍢???源녿옱??? ?癒?젟
    const midScore = b+2.5;
    const achv = gradeOf(midScore, bands);
    // ??밴컧?源껎닋 ?癒?젟
    let gLabel='';
    for(let gi=0;gi<gradeCuts.length;gi++){
      if(midScore >= gradeCuts[gi]){ gLabel=gradeLabels[gi]; break; }
    }
    buckets.push({lo:b, hi:b+4.9, cnt, cumul, pct:cnt/total*100, cpct:cumul/total*100, achv, gLabel});
  }

  // ????獄?8獄?9獄? ??덇문 ?袁⑺뒄 ???툢

function MiniTrend({data, color, max, suffix}){
  if(!data||data.length===0) return null;
  const vals=data.map(d=>d.v);
  const hi=max||Math.max(...vals, 1);
  const lo=0;
  const W=Math.max(data.length*70, 200), H=120, pad=24;
  const x=i=> data.length===1? W/2 : pad + i*((W-2*pad)/(data.length-1));
  const y=v=> H-pad - ((v-lo)/(hi-lo))*(H-2*pad);
  const pts=data.map((d,i)=>`${x(i)},${y(d.v)}`).join(" ");
  return (
    <div className="scrollx">
      <svg width={W} height={H} style={{display:"block"}}>
        {data.length>1 && <polyline points={pts} fill="none" stroke={color} strokeWidth="2"/>}
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={x(i)} cy={y(d.v)} r="4" fill={color}/>
            <text x={x(i)} y={y(d.v)-9} textAnchor="middle" fontSize="11" fontWeight="700" fill={color}>{d.v}{suffix}</text>
            <text x={x(i)} y={H-7} textAnchor="middle" fontSize="10" fill="var(--ink-3)">{fmtMD(d.date)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function portfolioRawScore(grades, sheetCount){

function portfolioFinal(raw, bands){
  for(const b of bands){ if(raw>=b.min) return b.score; }
  return bands.length? bands[bands.length-1].score : 0;
}

function perfTotal(perf, sid){

  if(t!=null) total+=Number(t);

  if(grades && Object.keys(grades).length>0){
    const raw=portfolioRawScore(grades, a.portfolio.sheetCount);

function collectStudentData(db, student){
  const sid=student.id;
  const att={present:0,late:0,absent:0,excused:0,total:0};
  Object.values(db.attendance||{}).forEach(day=>{ const v=day[sid]; if(v){att.total++; att[v]=(att[v]||0)+1;} });

  const examData=(db.exams||[]).filter(ex=>ex.scores&&ex.scores[sid]).map(ex=>{
    const sc=ex.scores[sid];
    const score=studentScore(ex,sc); const max=examMax(ex);
    const bands=examBands(ex,db);
    const g=score!=null?gradeOf(score,bands):null;
    const byUnit={};
    if(sc.mode==="item" && ex.items){
      ex.items.forEach(it=>{
        const u=it.unit||"疫꿸퀬?";
        byUnit[u]=byUnit[u]||{correct:0,total:0};
        byUnit[u].total++; if(sc.marks&&sc.marks[it.no])byUnit[u].correct++;
      });
    }
    const units=Object.entries(byUnit).map(([u,d])=>({unit:u,rate:d.total?d.correct/d.total:0,...d}));
    const strong=units.filter(u=>u.rate>=0.8).sort((a,b)=>b.rate-a.rate);
    const weak=units.filter(u=>u.rate<0.5).sort((a,b)=>a.rate-b.rate);
    return {ex,score,max,g,strong,weak,units};
  });

  const perf=db.perf;
  const perfRes=perf?perfTotal(perf,sid):null;
  const topicContent=perf&&perf.areas.topic.contents?perf.areas.topic.contents[sid]:null;

  const obsAgg={colearn:0,present:0,question:0,memos:[]};
  Object.entries(db.obs||{}).forEach(([k,o])=>{
    const [d,osid]=k.split("|"); if(osid!==sid) return;
    if(o.colearn)obsAgg.colearn++; if(o.present)obsAgg.present++; if(o.question)obsAgg.question++;
    if(o.memo)obsAgg.memos.push({date:d,memo:o.memo});
  });
  obsAgg.memos.sort((a,b)=>a.date.localeCompare(b.date));

  const fmTaken=(db.formative?.sets||[]).filter(s=>s.results&&s.results[sid]).map(s=>({set:s,r:s.results[sid]})).sort((a,b)=>(a.set.date||"").localeCompare(b.set.date||""));
  const fmScores=fmTaken.filter(t=>t.r.score!=null).map(t=>t.r.score);
  const fmDiff={}; fmTaken.forEach(t=>(t.r.difficulties||[]).forEach(d=>fmDiff[d]=(fmDiff[d]||0)+1));
  const fmFeedbacks=[]; fmTaken.forEach(t=>{ if(t.r.feedback)fmFeedbacks.push({date:t.set.date,title:t.set.title,text:t.r.feedback}); });

  return {att,examData,perf,perfRes,topicContent,obsAgg,fmTaken,fmScores,fmDiff,fmFeedbacks};
}

// CSV ??쇱뒲嚥≪뮆諭??醫뤿뼢
function downloadCSV(filename, rows){
  const BOM="\uFEFF"; // ??? 繹먥뫁彛?獄쎻뫗?
  const csv=BOM+rows.map(r=>r.map(c=>{
    const s=String(c==null?"":c).replace(/"/g,'""');
    return /[,"\n\r]/.test(s)?`"${s}"`:s;
  }).join(",")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// JSON ??쇱뒲嚥≪뮆諭??醫뤿뼢
function downloadJSON(filename, obj){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}

function exportExams(db){
  const rows=[["??쀫퓮筌?,"??덇문ID","??뉗쓰","??뉖?,"獄?,"甕곕뜇??,"??已?,"?μ빘??,"筌띾슣??,"?源녿옱???","?얜챸鍮녻퉪袁⑹젟??]];
  (db.exams||[]).forEach(ex=>{
    Object.entries(ex.scores||{}).forEach(([sid,sc])=>{
      const s=db.students.find(x=>x.id===sid);
      if(!s) return;
      const score=studentScore(ex,sc);
      const max=examMax(ex);
      const g=score!=null?gradeOf(score,examBands(ex,db)):null;
      let marksStr="";
      if(sc.mode==="item"&&sc.marks) marksStr=Object.entries(sc.marks).map(([n,v])=>`${n}:${v?"O":"X"}`).join(" ");
      rows.push([ex.title,sid,s.sid,s.grade,s.cls,s.no,s.name,score,max,g?g.grade:"",marksStr]);
    });
  });
  downloadCSV(`筌왖?袁る즸揶쎛_${todayFilename()}.csv`,rows);
}
