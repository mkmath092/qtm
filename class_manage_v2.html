<style>

    --ink:#23241f; --ink-2:#5f5e58; --ink-3:#8a897f;
    --line:#e3e2da; --line-2:#d0cfc5;
    --accent:#2f6f5e; --accent-soft:#e2efe9; --accent-ink:#1d5142;
    --warn:#b5701a; --warn-soft:#f7ecd9;
    --danger:#a8392f; --danger-soft:#f6e3e0;

  .nav-badge{margin-left:auto;font-size:10px;background:var(--line);color:var(--ink-3);padding:1px 7px;border-radius:20px;font-weight:600}
  .sidebar-foot{padding:12px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}

  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}

let _pickerLoading=null;
function loadPicker(){

function pickSpreadsheet(token){

async function driveExportCsv(token, fileId){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text/csv`,{headers:{Authorization:"Bearer "+token}});
  if(!r.ok) throw new Error("????гғ¬мүҗ ????????к№…нғҝ ????лҗ°кҪЎ("+r.status+")");
  return await r.text();

// CSV ????????О’ВҖ?п§Қ??еҪұВҖ?кі лЈ‘??зҷ’?л–ҙ???л—®лўҫ???зҷІгғ«мҠӘ?пҪҮлӘӯ??
function parseCSV(text){
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){ cell+='"'; i++; } else q=false; } else cell+=c; }
    else { if(c==='"') q=true; else if(c===','){ row.push(cell); cell=""; } else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=""; } else if(c==='\r'){} else cell+=c; }
  }
  if(cell.length||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(x=>x&&x.trim()!==""));
}
// ??лҗ°ЕҰ???еЈӨкөҝВҖ??лӘғнғҝ(?????зҚ’??зҶ¬кіёмҘ“е«„мҡғпј„? ?????
function parsePasted(text){
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim()!=="");
  if(lines[0] && lines[0].indexOf("\t")>=0) return lines.map(l=>l.split("\t"));
  return parseCSV(text);

function _isObj(x){ return x && typeof x==="object" && !Array.isArray(x); }
function _eq(a,b){ return JSON.stringify(a)===JSON.stringify(b); }
function _idx(arr,idf){ const m={}; (arr||[]).forEach(x=>{ if(x&&x[idf]!=null) m[x[idf]]=x; }); return m; }
function _scalar3(base,local,remote){
  if(_eq(local,remote)) return local;
  if(_eq(local,base)) return remote;   // ??еҡҘ?????мҲҶк°•зӯҢ????????????г…»мҝӢ???жҖЁлҡ®лјҡ???зҷІ???м•әл–җ?

  return remote;                        // ????????л әВҖ??????? ???жҝЎгӮҚлңҸ?????????????????г…»мҝӢ??
}
function _mergeArr(key,base,local,remote){
  const idf=ID_ARRAY_KEYS[key];
  if(!idf) return _scalar3(base,local,remote);
  base=base||[]; local=local||[]; remote=remote||[];
  const bm=_idx(base,idf), lm=_idx(local,idf), rm=_idx(remote,idf);
  const ids=new Set([...Object.keys(lm),...Object.keys(rm)]); const out=[];
  for(const id of ids){ const b=bm[id], l=lm[id], r=rm[id];
    if(l&&!r){ if(b&&_eq(b,l)) continue; out.push(l); continue; }   // ?????мўҠмқҲ? ????& ??еҡҘв–ІкәӮп§Ҙ???мҲҶк°•зӯҢ?????????
    if(!l&&r){ if(b&&_eq(b,r)) continue; out.push(r); continue; }
    out.push(_isObj(l)&&_isObj(r)? _mergeObj(b,l,r) : _scalar3(b,l,r));
  }
  return out;
}
function _mergeObj(base,local,remote){
  base=base||{}; local=local||{}; remote=remote||{};
  const out={}; const keys=new Set([...Object.keys(local),...Object.keys(remote)]);
  for(const k of keys){ const b=base[k], l=local[k], r=remote[k]; const inL=k in local, inR=k in remote;
    if(inL&&!inR){ if((k in base)&&_eq(b,l)) continue; out[k]=l; continue; } // ?????мўҠмқҲ? ????
    if(!inL&&inR){ if((k in base)&&_eq(b,r)) continue; out[k]=r; continue; }
    if(_isObj(l)&&_isObj(r)) out[k]=_mergeObj(b,l,r);
    else if(Array.isArray(l)&&Array.isArray(r)) out[k]=_mergeArr(k,b,l,r);
    else out[k]=_scalar3(b,l,r);
  }
  return out;
}
function mergeDB(base,local,remote){
  // ???????г…»мҝӢ?лӢіл„Ӯп§Ң??мҺӣВҖ ????лЈ№м Ӯ???п§җОәлӯ…??????лҪ“????О’ВҖ????? ???в‘Өмұ¶?лә§в”ј??жЈә??м§Ҷ?мҸҶм¶ҫ????О’ВҖ?лқҫмӯЎ (?жҖЁлҡ®мҳ–з”•??зҷІгғ«мҠЈ??????
  if(!remote || Object.keys(remote).length===0 || !(remote.students&&remote.students.length)) return local;
  if(!local || Object.keys(local).length===0) return remote;
  const merged=_mergeObj(base||{},local,remote);
  merged._v=Math.max(local._v||0, remote._v||0, DB_VERSION);
  return merged;
}

  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    {method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"multipart/related; boundary="+boundary},body});

function useCloud(dbRef, applyMerged){
  const [state,setState]=useState(()=>({status: cloudCfgOk()? (httpsOk()?"signedout":"needhost") : "local", lastSync:null, msg:null}));
  const tcRef=useRef(null), tokRef=useRef(null), busyRef=useRef(false), pendRef=useRef(false), timerRef=useRef(null);

  useEffect(()=>{
    if(!cloudCfgOk()||!httpsOk()) return;
    let tries=0;
    (function init(){
      if(!(window.google&&google.accounts&&google.accounts.oauth2)){ if(tries++<40){ setTimeout(init,300); } return; }
      tcRef.current=google.accounts.oauth2.initTokenClient({client_id:CLOUD.CLIENT_ID,scope:CLOUD.SCOPE,callback:()=>{}});
      setState(s=>({...s,status:"syncing",msg:"Loading latest Drive data. Check the sign-in window."}));
      pullLatest("auto");
    })();
    const onFocus=()=>{ if(tokRef.current) doSync(false); };
    window.addEventListener("focus",onFocus);
    return ()=>window.removeEventListener("focus",onFocus);
  },[]);

  function requestToken(mode){
    return new Promise((res,rej)=>{
      const tc=tcRef.current; if(!tc){ rej(new Error("Sign-in module is not ready yet.")); return; }
      tc.callback=(resp)=>{ if(resp&&resp.access_token){ tokRef.current={tok:resp.access_token,exp:Date.now()+((resp.expires_in||3500)*1000)}; res(resp.access_token); } else rej(new Error("Sign-in was canceled.")); };
      const prompt = (mode===true || mode==="consent") ? "consent" : mode==="auto" ? "select_account" : "";
      try{ tc.requestAccessToken({prompt}); }catch(e){ rej(e); }
    });
  }
  async function token(mode){
    const t=tokRef.current;
    if(t&&t.tok&&Date.now()<t.exp-60000) return t.tok;
    return await requestToken(mode);
  }
  function applyRemoteSnapshot(remote){
    if(!remote || Object.keys(remote).length===0) return false;
    const next=structuredClone(remote);
    next._v=Math.max(next._v||0, DB_VERSION);
    saveBase(next);
    applyMerged(next);
    return true;
  }
  async function pullLatest(interactive){
    if(!cloudCfgOk()||!httpsOk()) return false;
    if(busyRef.current){ pendRef.current=true; return false; }
    busyRef.current=true;
    setState(s=>({...s,status:"syncing",msg:interactive==="auto"?"Loading latest Drive data. Check the sign-in window.":null}));
    try{
      const tk=await token(interactive);
      let id=getFileId();
      let remote=null;
      if(id){
        remote=await driveDownload(tk,id);
        if(remote===null){ id=null; setFileId(null); }
      }
      if(!id) id=await driveFind(tk);
      if(id && remote===null) remote=await driveDownload(tk,id);
      if(id) setFileId(id);
      if(applyRemoteSnapshot(remote)){
        setState(s=>({...s,status:"synced",lastSync:Date.now(),msg:null}));
        return true;
      }
      setState(s=>({...s,status:"signedout",msg:"No saved Drive data was found. Use Sync Now to upload this device data if needed."}));
      return false;
    }catch(e){
      const msg=String(e&&e.message||e);
      const canceled=/cancel/i.test(msg);
      setState(s=>({...s,status:canceled?"signedout":"error",msg:canceled?"Sign-in was canceled. Try Sync again.":msg}));
      return false;
    }finally{
      busyRef.current=false;
      if(pendRef.current){ pendRef.current=false; setTimeout(()=>doSync(false),60); }
    }
  }
  async function doSync(interactive){
    if(!cloudCfgOk()||!httpsOk()) return;
    if(busyRef.current){ pendRef.current=true; return; }
    busyRef.current=true; setState(s=>({...s,status:"syncing",msg:null}));
    try{
      const tk=await token(interactive);
      let id=getFileId();
      let remote=null;
      if(id){ remote=await driveDownload(tk,id); if(remote===null){ id=null; setFileId(null); } }
      if(!id){ id=await driveFind(tk); if(id){ remote=await driveDownload(tk,id); } }
      const local=dbRef.current||{};
      const base=loadBase();
      const merged=remote && Object.keys(remote).length ? mergeDB(base,local,remote) : local;
      if(!id){ id=await driveCreate(tk,merged); }
      else{ await driveUpload(tk,id,merged); }
      setFileId(id); saveBase(merged); applyMerged(merged);
      setState(s=>({...s,status:"synced",lastSync:Date.now(),msg:null}));
    }catch(e){
      setState(s=>({...s,status:"error",msg:String(e&&e.message||e)}));
    }finally{
      busyRef.current=false;
      if(pendRef.current){ pendRef.current=false; setTimeout(()=>doSync(false),60); }
    }
  }
  function signIn(){ doSync(true); }
  function signOut(){
    const t=tokRef.current;
    if(t&&t.tok&&window.google&&google.accounts&&google.accounts.oauth2){ try{ google.accounts.oauth2.revoke(t.tok,()=>{}); }catch(e){} }
    tokRef.current=null; setState(s=>({...s,status:"signedout",lastSync:null,msg:null}));
  }
  function schedulePush(){
    if(!cloudCfgOk()||!httpsOk()) return;
    if(!tokRef.current) return; // ?ОІлҸҰиЈ•????зҶ¬кіЈл«–????м’•мғҚ??
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>doSync(false),2500);
  }
  return {state,signIn,signOut,syncNow:()=>doSync(false),schedulePush,getToken:(i)=>token(i)};
}

function studentSort(a,b){

function buildStudentIndex(students){
  const byClass={}, byGrade={}, classesByGrade={}, grades=new Set();
  (students||[]).forEach(s=>{
    if(!s) return;
    grades.add(s.grade);
    (byClass[s.cls]=byClass[s.cls]||[]).push(s);
    (byGrade[s.grade]=byGrade[s.grade]||[]).push(s);
    (classesByGrade[s.grade]=classesByGrade[s.grade]||new Set()).add(s.cls);
  });
  Object.values(byClass).forEach(l=>l.sort(studentSort));
  Object.values(byGrade).forEach(l=>l.sort(studentSort));
  const classLists={};
  Object.keys(classesByGrade).forEach(g=>{ classLists[g]=[...classesByGrade[g]].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})); });
  return { all:[...(students||[])].sort(studentSort), byClass, byGrade, classesByGrade:classLists, grades:[...grades].sort((a,b)=>Number(a)-Number(b)) };
}

function MonthCalendar({db,onDayClick}){
  const cal=db.cal||{};
  const today=todayStr();
  const now=new Date();
  const [ym,setYm]=useState({y:now.getFullYear(), m:now.getMonth()}); // m: 0~11

  const first=new Date(ym.y, ym.m, 1);
  const startDow=first.getDay(); // 0=??  const daysInMonth=new Date(ym.y, ym.m+1, 0).getDate();
  // ?? ?иўҒв‘ёмҰІ?зҜҖлҚҮлҚ©?(??????мӮігҺҹ?+ ???гғўВҖ?)
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const typeColor={off:"#ffd7d2", exam:"#ffe6c2", event:"#cfe2f7"};
  function dateStr(d){ return `${ym.y}-${String(ym.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
  function move(delta){ const nd=new Date(ym.y, ym.m+delta, 1); setYm({y:nd.getFullYear(), m:nd.getMonth()}); }
  function goToday(){ setYm({y:now.getFullYear(), m:now.getMonth()}); }

  const WK=["??,"??,"??,"??,"зҷІ?,"??,"??];
  // ??????з№№лЁ®лғұ??зҷІгғ«мҠў?кҫӨл•ҹп§’в‘Өлӯ„?(??еҡҘв–ІкәӮ???п§җ?ВҖ?????
  const monthEvents=[];
  for(let d=1;d<=daysInMonth;d++){ const ev=cal[dateStr(d)]; if(ev) monthEvents.push({d,...ev}); }

  return (
    <div style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 14px",backdropFilter:"blur(2px)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>move(-1)} style={calNavStyle}>??/button>
        <div style={{fontSize:14,fontWeight:700}}>{ym.y}??{ym.m+1}??/div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={goToday} style={{...calNavStyle,width:"auto",padding:"0 10px",fontSize:11}}>????лӘ„нҲң</button>
          <button onClick={()=>move(1)} style={calNavStyle}>??/button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {WK.map((w,i)=>(
          <div key={w} style={{textAlign:"center",fontSize:10.5,fontWeight:600,opacity:.75,padding:"2px 0",color:i===0?"#ffd0c8":i===6?"#cfe0f5":"#fff"}}>{w}</div>
        ))}
        {cells.map((d,i)=>{
          if(d===null) return <div key={"e"+i}/>;
          const ds=dateStr(d);
          const ev=cal[ds];
          const isToday=ds===today;
          const dow=(startDow+d-1)%7;
          return (
            <div key={d} title={ev?ev.label:""} className={onDayClick?"cal-day":""}
              onClick={()=>onDayClick&&onDayClick(ds)} style={{
              position:"relative", textAlign:"center", fontSize:11.5, padding:"4px 0", borderRadius:6,
              minHeight:26,
              background:isToday?"rgba(255,255,255,0.9)":(ev?"rgba(255,255,255,0.08)":"transparent"),
              color:isToday?"var(--accent)":(dow===0?"#ffd0c8":dow===6?"#cfe0f5":"#fff"),
              fontWeight:isToday?800:500,
            }}>
              {d}
              {ev && <div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:5,height:5,borderRadius:"50%",background:typeColor[ev.type]}}/>}
            </div>
          );
        })}
      </div>
      {monthEvents.length>0 && (
        <div style={{marginTop:9,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.18)",display:"flex",flexDirection:"column",gap:3,maxHeight:88,overflowY:"auto"}}>
          {monthEvents.map(e=>(

              <span style={{opacity:.95,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ============================ зҷІгғ«мҠЈ????СҲлӮ„жҸҙОҝмӯ©п§Һв‘ёмЁ¬??мҺӣВҖ ??лҗ°мҠЈз¶ӯ??============================ */
function gradeOf(score, bands){
  for(const b of bands){ if(score>=b.min) return b; }

function analyzeBreakdown(exam){
  const units={}, domains={}, diffs={};
  exam.items.forEach(it=>{
    units[it.unit]=units[it.unit]||{name:it.unit,max:0,got:0,answered:0};
    units[it.unit].max += Number(it.pts)||0;
    domains[it.domain]=domains[it.domain]||{name:it.domain,max:0,got:0,answered:0};
    domains[it.domain].max += Number(it.pts)||0;
    if(it.diff){ diffs[it.diff]=diffs[it.diff]||{name:it.diff,max:0,got:0,answered:0}; diffs[it.diff].max+=Number(it.pts)||0; }
  });
  let itemStudents=0;
  Object.values(exam.scores||{}).forEach(sc=>{
    if(sc.mode!=="item"||!sc.marks) return;
    itemStudents++;
    exam.items.forEach(it=>{
      const ok = sc.marks[it.no];
      units[it.unit].answered += Number(it.pts)||0;
      domains[it.domain].answered += Number(it.pts)||0;
      if(it.diff){ diffs[it.diff].answered+=Number(it.pts)||0; }
      if(ok){
        units[it.unit].got += Number(it.pts)||0;
        domains[it.domain].got += Number(it.pts)||0;
        if(it.diff) diffs[it.diff].got+=Number(it.pts)||0;
      }
    });
  });
  const u = Object.values(units).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const d = Object.values(domains).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const df = Object.values(diffs).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  return {units:u, domains:d, diffs:df, itemStudents};
}

function ObsWorksheets({db,update,cloud}){
  const ws=db.worksheets||{};

  const [round,setRound]=useState(rounds[0]||"");

  const [cls,setCls]=useState(classesInGrade[0]||"");
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);
  useEffect(()=>{ if(round && !ws[round]) setRound(rounds[0]||""); },[Object.keys(ws).join(",")]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls).sort((a,b)=>a.no-b.no);
  const subs=(round && ws[round])||{};

/* ---------- йӣ…?нҚ”з‘—лқ°гҺ–????в‘ӨлІ жҜ“????мҲҶк°•зӯҢ???(SVG) ---------- */
function MiniTrend({data, color, max, suffix}){
  if(!data||data.length===0) return null;
  const vals=data.map(d=>d.v);
  const hi=max||Math.max(...vals, 1);
  const lo=0;
  const W=Math.max(data.length*70, 200), H=120, pad=24;
  const x=i=> data.length===1? W/2 : pad + i*((W-2*pad)/(data.length-1));
  const y=v=> H-pad - ((v-lo)/(hi-lo))*(H-2*pad);
  const pts=data.map((d,i)=>`${x(i)},${y(d.v)}`).join(" ");
  return (
    <div className="scrollx">
      <svg width={W} height={H} style={{display:"block"}}>
        {data.length>1 && <polyline points={pts} fill="none" stroke={color} strokeWidth="2"/>}
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={x(i)} cy={y(d.v)} r="4" fill={color}/>
            <text x={x(i)} y={y(d.v)-9} textAnchor="middle" fontSize="11" fontWeight="700" fill={color}>{d.v}{suffix}</text>
            <text x={x(i)} y={H-7} textAnchor="middle" fontSize="10" fill="var(--ink-3)">{fmtMD(d.date)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function portfolioRawScore(grades, sheetCount){
  let sum=0;
  for(let i=1;i<=sheetCount;i++){ const g=grades&&grades[i]; if(g&&PORT_GRADE_VAL[g]!=null) sum+=PORT_GRADE_VAL[g]; }
  return sum;
}

function portfolioFinal(raw, bands){
  for(const b of bands){ if(raw>=b.min) return b.score; }
  return bands.length? bands[bands.length-1].score : 0;
}
// ????лҪ“???зҷІгғ«мҠў?лӨёлӨғ?????м–ңЕҰп§җ??? ??м’’лң®??
function perfTotal(perf, sid){

  // ???лҪ®лҚ«?????лҗ°мҗі??  const p=a.problem.scores[sid]; parts.problem = (p!=null?Number(p):null);

  // ??лӮҶл’©??еҪұВҖ?мҷҲ????г…јл’§??
  const t=a.topic.scores[sid]; parts.topic = (t!=null?Number(t):null);
  if(t!=null) total+=Number(t);
  // ?????????  const grades=a.portfolio.grades[sid];
  if(grades && Object.keys(grades).length>0){
    const raw=portfolioRawScore(grades, a.portfolio.sheetCount);
    const fin=portfolioFinal(raw, a.portfolio.bands);
    parts.portfolio=fin; parts.portfolioRaw=raw; total+=fin;
  } else { parts.portfolio=null; }
  return {total, parts};
}

function collectStudentData(db, student){
  const sid=student.id;
  const att={present:0,late:0,absent:0,excused:0,total:0};
  Object.values(db.attendance||{}).forEach(day=>{ const v=day[sid]; if(v){att.total++; att[v]=(att[v]||0)+1;} });

  const examData=(db.exams||[]).filter(ex=>ex.scores&&ex.scores[sid]).map(ex=>{
    const sc=ex.scores[sid];
    const score=studentScore(ex,sc); const max=examMax(ex);
    const bands=examBands(ex,db);
    const g=score!=null?gradeOf(score,bands):null;
    const byUnit={};
    if(sc.mode==="item" && ex.items){
      ex.items.forEach(it=>{
        const u=it.unit||"??гӮҢмӮҖ??";
        byUnit[u]=byUnit[u]||{correct:0,total:0};
        byUnit[u].total++; if(sc.marks&&sc.marks[it.no])byUnit[u].correct++;
      });
    }
    const units=Object.entries(byUnit).map(([u,d])=>({unit:u,rate:d.total?d.correct/d.total:0,...d}));
    const strong=units.filter(u=>u.rate>=0.8).sort((a,b)=>b.rate-a.rate);
    const weak=units.filter(u=>u.rate<0.5).sort((a,b)=>a.rate-b.rate);
    return {ex,score,max,g,strong,weak,units};
  });

  const perf=db.perf;
  const perfRes=perf?perfTotal(perf,sid):null;
  const topicContent=perf&&perf.areas.topic.contents?perf.areas.topic.contents[sid]:null;

  const obsAgg={colearn:0,present:0,question:0,memos:[]};
  Object.entries(db.obs||{}).forEach(([k,o])=>{
    const [d,osid]=k.split("|"); if(osid!==sid) return;
    if(o.colearn)obsAgg.colearn++; if(o.present)obsAgg.present++; if(o.question)obsAgg.question++;
    if(o.memo)obsAgg.memos.push({date:d,memo:o.memo});
  });
  obsAgg.memos.sort((a,b)=>a.date.localeCompare(b.date));

  const fmTaken=(db.formative?.sets||[]).filter(s=>s.results&&s.results[sid]).map(s=>({set:s,r:s.results[sid]})).sort((a,b)=>(a.set.date||"").localeCompare(b.set.date||""));
  const fmScores=fmTaken.filter(t=>t.r.score!=null).map(t=>t.r.score);
  const fmDiff={}; fmTaken.forEach(t=>(t.r.difficulties||[]).forEach(d=>fmDiff[d]=(fmDiff[d]||0)+1));
  const fmFeedbacks=[]; fmTaken.forEach(t=>{ if(t.r.feedback)fmFeedbacks.push({date:t.set.date,title:t.set.title,text:t.r.feedback}); });

  return {att,examData,perf,perfRes,topicContent,obsAgg,fmTaken,fmScores,fmDiff,fmFeedbacks};
}

// CSV ???жәҗлӮ…??жЈә??м§Ҷ?мӮ к¶ҳ????гғЈлҖ–??
function downloadCSV(filename, rows){
  const BOM="\uFEFF"; // ??? еҡҘмӢІк°ӯ?жіі?лӮ‘???иўҒв‘ём »жіі?
  const csv=BOM+rows.map(r=>r.map(c=>{
    const s=String(c==null?"":c).replace(/"/g,'""');
    return /[,"\n\r]/.test(s)?`"${s}"`:s;
  }).join(",")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// JSON ???жәҗлӮ…??жЈә??м§Ҷ?мӮ к¶ҳ????гғЈлҖ–??
function downloadJSON(filename, obj){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}

function PerfSimpleScore({db,update,areaKey}){
  const area=db.perf.areas[areaKey];
  const scopeCls=db.perf.clsScope;
  const grades=[...new Set(db.students.filter(s=>scopeCls.includes(s.cls)).map(s=>s.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=[...new Set(db.students.filter(s=>s.grade===grade && scopeCls.includes(s.cls)).map(s=>s.cls))];
  const [cls,setCls]=useState(classesInGrade[0]||"");
  const [photos]=useState(()=>loadPhotos());
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls)
    .sort((a,b)=>a.no-b.no);
  const entered=list.filter(s=>area.scores[s.id]!=null).length;

  function setScore(sid,val){
    update(d=>{
      const sc=d.perf.areas[areaKey].scores;
      if(val==="") delete sc[sid];
      else sc[sid]=Math.max(0,Math.min(area.max,Math.round(Number(val))));
    });
  }
  return (
    <div className="card">
      <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
        <h3>{area.name}</h3>
        <div className="seg">
          {grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>setGrade(g)}>{gradeLabel(g)}</button>)}
        </div>
        <div className="seg">
          {classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}
        </div>
        <span className="sub" style={{marginLeft:"auto"}}>????кіёмЈ· {entered}/{list.length} еӢҮ?зҷІгғ«мҠў????{area.max}??/span>
      </div>
      <div className="scrollx">
        <table>
          <thead><tr><th style={{width:48}}></th><th style={{width:45}}>?п§җ?ВҖ???/th><th>?????/th><th style={{width:140}}>?????(зҷІгғ«мҠў????{area.max})</th></tr></thead>
          <tbody>
            {list.map(s=>(
              <tr key={s.id}>
                <td><Avatar student={s} photos={photos} size={32}/></td>
                <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                <td style={{fontWeight:600}}>{s.name}</td>
                <td>
                  <input type="number" min="0" max={area.max} step="1" inputMode="numeric" value={area.scores[s.id]??""} onFocus={e=>{ const el=e.target; if((area.scores[s.id]??"")==="") setScore(s.id,String(area.max)); requestAnimationFrame(()=>{try{el.select();}catch(_){}}); }} onChange={e=>setScore(s.id,e.target.value)} placeholder="?? style={{padding:"5px 9px",fontSize:13,width:100}}/>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
