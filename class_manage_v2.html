function parseCSV(text){
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){ cell+='"'; i++; } else q=false; } else cell+=c; }

  return rows.filter(r=>r.some(x=>x&&x.trim()!==""));
}

  if(_eq(remote,base)) return local;    // ?대씪?곕뱶 洹몃?濡?????蹂寃?梨꾪깮
  return remote;                        // ?????ㅻⅤ寃??쒕Ь) ??寃곗젙???뱀옄=?대씪?곕뱶
}
function _mergeArr(key,base,local,remote){
  const idf=ID_ARRAY_KEYS[key];
  if(!idf) return _scalar3(base,local,remote);
  base=base||[]; local=local||[]; remote=remote||[];
  const bm=_idx(base,idf), lm=_idx(local,idf), rm=_idx(remote,idf);
  const ids=new Set([...Object.keys(lm),...Object.keys(rm)]); const out=[];
  for(const id of ids){ const b=bm[id], l=lm[id], r=rm[id];
    if(l&&!r){ if(b&&_eq(b,l)) continue; out.push(l); continue; }   // ?곷?媛 ??젣 & ?섎뒗 洹몃?濡?????젣
    if(!l&&r){ if(b&&_eq(b,r)) continue; out.push(r); continue; }
    out.push(_isObj(l)&&_isObj(r)? _mergeObj(b,l,r) : _scalar3(b,l,r));
  }
  return out;
}
function _mergeObj(base,local,remote){
  base=base||{}; local=local||{}; remote=remote||{};
  const out={}; const keys=new Set([...Object.keys(local),...Object.keys(remote)]);
  for(const k of keys){ const b=base[k], l=local[k], r=remote[k]; const inL=k in local, inR=k in remote;
    if(inL&&!inR){ if((k in base)&&_eq(b,l)) continue; out[k]=l; continue; } // ?곷?媛 ??젣
    if(!inL&&inR){ if((k in base)&&_eq(b,r)) continue; out[k]=r; continue; }
    if(_isObj(l)&&_isObj(r)) out[k]=_mergeObj(b,l,r);
    else if(Array.isArray(l)&&Array.isArray(r)) out[k]=_mergeArr(k,b,l,r);
    else out[k]=_scalar3(b,l,r);
  }
  return out;
}
function mergeDB(base,local,remote){
  // ?대씪?곕뱶媛 鍮꾩뼱?덇굅???숈깮 ?곗씠?곌? ?놁쑝硫?濡쒖뺄 ?곗꽑 (蹂듭썝 吏곹썑 ??
  if(!remote || Object.keys(remote).length===0 || !(remote.students&&remote.students.length)) return local;
  if(!local || Object.keys(local).length===0) return remote;
  const merged=_mergeObj(base||{},local,remote);
  merged._v=Math.max(local._v||0, remote._v||0, DB_VERSION);
  return merged;
}

async function driveFind(token){
  const q=encodeURIComponent(`name='${driveFileName()}' and trashed=false`);
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`,{headers:{Authorization:"Bearer "+token}});
  if(!r.ok) throw new Error("紐⑸줉 議고쉶 ?ㅽ뙣("+r.status+")");
  const j=await r.json(); return (j.files&&j.files[0])? j.files[0].id : null;
}
async function driveCreate(token,obj){
  const meta={name:driveFileName(),mimeType:"application/json"};
  const boundary="eduapp"+Date.now();
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(obj)}\r\n--${boundary}--`;
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    {method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"multipart/related; boundary="+boundary},body});
  if(!r.ok) throw new Error("?뚯씪 ?앹꽦 ?ㅽ뙣("+r.status+")");
  return (await r.json()).id;
}
async function driveDownload(token,id){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{Authorization:"Bearer "+token}});
  if(r.status===404) return null;
  if(!r.ok) throw new Error("?ㅼ슫濡쒕뱶 ?ㅽ뙣("+r.status+")");
  const t=await r.text(); if(!t) return {};
  try{ return JSON.parse(t); }catch(e){ return {}; }
}
async function driveUpload(token,id,obj){
  const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
    {method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(obj)});
  if(!r.ok) throw new Error("?낅줈???ㅽ뙣("+r.status+")");
  return true;
}

function useCloud(dbRef, applyMerged){
  const [state,setState]=useState(()=>({status: cloudCfgOk()? (httpsOk()?"signedout":"needhost") : "local", lastSync:null, msg:null}));
  const tcRef=useRef(null), tokRef=useRef(null), busyRef=useRef(false), pendRef=useRef(false), timerRef=useRef(null);

  useEffect(()=>{
    if(!cloudCfgOk()||!httpsOk()) return;
    let tries=0;
    (function init(){
      if(!(window.google&&google.accounts&&google.accounts.oauth2)){ if(tries++<40){ setTimeout(init,300); } return; }
      tcRef.current=google.accounts.oauth2.initTokenClient({client_id:CLOUD.CLIENT_ID,scope:CLOUD.SCOPE,callback:()=>{}});
      setState(s=>({...s,status:"syncing",msg:"드라이브에서 최신 데이터를 불러옵니다. 로그인 창을 확인해주세요…"}));
      pullLatest("auto");
    })();
    const onFocus=()=>{ if(tokRef.current) doSync(false); };
    window.addEventListener("focus",onFocus);
    return ()=>window.removeEventListener("focus",onFocus);
  },[]);

  function requestToken(mode){
    return new Promise((res,rej)=>{
      const tc=tcRef.current; if(!tc){ rej(new Error("로그인 모듈 준비 중")); return; }
      tc.callback=(resp)=>{ if(resp&&resp.access_token){ tokRef.current={tok:resp.access_token,exp:Date.now()+((resp.expires_in||3500)*1000)}; res(resp.access_token); } else rej(new Error("로그인이 취소되었습니다.")); };
      const prompt = (mode===true || mode==="consent") ? "consent" : mode==="auto" ? "select_account" : "";
      try{ tc.requestAccessToken({prompt}); }catch(e){ rej(e); }
    });
  }
  async function token(mode){
    const t=tokRef.current;
    if(t&&t.tok&&Date.now()<t.exp-60000) return t.tok;
    return await requestToken(mode);
  }
  function applyRemoteSnapshot(remote){
    if(!remote || Object.keys(remote).length===0) return false;
    const next=structuredClone(remote);
    next._v=Math.max(next._v||0, DB_VERSION);
    saveBase(next);
    applyMerged(next);
    return true;
  }
  async function pullLatest(interactive){
    if(!cloudCfgOk()||!httpsOk()) return false;
    if(busyRef.current){ pendRef.current=true; return false; }
    busyRef.current=true;
    setState(s=>({...s,status:"syncing",msg:interactive==="auto"?"드라이브에서 최신 데이터를 불러옵니다. 로그인 창을 확인해주세요…":null}));
    try{
      const tk=await token(interactive);
      let id=getFileId();
      let remote=null;
      if(id){
        remote=await driveDownload(tk,id);
        if(remote===null){ id=null; setFileId(null); }
      }
      if(!id) id=await driveFind(tk);
      if(id && remote===null) remote=await driveDownload(tk,id);
      if(id) setFileId(id);
      if(applyRemoteSnapshot(remote)){
        setState(s=>({...s,status:"synced",lastSync:Date.now(),msg:null}));
        return true;
      }
      setState(s=>({...s,status:"signedout",msg:"드라이브에 저장된 데이터를 찾지 못했습니다. 필요하면 '지금 동기화'로 현재 기기 데이터를 새로 올리세요."}));
      return false;
    }catch(e){
      const msg=String(e&&e.message||e);
      const canceled=/취소|cancel/i.test(msg);
      setState(s=>({...s,status:canceled?"signedout":"error",msg:canceled?"로그인을 취소했습니다. 동기화 버튼으로 다시 시도하세요.":msg}));
      return false;
    }finally{
      busyRef.current=false;
      if(pendRef.current){ pendRef.current=false; setTimeout(()=>doSync(false),60); }
    }
  }
  async function doSync(interactive){
    if(!cloudCfgOk()||!httpsOk()) return;
    if(busyRef.current){ pendRef.current=true; return; }
    busyRef.current=true; setState(s=>({...s,status:"syncing",msg:null}));
    try{
      const tk=await token(interactive);
      let id=getFileId();
      let remote=null;
      if(id){ remote=await driveDownload(tk,id); if(remote===null){ id=null; setFileId(null); } }
      if(!id){ id=await driveFind(tk); if(id){ remote=await driveDownload(tk,id); } }
      const local=dbRef.current||{};
      const base=loadBase();
      const merged=remote && Object.keys(remote).length ? mergeDB(base,local,remote) : local;
      if(!id){ id=await driveCreate(tk,merged); }
      else{ await driveUpload(tk,id,merged); }
      setFileId(id); saveBase(merged); applyMerged(merged);
      setState(s=>({...s,status:"synced",lastSync:Date.now(),msg:null}));
    }catch(e){
      setState(s=>({...s,status:"error",msg:String(e&&e.message||e)}));
    }finally{
      busyRef.current=false;
      if(pendRef.current){ pendRef.current=false; setTimeout(()=>doSync(false),60); }
    }
  }
  function signIn(){ doSync(true); }
  function signOut(){
    const t=tokRef.current;
    if(t&&t.tok&&window.google&&google.accounts&&google.accounts.oauth2){ try{ google.accounts.oauth2.revoke(t.tok,()=>{}); }catch(e){} }
    tokRef.current=null; setState(s=>({...s,status:"signedout",lastSync:null,msg:null}));
  }
  function schedulePush(){
    if(!cloudCfgOk()||!httpsOk()) return;
    if(!tokRef.current) return; // 로그인 전엔 무시
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>doSync(false),2500);
  }
  return {state,signIn,signOut,syncNow:()=>doSync(false),schedulePush,getToken:(i)=>token(i)};
}

  if(!classInfo) return [];

  return out.sort((a,b)=> a.period-b.period);
}

function useDragModal(){
  const [d,setD]=useState({x:0,y:0});
  const ref=useRef({sx:0,sy:0,ox:0,oy:0});
  function onDown(e){
    if(e.target && e.target.closest && e.target.closest("button,input,select,textarea,a")) return; // 踰꾪듉쨌?낅젰? ?쒕옒洹??쒖쇅
    if(e.pointerType==="mouse" && e.button!==0) return; // ?쇱そ 踰꾪듉留?    const r=ref.current; r.sx=e.clientX; r.sy=e.clientY; r.ox=d.x; r.oy=d.y;
    const move=ev=>{ setD({x:r.ox+(ev.clientX-r.sx), y:r.oy+(ev.clientY-r.sy)}); };
    const up=()=>{ window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); };
    window.addEventListener("pointermove",move); window.addEventListener("pointerup",up);
  }
  return { style:{transform:`translate(${d.x}px,${d.y}px)`}, onDown };
}

function studentSort(a,b){
  const clsCmp=String(a.cls||"").localeCompare(String(b.cls||""),undefined,{numeric:true});
  return clsCmp || (Number(a.no)||0)-(Number(b.no)||0) || String(a.name||"").localeCompare(String(b.name||""));
}
function buildStudentIndex(students){
  const byClass={}, byGrade={}, classesByGrade={}, grades=new Set();
  (students||[]).forEach(s=>{
    if(!s) return;
    grades.add(s.grade);
    (byClass[s.cls]=byClass[s.cls]||[]).push(s);
    (byGrade[s.grade]=byGrade[s.grade]||[]).push(s);
    (classesByGrade[s.grade]=classesByGrade[s.grade]||new Set()).add(s.cls);
  });
  Object.values(byClass).forEach(l=>l.sort(studentSort));
  Object.values(byGrade).forEach(l=>l.sort(studentSort));
  const classLists={};
  Object.keys(classesByGrade).forEach(g=>{ classLists[g]=[...classesByGrade[g]].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})); });
  return { all:[...(students||[])].sort(studentSort), byClass, byGrade, classesByGrade:classLists, grades:[...grades].sort((a,b)=>Number(a)-Number(b)) };
}

function attendanceSummary(students, rec){
  let marked=0,present=0,late=0,absent=0,excused=0;

    if(v==="present")present++; else if(v==="late")late++; else if(v==="absent")absent++; else if(v==="excused")excused++; });

}

function MonthCalendar({db,onDayClick}){
  const cal=db.cal||{};
  const today=todayStr();
  const now=new Date();
  const [ym,setYm]=useState({y:now.getFullYear(), m:now.getMonth()}); // m: 0~11

  const first=new Date(ym.y, ym.m, 1);
  const startDow=first.getDay(); // 0=??  const daysInMonth=new Date(ym.y, ym.m+1, 0).getDate();
  // ? 諛곗뿴 (??鍮덉뭏 + ?좎쭨)
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const typeColor={off:"#ffd7d2", exam:"#ffe6c2", event:"#cfe2f7"};
  function dateStr(d){ return `${ym.y}-${String(ym.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
  function move(delta){ const nd=new Date(ym.y, ym.m+delta, 1); setYm({y:nd.getFullYear(), m:nd.getMonth()}); }
  function goToday(){ setYm({y:now.getFullYear(), m:now.getMonth()}); }

  const WK=["??,"??,"??,"??,"紐?,"湲?,"??];
  // ?????쇱젙 紐⑸줉 (?섎떒 踰붾???
  const monthEvents=[];
  for(let d=1;d<=daysInMonth;d++){ const ev=cal[dateStr(d)]; if(ev) monthEvents.push({d,...ev}); }

  return (
    <div style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 14px",backdropFilter:"blur(2px)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>move(-1)} style={calNavStyle}>??/button>
        <div style={{fontSize:14,fontWeight:700}}>{ym.y}??{ym.m+1}??/div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={goToday} style={{...calNavStyle,width:"auto",padding:"0 10px",fontSize:11}}>?ㅻ뒛</button>
          <button onClick={()=>move(1)} style={calNavStyle}>??/button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {WK.map((w,i)=>(
          <div key={w} style={{textAlign:"center",fontSize:10.5,fontWeight:600,opacity:.75,padding:"2px 0",color:i===0?"#ffd0c8":i===6?"#cfe0f5":"#fff"}}>{w}</div>
        ))}
        {cells.map((d,i)=>{
          if(d===null) return <div key={"e"+i}/>;
          const ds=dateStr(d);
          const ev=cal[ds];
          const isToday=ds===today;
          const dow=(startDow+d-1)%7;
          return (
            <div key={d} title={ev?ev.label:""} className={onDayClick?"cal-day":""}
              onClick={()=>onDayClick&&onDayClick(ds)} style={{
              position:"relative", textAlign:"center", fontSize:11.5, padding:"4px 0", borderRadius:6,
              minHeight:26,
              background:isToday?"rgba(255,255,255,0.9)":(ev?"rgba(255,255,255,0.08)":"transparent"),
              color:isToday?"var(--accent)":(dow===0?"#ffd0c8":dow===6?"#cfe0f5":"#fff"),
              fontWeight:isToday?800:500,
            }}>
              {d}
              {ev && <div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:5,height:5,borderRadius:"50%",background:typeColor[ev.type]}}/>}
            </div>

        })}
      </div>
      {monthEvents.length>0 && (
        <div style={{marginTop:9,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.18)",display:"flex",flexDirection:"column",gap:3,maxHeight:88,overflowY:"auto"}}>

            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ImportModal({db,update,onClose}){
  const [txt,setTxt]=useState("");
  const sample="1諛?t1\t源誘쇱?\t2026101\n1諛?t2\t?댁꽌??t2026102\n2諛?t1\t諛뺣룄??t2026201";
  function parse(){
    const lines=txt.trim().split("\n").filter(l=>l.trim());
    if(!lines.length){ toast("遺숈뿬?ｌ? ?댁슜???놁뒿?덈떎"); return; }
    const rows=[];
    for(const line of lines){
      const parts=line.split(/\t|,/).map(x=>x.trim());
      if(parts.length<2) continue;
      const [cls,no,name,sid]=parts;
      if(!name && !no) continue;
      // ?좎뿰 泥섎━: 4??諛?踰덊샇,?대쫫,?숇쾲) ?먮뒗 3??諛??대쫫,?숇쾲)
      if(parts.length>=4) rows.push({cls,no:Number(no)||0,name,sid:sid||""});
      else if(parts.length===3) rows.push({cls,no:0,name:no,sid:name}); // 諛??대쫫,?숇쾲
      else rows.push({cls,no:0,name:no,sid:""});
    }
    if(!rows.length){ toast("?뺤떇???몄떇?섏? 紐삵뻽?듬땲??); return; }
    update(d=>{
      rows.forEach(r=>{
        if(!d.classes.includes(r.cls)) d.classes.push(r.cls);
        d.students.push({id:"s"+Date.now()+Math.random().toString(36).slice(2,6),cls:r.cls,no:r.no||(d.students.filter(s=>s.cls===r.cls).length+1),name:r.name,sid:r.sid});
      });
      d.classes.sort();
    });
    toast(rows.length+"紐낆쓣 ?깅줉?덉뒿?덈떎");
    onClose();
  }
  function replaceAll(){
    if(!confirm("湲곗〈 ?숈깮 紐낅떒??紐⑤몢 吏?곌퀬 ?덈줈 ?깅줉?좉퉴?? (異쒖꽍 湲곕줉??珥덇린?붾맗?덈떎)")) return;
    const lines=txt.trim().split("\n").filter(l=>l.trim());
    const rows=[];
    for(const line of lines){
      const parts=line.split(/\t|,/).map(x=>x.trim());
      if(parts.length<2) continue;
      const [cls,no,name,sid]=parts;
      if(parts.length>=4) rows.push({cls,no:Number(no)||0,name,sid:sid||""});

    if(!rows.length){ toast("?뺤떇???몄떇?섏? 紐삵뻽?듬땲??); return; }
    update(d=>{

      rows.forEach(r=>{

        d.students.push({id:"s"+Date.now()+Math.random().toString(36).slice(2,6),cls:r.cls,no:r.no||(d.students.filter(s=>s.cls===r.cls).length+1),name:r.name,sid:r.sid});
      });
      d.classes.sort();
    });
    toast(rows.length+"紐낆쑝濡?援먯껜?덉뒿?덈떎");
    onClose();

  return (

        <div className="modal-b">
          <div className="helpbox" style={{marginBottom:14}}>
            <span className="ic">?뱥</span>
            <div>?묒??대굹 援ш? ?쒗듃?먯꽌 <b>諛?/ 踰덊샇 / ?대쫫 / ?숇쾲</b> ?쒖꽌濡?蹂듭궗???꾨옒??遺숈뿬?ｌ쑝?몄슂.
            ???먮뒗 ?쇳몴濡?援щ텇???뺤떇???몄떇?⑸땲??</div>
          </div>
          <textarea rows={8} value={txt} onChange={e=>setTxt(e.target.value)} placeholder={sample} style={{fontFamily:"monospace",fontSize:12.5,lineHeight:1.6}}/>
          <button className="btn ghost sm" style={{marginTop:8}} onClick={()=>setTxt(sample)}>?덉떆 梨꾩슦湲?/button>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>痍⑥냼</button>
          <button className="btn danger" onClick={replaceAll}>?꾩껜 援먯껜</button>
          <button className="btn primary" onClick={parse}>異붽? ?깅줉</button>
        </div>
      </div>
    </div>
  );
}

function AttReport({db}){
  const sIndex=useStudentIndex(db.students);
  const grades=sIndex.grades;
  const [grade,setGrade]=useState(grades[0]||1);
  const [cls,setCls]=useState("?꾩껜");
  const [range,setRange]=useState("all"); // all|month
  const [month,setMonth]=useState(todayStr().slice(0,7));
  const [mode,setMode]=useState("cumulative"); // cumulative | byday

  const classesInGrade=sIndex.classesByGrade[grade]||[];
  const dates=Object.keys(db.attendance).sort();

  // ?? ?쇱옄蹂?寃곗꽍 議고쉶????????????????????????????????
  const recordedDates=dates.filter(d=>Object.keys(db.attendance[d]||{}).length>0);
  const [pickDate,setPickDate]=useState(recordedDates[recordedDates.length-1]||todayStr());
  const dayRec=db.attendance[pickDate]||{};
  // 洹몃궇 異쒖꽍??湲곕줉??諛?=?섏뾽??諛?留?異붾젮 諛섎퀎濡?吏묎퀎
  const byClassMap={};
  db.students.forEach(s=>{
    const st=dayRec[s.id]; if(!st) return;
    const key=s.grade+"-"+s.cls;
    const g=byClassMap[key]||(byClassMap[key]={grade:s.grade,cls:s.cls,present:0,late:0,absent:0,excused:0,total:0,absentees:[],lates:[],excuseds:[]});
    g[st]=(g[st]||0)+1; g.total++;
    if(st==="absent") g.absentees.push(s);
    else if(st==="late") g.lates.push(s);
    else if(st==="excused") g.excuseds.push(s);
  });
  const byNo=(a,b)=>a.no-b.no;
  const groups=Object.values(byClassMap)
    .map(g=>({...g,absentees:g.absentees.sort(byNo),lates:g.lates.sort(byNo),excuseds:g.excuseds.sort(byNo)}))
    .sort((a,b)=> a.grade-b.grade || a.cls.localeCompare(b.cls,undefined,{numeric:true}));
  const withAbsence=groups.filter(g=>g.absentees.length>0);
  const allPresentCls=groups.filter(g=>g.absentees.length===0);
  const totalAbsent=groups.reduce((s,g)=>s+g.absent,0);
  const totalLate=groups.reduce((s,g)=>s+g.late,0);
  const totalExcused=groups.reduce((s,g)=>s+g.excused,0);
  const inRange = d => range==="all" ? true : d.startsWith(month);
  const useDates=dates.filter(inRange);

  const students=studentsIn(sIndex, grade, cls);

  const rows=students.map(s=>{
    const r={present:0,late:0,absent:0,excused:0,total:0};
    useDates.forEach(d=>{ const v=db.attendance[d][s.id]; if(v){ r[v]++; r.total++; } });
    const rate = r.total? Math.round((r.present+r.excused)/r.total*100):null;
    return {...s,...r,rate};
  });

  function exportCSV(){
    if(mode==="byday"){
      const head=["?쇱옄","?숇뀈","諛?,"踰덊샇","?대쫫","?숇쾲","?곹깭"];
      const lines=[head.join(",")];
      groups.forEach(g=>{
        const emit=(arr,label)=>arr.forEach(s=>lines.push([pickDate,gradeLabel(s.grade),s.cls,s.no,s.name,s.sid||"",label].join(",")));
        emit(g.absentees,"寃곗꽍"); emit(g.lates,"吏媛?); emit(g.excuseds,"?몄젙");
      });
      if(lines.length===1){ toast("?대떦 ?쇱옄??寃곗꽍쨌吏媛겶룹씤??湲곕줉???놁뒿?덈떎"); return; }
      const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
      a.download=`異쒓껐?꾪솴_${pickDate}.csv`; a.click();
      toast("CSV ?뚯씪???대젮諛쏆븯?듬땲??);
      return;
    }
    const head=["?숇뀈","諛?,"踰덊샇","?대쫫","?숇쾲","異쒖꽍","吏媛?,"寃곗꽍","?몄젙","湲곕줉?쇱닔","異쒖꽍瑜?%)"];
    const lines=[head.join(",")];
    rows.forEach(r=>lines.push([r.grade,r.cls,r.no,r.name,r.sid,r.present,r.late,r.absent,r.excused,r.total,r.rate==null?"":r.rate].join(",")));
    const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`異쒖꽍?꾪솴_${grade}?숇뀈${cls==="?꾩껜"?"":cls}_${range==="all"?"?꾩껜":month}.csv`; a.click();
    toast("CSV ?뚯씪???대젮諛쏆븯?듬땲??);
  }

  const hasData=useDates.length>0;

            <button className={mode==="byday"?"on":""} onClick={()=>setMode("byday")}>?쇱옄蹂?寃곗꽍</button>
          </div>
          {mode==="cumulative" && <>
          <div className="seg">
            {grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>{setGrade(g);setCls("?꾩껜");}}>{gradeLabel(g)}</button>)}
          </div>

            <button className={range==="month"?"on":""} onClick={()=>setRange("month")}>?붾퀎</button>

          {range==="month" && <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{width:150}}/>}
          </>}
          {mode==="byday" && (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,fontWeight:600,color:"var(--ink-2)"}}>?섏뾽??/span>
              <input type="date" value={pickDate} onChange={e=>setPickDate(e.target.value)} style={{width:160}}/>

}

function studentScore(exam, sc){
  if(!sc) return null;
  if(sc.mode==="total") return Number(sc.total)||0;
  // item 紐⑤뱶: 留욎? 臾명빆 諛곗젏 ??+ ?쒕떟??  let s=0;
  exam.items.forEach(it=>{ if(sc.marks && sc.marks[it.no]) s+=Number(it.pts)||0; });
  s += Number(sc.essayScore)||0;
  return Math.round(s*10)/10;
}

function studentSelScore(exam, sc){

  let s=0;
  exam.items.forEach(it=>{ if(sc.marks && sc.marks[it.no]) s+=Number(it.pts)||0; });
  return Math.round(s*10)/10;
}

// ?⑥썝/?곸뿭/?쒖씠?꾨퀎 吏묎퀎 (item 紐⑤뱶 ?숈깮留?媛??
function analyzeBreakdown(exam){
  const units={}, domains={}, diffs={};
  exam.items.forEach(it=>{
    units[it.unit]=units[it.unit]||{name:it.unit,max:0,got:0,answered:0};
    units[it.unit].max += Number(it.pts)||0;
    domains[it.domain]=domains[it.domain]||{name:it.domain,max:0,got:0,answered:0};
    domains[it.domain].max += Number(it.pts)||0;
    if(it.diff){ diffs[it.diff]=diffs[it.diff]||{name:it.diff,max:0,got:0,answered:0}; diffs[it.diff].max+=Number(it.pts)||0; }
  });
  let itemStudents=0;
  Object.values(exam.scores||{}).forEach(sc=>{
    if(sc.mode!=="item"||!sc.marks) return;
    itemStudents++;
    exam.items.forEach(it=>{
      const ok = sc.marks[it.no];
      units[it.unit].answered += Number(it.pts)||0;
      domains[it.domain].answered += Number(it.pts)||0;
      if(it.diff){ diffs[it.diff].answered+=Number(it.pts)||0; }
      if(ok){
        units[it.unit].got += Number(it.pts)||0;
        domains[it.domain].got += Number(it.pts)||0;
        if(it.diff) diffs[it.diff].got+=Number(it.pts)||0;
      }
    });
  });
  const u = Object.values(units).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const d = Object.values(domains).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const df = Object.values(diffs).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  return {units:u, domains:d, diffs:df, itemStudents};
}

  const weakDomain=[conv,poly,func].filter(Boolean).sort((a,b)=>a.rate-b.rate)[0];
  if(weakDomain && weakDomain.rate<70)
    msgs.push(`'${weakDomain.name}' ?곸뿭(${weakDomain.rate}%)???곷??곸쑝濡??쏀빀?덈떎.`);

  // ?쒖씠?꾨퀎 吏꾨떒

    const easy=diffs.find(d=>d.name==="?ъ?");

    if(easy && easy.rate<80) msgs.push(`?ъ슫 臾명빆 ?앹젏瑜좎씠 ${easy.rate}%濡???뒿?덈떎. 湲곕낯 媛쒕뀗 蹂닿컯???꾩슂?⑸땲??`);
    else if(hard && hard.rate<40) msgs.push(`?대젮??臾명빆(${hard.rate}%)?먯꽌 ?ㅼ젏??吏묒쨷?⑸땲?? ?ы솕 ?숈뒿???④낵?곸엯?덈떎.`);
  }
  // ?⑥썝蹂?理쒖빟??  const weak=units[0];
  if(weak && weak.rate<60) msgs.push(`?뱁엳 '${weak.name}' ?⑥썝(${weak.rate}%)??吏묒쨷 蹂닿컯???꾩슂?⑸땲??`);
  else if(weak && weak.rate<80) msgs.push(`'${weak.name}' ?⑥썝???곷??곸쑝濡??쏀븳 ?몄엯?덈떎.`);

  return msgs.length? msgs.join(' ') : "?꾨컲?곸쑝濡?怨좊Ⅴ寃??숈뒿???곹깭?낅땲??";

function DistAnalysis({exam,db}){

  const [fCls,setFCls]=useState("?꾩껜");

  const [sortDir,setSortDir]=useState("desc");

  // ?앹감 5?깃툒 而?怨꾩궛
  const gradeCuts = calc5GradeCuts(allSc);
  const gradePcts = GRADE5_PCTS;
  const gradeLabels = GRADE5_LABELS;

  // 5??援ш컙 遺꾪룷
  const bucketMap={};
  allSc.forEach(s=>{ const b=Math.floor(s/5)*5; bucketMap[b]=(bucketMap[b]||0)+1; });
  const buckets=[];
  let cumul=0;
  for(let b=95; b>=0; b-=5){
    const cnt=bucketMap[b]||0;
    cumul+=cnt;
    // ??援ш컙???깆랬?섏? ?먯젙
    const midScore = b+2.5;
    const achv = gradeOf(midScore, bands);
    // ?앹감?깃툒 ?먯젙
    let gLabel='';
    for(let gi=0;gi<gradeCuts.length;gi++){
      if(midScore >= gradeCuts[gi]){ gLabel=gradeLabels[gi]; break; }
    }
    buckets.push({lo:b, hi:b+4.9, cnt, cumul, pct:cnt/total*100, cpct:cumul/total*100, achv, gLabel});
  }

  // ?대떦 諛?8諛?9諛? ?숈깮 ?꾩튂 ?뚯븙

    return {rank:above, pct:Math.round(above/total*100)};

  function studentAchv(score){ return gradeOf(score, bands); }

            <div className="stat" style={{padding:"12px 14px"}}><div className="label">?꾩껜 ?됯퇏</div><div className="val" style={{fontSize:22}}>{avg.toFixed(1)}<small>??/small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">以묒븰媛?/div><div className="val" style={{fontSize:22}}>{med.toFixed(1)}<small>??/small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">理쒓퀬??/div><div className="val" style={{fontSize:22}}>{allSc[0]}<small>??/small></div></div>
          </div>
        </div>
      </div>

      <div className="row" style={{gap:16,alignItems:"flex-start"}}>

          <div className="card-h"><h3>?먯닔援ш컙蹂?遺꾪룷??/h3><span className="sub">?깆랬?섏? 쨌 ?앹감?깃툒 蹂묎린</span></div>
          <div className="scrollx">
            <table style={{fontSize:12.5}}>
              <thead><tr>

function WorksheetImport({db,update,cloud,round,onClose}){
  const drag=useDragModal();
  const [rows,setRows]=useState(null);   // [[...],[...]] (1???ㅻ뜑)
  const [paste,setPaste]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [map,setMap]=useState({sid:-1,name:-1,file:-1,time:-1});
  const fileRef=useRef(null);

  function guess(header){
    const find=(...keys)=>header.findIndex(h=>{ const t=String(h||"").toLowerCase(); return keys.some(k=>t.includes(k)); });
    const fileGuess=()=>{
      let i=find("?뚯씪","?낅줈??,"?ъ쭊","?숈뒿吏","url","留곹겕","file"); 
      return i;
    };
    setMap({
      sid: find("?숇쾲","踰덊샇","sid","id"),
      name: find("?대쫫","?깅챸","name"),
      file: fileGuess(),
      time: find("??꾩뒪?ы봽","timestamp","?쒓컖","?쒓컙","?쒖텧"),
    });
  }
  function useRows(r){
    if(!r||r.length<2){ setErr("?곗씠?곌? 異⑸텇?섏? ?딆뒿?덈떎(癒몃━湲 + 1???댁긽 ?꾩슂)."); return; }
    setErr(""); setRows(r); guess(r[0]);
  }
  async function viaPicker(){
    setErr(""); setBusy(true);
    try{
      if(!cloud||!cloud.getToken) throw new Error("?대씪?곕뱶 濡쒓렇?몄씠 ?꾩슂?⑸땲??");
      const tk=await cloud.getToken(true);
      const doc=await pickSpreadsheet(tk);
      if(!doc){ setBusy(false); return; } // 痍⑥냼
      const csv=await driveExportCsv(tk, doc.id);
      useRows(parseCSV(csv));
    }catch(e){ setErr("Picker/?쒗듃 ?쎄린 ?ㅽ뙣: "+(e&&e.message||e)+" 쨌 ?꾨옒 CSV 遺숈뿬?ｊ린濡쒕룄 媛?몄삱 ???덉뒿?덈떎."); }
    setBusy(false);
  }
  function viaPaste(){ try{ useRows(parsePasted(paste)); }catch(e){ setErr("遺숈뿬?ｊ린 遺꾩꽍 ?ㅽ뙣: "+e.message); } }
  function viaFile(e){
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader(); rd.onload=ev=>{ try{ useRows(parseCSV(String(ev.target.result))); }catch(err){ setErr("CSV 遺꾩꽍 ?ㅽ뙣: "+err.message); } }; rd.readAsText(f);
  }
  function doImport(){
    if(!rows){ return; }
    if(map.sid<0 && map.name<0){ setErr("?숇쾲 ?먮뒗 ?대쫫 ?댁쓣 吏?뺥븯?몄슂."); return; }
    if(map.file<0){ setErr("?뚯씪(留곹겕) ?댁쓣 吏?뺥븯?몄슂."); return; }
    let matched=0; const unmatched=[];
    update(d=>{
      d.worksheets=d.worksheets||{}; d.worksheets[round]=d.worksheets[round]||{};
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        const sid=map.sid>=0? String(r[map.sid]||"").trim():"";
        const nm =map.name>=0? String(r[map.name]||"").trim():"";
        const fileCell=String(r[map.file]||"").trim();
        const at=map.time>=0? String(r[map.time]||"").trim():"";
        if(!fileCell) continue;

function TimetableEditor({db,update,cell,onClose}){
  const classInfo=db.classInfo;
  const [selCls,setSelCls]=useState(cell.cls||classInfo[0]?.cls);
  const [dow,setDow]=useState(cell.dow);
  const [period,setPeriod]=useState(cell.period);

  function addClass(){
    update(d=>{
      const c=d.classInfo.find(x=>x.cls===selCls);
      if(!c) return;
      if(!c.sched[dow]) c.sched[dow]=[];
      if(!Array.isArray(c.sched[dow])) c.sched[dow]=[c.sched[dow]];
      if(!c.sched[dow].includes(period)) c.sched[dow].push(period);
      c.sched[dow].sort((a,b)=>a-b);
    });
    toast(`${selCls} ${dow} ${period}援먯떆 異붽?`); onClose();
  }
  function removeClass(){
    update(d=>{
      const c=d.classInfo.find(x=>x.cls===selCls);
      if(!c||!c.sched[dow]) return;
      const arr=Array.isArray(c.sched[dow])?c.sched[dow]:[c.sched[dow]];
      c.sched[dow]=arr.filter(p=>p!==period);
      if(c.sched[dow].length===0) delete c.sched[dow];
    });
    toast(`${selCls} ${dow} ${period}援먯떆 ??젣`); onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
        <div className="modal-h"><h3>?쒓컙???섏젙</h3><button className="btn ghost sm" onClick={onClose}>??/button></div>

          <div className="field"><label className="fld">諛?/label>
            <select value={selCls} onChange={e=>setSelCls(e.target.value)}>
              {classInfo.map(c=> <option key={c.cls} value={c.cls}>{c.grade}-{c.cls.replace("諛?,"")} ({c.subject})</option>)}

function masterLevel(code, grade){
  const m=STANDARD_MASTER[code]; if(!m) return null;
  const order=["A","B","C","D","E"];
  const out={...m.levels};
  // 鍮??섏? 梨꾩슦湲? ?꾩뿉??媛??媛源뚯슫 ?뺤쓽???섏? ?ъ슜
  let last=null;
  order.forEach(g=>{ if(out[g]) last=out[g]; else if(last) out[g]=last; });
  return {name:m.name, levels:out, target:grade?out[grade]:null};
}

function guessRole(header){
  const h=(header||"").toString().toLowerCase();
  if(/??꾩뒪?ы봽|timestamp/.test(h)) return "ignore";
  if(/?숇쾲/.test(h)) return "sid";
  if(/?대쫫|?깅챸/.test(h)) return "name";
  if(/?먯닔|score|珥앹젏/.test(h)) return "score";

/* ---------- 誘몃땲 異붿씠 洹몃옒??(SVG) ---------- */
function MiniTrend({data, color, max, suffix}){
  if(!data||data.length===0) return null;
  const vals=data.map(d=>d.v);
  const hi=max||Math.max(...vals, 1);
  const lo=0;
  const W=Math.max(data.length*70, 200), H=120, pad=24;
  const x=i=> data.length===1? W/2 : pad + i*((W-2*pad)/(data.length-1));
  const y=v=> H-pad - ((v-lo)/(hi-lo))*(H-2*pad);
  const pts=data.map((d,i)=>`${x(i)},${y(d.v)}`).join(" ");
  return (
    <div className="scrollx">
      <svg width={W} height={H} style={{display:"block"}}>
        {data.length>1 && <polyline points={pts} fill="none" stroke={color} strokeWidth="2"/>}
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={x(i)} cy={y(d.v)} r="4" fill={color}/>
            <text x={x(i)} y={y(d.v)-9} textAnchor="middle" fontSize="11" fontWeight="700" fill={color}>{d.v}{suffix}</text>
            <text x={x(i)} y={H-7} textAnchor="middle" fontSize="10" fill="var(--ink-3)">{fmtMD(d.date)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

const PORT_GRADE_VAL = {A:3, B:2, C:1}; // 怨좎젙 ?섏궛媛?
// ?ы듃?대━?? ?숈깮??洹몃젅?대뱶 ?⑹궛 ???섏궛?먯닔
function portfolioRawScore(grades, sheetCount){
  let sum=0;
  for(let i=1;i<=sheetCount;i++){ const g=grades&&grades[i]; if(g&&PORT_GRADE_VAL[g]!=null) sum+=PORT_GRADE_VAL[g]; }
  return sum;
}
// ?섏궛?먯닔 ??湲됯컙 理쒖쥌?먯닔
function portfolioFinal(raw, bands){
  for(const b of bands){ if(raw>=b.min) return b.score; }
  return bands.length? bands[bands.length-1].score : 0;
}
// ?숈깮 ??紐낆쓽 ?섑뻾?됯? 珥앹젏
function perfTotal(perf, sid){
  const a=perf.areas;
  let total=0, parts={};
  // 臾몄젣?닿껐??  const p=a.problem.scores[sid]; parts.problem = (p!=null?Number(p):null);
  if(p!=null) total+=Number(p);
  // 二쇱젣湲?곌린
  const t=a.topic.scores[sid]; parts.topic = (t!=null?Number(t):null);
  if(t!=null) total+=Number(t);
  // ?ы듃?대━??  const grades=a.portfolio.grades[sid];
  if(grades && Object.keys(grades).length>0){
    const raw=portfolioRawScore(grades, a.portfolio.sheetCount);
    const fin=portfolioFinal(raw, a.portfolio.bands);
    parts.portfolio=fin; parts.portfolioRaw=raw; total+=fin;
  } else { parts.portfolio=null; }
  return {total, parts};
}

/* ---------- ?숈깮 ???곸뿭 ?곗씠???섏쭛 (醫낇빀移대뱶쨌?명듅 怨듭슜) ---------- */
function collectStudentData(db, student){
  const sid=student.id;
  const att={present:0,late:0,absent:0,excused:0,total:0};
  Object.values(db.attendance||{}).forEach(day=>{ const v=day[sid]; if(v){att.total++; att[v]=(att[v]||0)+1;} });

  const examData=(db.exams||[]).filter(ex=>ex.scores&&ex.scores[sid]).map(ex=>{
    const sc=ex.scores[sid];
    const score=studentScore(ex,sc); const max=examMax(ex);
    const bands=examBands(ex,db);
    const g=score!=null?gradeOf(score,bands):null;
    const byUnit={};
    if(sc.mode==="item" && ex.items){
      ex.items.forEach(it=>{
        const u=it.unit||"湲고?";
        byUnit[u]=byUnit[u]||{correct:0,total:0};
        byUnit[u].total++; if(sc.marks&&sc.marks[it.no])byUnit[u].correct++;
      });
    }
    const units=Object.entries(byUnit).map(([u,d])=>({unit:u,rate:d.total?d.correct/d.total:0,...d}));
    const strong=units.filter(u=>u.rate>=0.8).sort((a,b)=>b.rate-a.rate);
    const weak=units.filter(u=>u.rate<0.5).sort((a,b)=>a.rate-b.rate);
    return {ex,score,max,g,strong,weak,units};
  });

  const perf=db.perf;
  const perfRes=perf?perfTotal(perf,sid):null;
  const topicContent=perf&&perf.areas.topic.contents?perf.areas.topic.contents[sid]:null;

  const obsAgg={colearn:0,present:0,question:0,memos:[]};
  Object.entries(db.obs||{}).forEach(([k,o])=>{
    const [d,osid]=k.split("|"); if(osid!==sid) return;
    if(o.colearn)obsAgg.colearn++; if(o.present)obsAgg.present++; if(o.question)obsAgg.question++;
    if(o.memo)obsAgg.memos.push({date:d,memo:o.memo});
  });
  obsAgg.memos.sort((a,b)=>a.date.localeCompare(b.date));

  const fmTaken=(db.formative?.sets||[]).filter(s=>s.results&&s.results[sid]).map(s=>({set:s,r:s.results[sid]})).sort((a,b)=>(a.set.date||"").localeCompare(b.set.date||""));
  const fmScores=fmTaken.filter(t=>t.r.score!=null).map(t=>t.r.score);
  const fmDiff={}; fmTaken.forEach(t=>(t.r.difficulties||[]).forEach(d=>fmDiff[d]=(fmDiff[d]||0)+1));
  const fmFeedbacks=[]; fmTaken.forEach(t=>{ if(t.r.feedback)fmFeedbacks.push({date:t.set.date,title:t.set.title,text:t.r.feedback}); });

  return {att,examData,perf,perfRes,topicContent,obsAgg,fmTaken,fmScores,fmDiff,fmFeedbacks};
}

function inferCompetencies(D){
  const tags=new Set();
  // ?곌껐: 二쇱젣湲???ㅼ깮???援먭낵 ?ㅼ썙??  const topicText=((D.topicContent?.topic||"")+" "+(D.topicContent?.text||""));
  if(/?ㅼ깮???앺솢|?쇱긽|?곌껐|?묒슜|?쒖슜|?援먭낵|怨쇳븰|寃쎌젣|?ы쉶|?덉닠/.test(topicText)) tags.add("?곌껐");
  // ?뺣낫泥섎━: ?먮즺 ?섏쭛/?뺣━/遺꾩꽍
  if(/?먮즺|?곗씠???섏쭛|?뺣━|遺꾩꽍|洹몃옒????議곗궗|?듦퀎/.test(topicText)) tags.add("?뺣낫泥섎━");
  // 異붾줎: 利앸챸/?ㅻ챸/?좊룄/?쇰컲??  if(/利앸챸|?ㅻ챸|?좊룄|?쇰컲???먮━|?댁쑀|?쇰━/.test(topicText)) tags.add("異붾줎");
  // ?섏궗?뚰넻: 諛쒗몴쨌吏덈Ц쨌肄붾윭??愿李?  if(D.obsAgg.present>0||D.obsAgg.question>0||D.obsAgg.colearn>0) tags.add("?섏궗?뚰넻");
  // 臾몄젣?닿껐: 臾몄젣?닿껐???먯닔 ?믪쓬 or 吏??媛뺤젏
  if(D.perfRes&&D.perfRes.parts&&D.perfRes.parts.problem!=null){
    const pr=D.perfRes.parts.problem, pm=D.perf?.areas?.problem?.max||15;
    if(pr/pm>=0.7) tags.add("臾몄젣?닿껐");
  }
  if(D.examData.some(e=>e.strong.length>0)) tags.add("臾몄젣?닿껐");
  return [...tags];
}

// 諛쏆묠 ?좊Т???곕씪 議곗궗 ?먮룞 ?좏깮
function josa(word, withBatchim, withoutBatchim){
  if(!word) return withoutBatchim;
  const last=word.charCodeAt(word.length-1);
  if(last<0xAC00||last>0xD7A3) return withoutBatchim; // ?쒓? ?꾨땲硫?諛쏆묠?놁쓬 痍④툒
  const hasBatchim=(last-0xAC00)%28!==0;
  return hasBatchim?withBatchim:withoutBatchim;
}

// CSV ?ㅼ슫濡쒕뱶 ?좏떥
function downloadCSV(filename, rows){
  const BOM="\uFEFF"; // ?쒓? 源⑥쭚 諛⑹?
  const csv=BOM+rows.map(r=>r.map(c=>{
    const s=String(c==null?"":c).replace(/"/g,'""');
    return /[,"\n\r]/.test(s)?`"${s}"`:s;
  }).join(",")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// JSON ?ㅼ슫濡쒕뱶 ?좏떥
function downloadJSON(filename, obj){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}

function exportAttendance(db){
  const students=db.students; const att=db.attendance||{};
  const dates=[...new Set(Object.keys(att))].sort();
  const header=["?숇쾲","?숇뀈","諛?,"踰덊샇","?대쫫",...dates];

function exportExams(db){
  const rows=[["?쒗뿕紐?,"?숈깮ID","?숇쾲","?숇뀈","諛?,"踰덊샇","?대쫫","珥앹젏","留뚯젏","?깆랬?섏?","臾명빆蹂꾩젙??]];
  (db.exams||[]).forEach(ex=>{
    Object.entries(ex.scores||{}).forEach(([sid,sc])=>{
      const s=db.students.find(x=>x.id===sid);

      const score=studentScore(ex,sc);

  });
  downloadCSV(`吏?꾪룊媛_${todayFilename()}.csv`,rows);
}

function ExamEditor({examId,db,update,onClose}){
