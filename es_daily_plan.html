<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>은서 하루 — 일정·학습·생활 관리</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#EDF1F3; --surface:#FFFFFF; --ink:#1E2A32; --muted:#6B7A85;
  --line:#E2E8EC; --line2:#EFF3F5; --accent:#0F7C66; --accent-soft:#E4F3EF;
  --now:#E8743B; --now-soft:#FCEDE4; --warn:#C2410C; --done:#94A3B8;
  --c-학교:#3B82F6; --c-학원:#7C3AED; --c-스터디카페:#D97706; --c-개인학습:#0F7C66;
  --c-휴식:#94A3B8; --c-저녁식사:#16A34A; --c-이동:#9AA7B0; --c-하교:#64748B;
  --radius:14px; --shadow:0 1px 3px rgba(30,42,50,.06),0 6px 16px rgba(30,42,50,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);
  font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"맑은 고딕","Malgun Gothic",sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:600px;margin:0 auto;min-height:100vh;background:var(--bg);
  padding:0 0 86px;position:relative}
/* header */
header{position:sticky;top:0;z-index:30;background:rgba(237,241,243,.92);
  backdrop-filter:saturate(180%) blur(10px);padding:14px 18px 10px;border-bottom:1px solid var(--line)}
.h-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.h-name{font-size:20px;font-weight:800;letter-spacing:-.02em}
.h-name small{font-weight:600;font-size:12px;color:var(--muted);margin-left:7px}
.h-date{font-size:13px;color:var(--muted);font-weight:600}
.h-date b{color:var(--accent)}
/* tabs (bottom nav) */
nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);
  padding:6px max(8px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom))}
nav .inner{display:flex;width:100%;max-width:600px}
nav button{flex:1;background:none;border:0;padding:7px 2px 5px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
  font-family:inherit;font-size:10.5px;font-weight:600;border-radius:10px;transition:.15s}
nav button .ic{font-size:19px;line-height:1}
nav button.on{color:var(--accent)}
nav button.on .ic{transform:translateY(-1px)}
main{padding:16px 16px 8px}
/* cards & generic */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px 10px;border-bottom:1px solid var(--line2)}
.card-h h2{font-size:14px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
.card-h h2 .em{font-size:16px}
.card-b{padding:8px 16px 14px}
.sec-eyebrow{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin:18px 4px 8px}
.muted{color:var(--muted)}.tiny{font-size:12px}.center{text-align:center}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:18px 8px}
.btn{font-family:inherit;font-weight:700;border-radius:10px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink);padding:8px 13px;font-size:13px;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.coral{background:var(--now);border-color:var(--now);color:#fff}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.ghost{background:transparent;border-color:transparent;color:var(--accent);padding:6px 8px}
.row-add{width:100%;border:1.5px dashed var(--line);background:var(--line2);color:var(--muted);
  border-radius:10px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;margin-top:6px}
.row-add:active{transform:scale(.99)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:20px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}
.badge{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;color:#fff;white-space:nowrap}
.star{color:var(--now);font-weight:800}
/* today timeline */
.tl{position:relative;padding-left:4px}
.tl-item{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--line2)}
.tl-item:last-child{border-bottom:0}
.tl-time{flex:0 0 46px;font-size:12px;font-weight:800;color:var(--muted);padding-top:2px;text-align:right;font-variant-numeric:tabular-nums}
.tl-time span{display:block;font-weight:600;font-size:11px;color:var(--line);color:#aeb8be}
.tl-body{flex:1;min-width:0}
.tl-head{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tl-title{font-weight:700;font-size:14px}
.tl-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.tl-prep{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
.tl-prep .p{font-size:11px;background:var(--line2);color:#566;padding:2px 7px;border-radius:6px}
.tl-item.now{background:var(--now-soft);margin:0 -10px;padding-left:14px;padding-right:10px;border-radius:10px;border-bottom:0}
.tl-item.now .tl-time{color:var(--now)}
.nowtag{font-size:10px;font-weight:800;color:#fff;background:var(--now);padding:1px 6px;border-radius:5px}
.chk{flex:0 0 auto;width:22px;height:22px;border:2px solid var(--line);border-radius:7px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:.12s;background:#fff}
.chk.on{background:var(--accent);border-color:var(--accent);color:#fff}
.done .tl-title{text-decoration:line-through;color:var(--done)}
/* school timetable grid */
.tt{width:100%;border-collapse:collapse;font-size:11.5px;table-layout:fixed}
.tt th,.tt td{border:1px solid var(--line);padding:4px 3px;text-align:center;vertical-align:top}
.tt th{background:var(--line2);font-weight:800;font-size:11px;color:var(--muted)}
.tt td .s{font-weight:800;font-size:12px}
.tt td .t{display:block;font-size:9.5px;color:var(--muted);line-height:1.25;margin-top:1px}
.tt col.today,.tt td.today{background:var(--accent-soft)}
.tt th.today{background:var(--accent);color:#fff}
/* prep checklist */
.check-list{list-style:none}
.check-list li{display:flex;align-items:flex-start;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line2)}
.check-list li:last-child{border-bottom:0}
.cl-txt{flex:1}.cl-txt .m{font-size:11px;color:var(--muted)}
.done2{text-decoration:line-through;color:var(--done)}
/* material progress */
.mat{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.mat-h{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;background:var(--line2)}
.mat-h .nm{font-weight:800;font-size:14px;flex:1}
.mat-h .pct{font-size:12px;font-weight:800;color:var(--accent)}
.bar{height:5px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:.3s}
.toc{padding:4px 13px 10px;display:none}
.toc.open{display:block}
.toc-it{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--line2);font-size:13px}
.toc-it:last-child{border-bottom:0}
.toc-it .lbl{flex:1}.toc-it .dt{font-size:10.5px;color:var(--done)}
.toc-it.d .lbl{text-decoration:line-through;color:var(--done)}
.unit-h{font-size:11px;font-weight:800;color:var(--muted);margin:9px 0 1px;letter-spacing:.02em}
/* list rows (config) */
.lrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line2)}
.lrow:last-child{border-bottom:0}
.lrow .lr-main{flex:1;min-width:0}
.lrow .lr-t{font-weight:700;font-size:14px}
.lrow .lr-s{font-size:12px;color:var(--muted);margin-top:1px}
.lrow .lr-act{display:flex;gap:4px}
.iconbtn{border:0;background:var(--line2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted)}
.iconbtn:active{transform:scale(.92)}
/* ledger */
.led{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line2)}
.led .amt{font-weight:800;font-variant-numeric:tabular-nums}
.led .amt.in{color:var(--accent)}.led .amt.out{color:var(--warn)}
.bal{background:var(--accent-soft);border-radius:12px;padding:14px 16px;display:flex;
  align-items:baseline;justify-content:space-between;margin-bottom:10px}
.bal .v{font-size:24px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
/* kv */
.kv{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px solid var(--line2);font-size:13.5px}
.kv:last-child{border-bottom:0}.kv .k{color:var(--muted);font-weight:600}.kv .v{font-weight:700}
/* modal */
.scrim{position:fixed;inset:0;background:rgba(20,28,33,.45);z-index:50;display:none;
  align-items:flex-end;justify-content:center}
.scrim.on{display:flex}
.sheet{background:var(--surface);width:100%;max-width:600px;border-radius:18px 18px 0 0;
  padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto;
  animation:up .22s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet h3{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sheet h3 .x{font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:15px;
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:62px}
.f2{display:flex;gap:10px}.f2>*{flex:1}
.sheet-act{display:flex;gap:10px;margin-top:8px}.sheet-act .btn{flex:1;padding:12px}
.msgbox{background:#f7f9fa;border:1px solid var(--line);border-radius:12px;padding:13px;
  font-size:13px;white-space:pre-wrap;line-height:1.6;max-height:46vh;overflow:auto}
/* toast */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;
  z-index:60;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media (min-width:640px){
  header{position:static}
  nav{position:sticky;top:0;bottom:auto;border-top:0;border-bottom:1px solid var(--line)}
  nav button{flex-direction:row;gap:7px;font-size:13.5px;padding:13px 4px;border-radius:0}
  nav button .ic{font-size:16px}
  nav button.on{box-shadow:inset 0 -2px 0 var(--accent)}
  .wrap{padding-bottom:28px}
  main{padding:20px 20px 8px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* habit screen */
.hhero{display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;
  border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.hhero-num{font-size:34px;font-weight:800;line-height:1}
.hhero-lbl{font-size:12px;font-weight:700;opacity:.9;margin-top:3px}
.hhero-r{text-align:right}.hhero .muted{color:rgba(255,255,255,.85)}
.hcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.hcard-h{display:flex;align-items:center;gap:8px}
.hicon{font-size:18px}.hname{font-weight:800;font-size:14px;flex:1}
.hstreak{font-size:12px;font-weight:800;color:var(--now)}
.hdots{display:flex;gap:5px;margin:9px 0 5px;flex-wrap:wrap}
.hd{width:17px;height:17px;border-radius:5px;background:var(--line)}
.hd.on{background:var(--accent)}
.hd.off{background:#fff;border:1px solid var(--line)}
.hd.bad{background:var(--now)}
.hd.na{background:transparent;border:1px dashed var(--line)}
.hd.today{background:#fff;border:2px solid var(--now)}
/* habit tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 14px 13px;
  box-shadow:var(--shadow);text-align:left;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;transition:.15s}
.tile:active{transform:scale(.97)}
.tile-top{display:flex;align-items:center;justify-content:space-between}
.tile-ic{font-size:23px}.tile-go{font-size:14px;color:var(--muted)}
.tile-val{font-size:23px;font-weight:800;color:var(--ink);line-height:1.1;margin-top:8px}
.tile-lbl{font-size:13px;font-weight:700;margin-top:3px}
.tile-sub{font-size:11px;color:var(--muted);margin-top:1px}
/* phone hero */
.phero{display:flex;align-items:center;justify-content:space-between;background:var(--accent);color:#fff;
  border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.phero.over{background:var(--now)}
.phero-num{font-size:34px;font-weight:800;line-height:1}.phero-num span{font-size:16px;font-weight:700;margin-left:2px}
.phero-lbl{font-size:12px;font-weight:700;opacity:.9;margin-top:3px}
.phero-sub{text-align:right;font-size:13px;line-height:1.7;color:rgba(255,255,255,.9)}.phero-sub b{font-size:15px;color:#fff}
/* day selector + plan button */
.daybar{display:flex;gap:6px;margin-bottom:12px}
.daybtn{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 0;
  font-family:inherit;font-weight:700;font-size:14px;color:var(--muted);cursor:pointer}
.daybtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.planbtn{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:8px;
  padding:5px 9px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;align-self:flex-start}
.planbtn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
/* sheet summary rows */
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;border-bottom:1px solid var(--line2);font-size:14px}
.srow:last-child{border-bottom:0}.sheet-list{margin-bottom:10px}
/* header date clickable */
#hDate{cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:5px;border-radius:8px;
  padding:2px 6px;margin-right:-6px;transition:.15s}
#hDate:active{background:var(--line2)}
.past-badge{font-size:10px;font-weight:800;background:var(--now);color:#fff;padding:2px 6px;border-radius:6px;vertical-align:middle}
.cal-icon{font-size:14px;opacity:.7}
/* calendar grid */
.cal-grid{width:100%;border-collapse:collapse;margin-top:4px}
.cal-grid th{font-size:11px;font-weight:800;color:var(--muted);padding:4px 0;text-align:center}
.cal-grid th.cal-wkend{color:var(--now)}
.cal-grid td{text-align:center;padding:0;width:14.28%}
.cal-cell{font-size:14px;font-weight:600;padding:9px 4px 7px;border-radius:10px;cursor:pointer;position:relative;line-height:1}
.cal-cell:active{background:var(--line2)}
.cal-wkend.cal-cell{color:var(--now)}
.cal-today{background:var(--accent-soft);color:var(--accent);font-weight:800}
.cal-sel{background:var(--accent)!important;color:#fff!important;font-weight:800}
.cal-future{color:var(--line);pointer-events:none}
.cal-dot{display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin:3px auto 0}
.cal-sel .cal-dot{background:rgba(255,255,255,.7)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="h-top">
      <div class="h-name">은서 하루 <small id="hChild"></small></div>
      <div class="h-date" id="hDate"></div>
    </div>
  </header>
  <nav><div class="inner">
    <button data-tab="today" class="on"><span class="ic">🗓️</span>오늘</button>
    <button data-tab="week"><span class="ic">📅</span>시간표</button>
    <button data-tab="after"><span class="ic">🏃</span>방과후</button>
    <button data-tab="study"><span class="ic">📚</span>학습</button>
    <button data-tab="phone"><span class="ic">📱</span>핸드폰</button>
    <button data-tab="money"><span class="ic">💰</span>용돈</button>
    <button data-tab="habit"><span class="ic">🔥</span>습관</button>
    <button data-tab="data"><span class="ic">⚙️</span>자료</button>
  </div></nav>
  <main id="view"></main>
</div>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============ SEED DATA (6학년 이은서) ============ */
const SEED = {
  child:{name:"이은서",grade:"초6",school:"풍천초등학교",classroom:"1반",birthdate:"2014-10-20"},

    {id:"taekwon",name:"특공무술",icon:"🥋",kind:"after",match:"특공무술"},

  ],
  week:{
    label:"6월 22일 ~ 26일 (17주)",
    note:"학교 시간표는 매주 바뀝니다. 주간학습 안내 PDF를 올리면 이번 주 시간표로 채울 수 있어요. (아침활동: 매일 독서, 금요일 독서록 제출)",
    days:{
      "월":[{p:1,s:"도덕",t:"인공지능으로 일하는 미래"},{p:2,s:"영어",t:"Into the Art"},{p:3,s:"국어",t:"견학 기록문 쓰기"},{p:4,s:"미술",t:"시대별 미술 작품 감상 ★평가"},{p:5,s:"미술",t:"시대별 미술 작품 감상 ★평가"},{p:6,s:"자율",t:"동아리 활동 정리 발표"}],

function clone(o){return JSON.parse(JSON.stringify(o));}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast("저장 공간이 가득 찼어요");}

async function syncPush(){
  if(!syncUrl) return;
  try{
    const r=await fetch(syncUrl+"/state",{
      method:"PUT",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(S),signal:AbortSignal.timeout(5000)
    });

  }catch(e){ _setSyncStatus("err"); console.warn("[sync]",e.message); }
}

async function syncPull(){

  try{
    const r=await fetch(syncUrl+"/state",{signal:AbortSignal.timeout(5000)});

    S=await r.json(); normalize(); save(); render();

  }catch(e){ toast("서버 연결 실패: "+e.message); _setSyncStatus("err"); }
}

function todayPreps(dow,tt,ev){
  const out=[], seen=new Set();
  const add=(item,why)=>{ const key=item.trim(); if(!key||seen.has(key))return; seen.add(key); out.push({item:key,why:why}); };
  S.supplyRules.forEach(r=>{
    let match=false, why="";
    if(r.type==="요일"){ const ds=r.val.split(",").map(s=>s.trim()); if(ds.includes(dow)){match=true;why=r.n||"요일 준비물";} }
    if(match) r.items.forEach(it=>add(it,why));
  });
  // 방과후 구분(과목/이벤트)에 따른 규칙
  const after=(S.after[dow]||[]);
  const kinds=new Set(after.map(a=>a.c+" "+a.k));
  S.supplyRules.forEach(r=>{
    if(r.type==="요일")return;
    const hit=[...kinds].some(k=>k.includes(r.val))|| (S.events.some(e=>e.date===todayStr()&&(e.type.includes(r.val)||e.title.includes(r.val))));
    if(hit) r.items.forEach(it=>add(it,(r.n||r.val)));
  });
  ev.forEach(e=>{ if(e.prep) e.prep.split(",").forEach(p=>add(p.trim(),e.title)); });
  return out;
}

  } else h+=`<div class="empty">예: 큐티 1회 +1,000원 · 6/30까지 5천원 이상 보유 시 +3,000원</div>`;
  h+=`</div></div>`;

  h+=`<div class="card"><div class="card-h"><h2><span class="em">🧾</span>용돈 기록</h2>

      h+=`<div class="led"><div style="flex:1"><div class="lr-t" style="font-size:13px">${esc(l.category)} ${l.memo?`<span class="tiny muted">${esc(l.memo)}</span>`:''}</div>

  } else h+=`<div class="empty">기록이 없어요.</div>`;

  setHeader();

  window.scrollTo(0,0);
}
function renderView(){ paintView(); }  // 데이터만 갱신: 스크롤 유지
let OPEN_MATS=new Set();
function toggleMat(mid){
  if(OPEN_MATS.has(mid))OPEN_MATS.delete(mid); else OPEN_MATS.add(mid);
  const t=document.querySelector(`.mat[data-mid="${mid}"] .toc`); if(t)t.classList.toggle("open");
}
function go(tab){ closeSheet(); TAB=tab; AF_DAY=null; render(); }
function bindDynamic(){
  // 완료 체크 (오늘 방과후·준비물) — 제자리 토글, 스크롤 유지
  document.querySelectorAll("[data-done]").forEach(el=>el.onclick=()=>{
    const id=el.dataset.done, date=viewDateStr();
    if(!S.done[date])S.done[date]=[];
    const arr=S.done[date], k=arr.indexOf(id), on=k<0;
    if(k>=0)arr.splice(k,1); else arr.push(id);
    save();
    el.classList.toggle("on",on);
    const item=el.closest(".tl-item"); if(item)item.classList.toggle("done",on);
    const cl=el.parentNode.querySelector(".cl-txt"); if(cl)cl.classList.toggle("done2",on);
  });
  // 학습 진도 — 제자리 토글 + 진도바 갱신 (목차 펼침 유지)
  document.querySelectorAll("[data-toc]").forEach(el=>el.onclick=()=>{
    const[mid,i]=el.dataset.toc.split("|"); const m=S.materials.find(x=>x.id===mid);
    const t=m.toc[+i]; t.done=!t.done; t.dt=t.done?todayStr():""; save();
    el.classList.toggle("on",t.done);
    const it=el.closest(".toc-it"); if(it){
      it.classList.toggle("d",t.done);
      let dtv=it.querySelector(".dt");
      if(t.done){ if(!dtv){dtv=document.createElement("span");dtv.className="dt";it.appendChild(dtv);} dtv.textContent=t.dt; }
      else if(dtv){ dtv.remove(); }
    }
    const mat=el.closest(".mat");
    if(mat){ const tot=m.toc.length,dn=m.toc.filter(x=>x.done).length,pct=tot?Math.round(dn/tot*100):0;
      const bar=mat.querySelector(".bar i"); if(bar)bar.style.width=pct+"%";
      const pc=mat.querySelector(".pct"); if(pc)pc.textContent=dn+"/"+tot+" · "+pct+"%"; }
  });
  // 요일별 학습 계획 토글
  document.querySelectorAll("[data-plan]").forEach(el=>el.onclick=()=>{
    const[day,mid]=el.dataset.plan.split("|");
    if(!S.studyPlan[day])S.studyPlan[day]=[];
    const arr=S.studyPlan[day], k=arr.indexOf(mid);
    if(k>=0)arr.splice(k,1); else arr.push(mid);
    save(); renderView();
  });
}

function ensurePdfJs(){return new Promise((res,rej)=>{

  s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
  s.onload=()=>{try{pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}catch(e){}res();};
  s.onerror=()=>rej(new Error("pdfjs load fail"));document.head.appendChild(s);});}

async function importWeeklyPDF(inp){

const SUBJ=["국어","수학","영어","과학","사회","도덕","음악","미술","체육","실과","진로","자율","창체","동아리","보건","한문","정보","스포츠"];
function parseWeekly(items){
  const days=["월","화","수","목","금"];
  const prep=items.find(i=>i.s.replace(/\s/g,"")==="준비물");
  const floorY=prep?prep.y+8:-1e9;                        // 시간표 하단 경계(준비물 행)
  let anchors=items.filter(i=>i.y>floorY&&/^[1-7]?\s*교시$/.test(i.s)).map(i=>i.y);
  anchors=[...new Set(anchors.map(y=>Math.round(y)))].sort((a,b)=>b-a).slice(0,7);
  if(anchors.length<3)throw new Error("교시 인식 실패");
  const colX={};                                          // 요일 헤더 행(y 723 근처)만
  days.forEach(d=>{const c=items.filter(i=>i.y>715&&i.y<735&&i.s.replace(/\s/g,"")===d);if(c.length)colX[d]=c[0].x;});
  if(Object.keys(colX).length<5){                         // 헤더 못 찾으면 과목 x-범위로 추정
    const sx=items.filter(i=>SUBJ.includes(i.s.replace(/\s/g,""))&&i.y>floorY).map(i=>i.x);
    if(sx.length){const mn=Math.min(...sx),mx=Math.max(...sx);days.forEach((d,k)=>{if(colX[d]==null)colX[d]=mn+(mx-mn)*k/4;});}
  }
  const centers=days.map(d=>colX[d]).filter(x=>x!=null);
  if(centers.length<2)throw new Error("요일 열 인식 실패");
  const bounds=[];for(let i=0;i<centers.length-1;i++)bounds.push((centers[i]+centers[i+1])/2);
  const colOf=x=>{if(x<110)return -1;let i=0;while(i<bounds.length&&x>=bounds[i])i++;return i;};
  const bandOf=y=>{for(let i=0;i<anchors.length;i++){const top=i===0?anchors[i]+45:(anchors[i-1]+anchors[i])/2;
    const bot=i===anchors.length-1?Math.max(anchors[i]-45,floorY):(anchors[i]+anchors[i+1])/2;
    if(y<=top&&y>bot)return i+1;}return 0;};
  const grid={};days.forEach(d=>grid[d]={});
  items.forEach(it=>{if(it.y<=floorY)return;if(/교시$/.test(it.s))return;
    const c=colOf(it.x),p=bandOf(it.y);if(c<0||p<1)return;
    (grid[days[c]][p]=grid[days[c]][p]||[]).push(it);});
  const out={"월":[],"화":[],"수":[],"목":[],"금":[]};
  days.forEach(d=>{
    for(let p=1;p<=anchors.length;p++){
      const cell=(grid[d][p]||[]).sort((a,b)=>b.y-a.y||a.x-b.x);if(!cell.length)continue;
      const topY=cell[0].y;
      const head=cell.filter(i=>Math.abs(i.y-topY)<=6).sort((a,b)=>a.x-b.x).map(i=>i.s).join("").replace(/\s/g,"");
      const subj=SUBJ.find(s=>head.startsWith(s))||head;   // 과목: 윗줄 글자 이어붙여 사전 매칭
      const topic=cell.filter(i=>i.y<topY-6&&!/^\(?\d+[-–]?\d*/.test(i.s.replace(/\s/g,""))&&i.s!=="쪽")
        .map(i=>i.s).join(" ").replace(/★\s*학습으로의\s*평가/g,"★평가").replace(/\s+/g," ").trim();
      out[d].push({p,s:subj,t:topic});
    }
  });
  return out;
}
function serializeDays(days){
  return ["월","화","수","목","금"].map(d=>`[${d}]\n`+(days[d]||[]).sort((a,b)=>a.p-b.p).map(x=>`${x.s} | ${x.t||""}`).join("\n")).join("\n\n");

/* ============ 습관·기록 ============ */
function weekDates(){
  const d=new Date(); const off=(d.getDay()+6)%7;          // 월=0
  const mon=new Date(d); mon.setDate(d.getDate()-off); mon.setHours(0,0,0,0);
  const out=[]; for(let x=new Date(mon); x<=d; x.setDate(x.getDate()+1)) out.push(new Date(x));
  return out;
}
function lastNDates(n){const out=[];for(let k=n-1;k>=0;k--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-k);out.push(d);}return out;}
function sameDay(a,b){return a.toDateString()===b.toDateString();}
function weekRangeLabel(){const wk=weekDates();const f=wk[0],l=wk[wk.length-1];return `${f.getMonth()+1}/${f.getDate()} ~ ${l.getMonth()+1}/${l.getDate()}`;}
function inWeek(ds){const wk=weekDates();return ds>=todayStr(wk[0])&&ds<=todayStr(wk[wk.length-1]);}
function habitMatch(h,x){
  if(h.cat && x.k!==h.cat) return false;
  if(h.cats && !h.cats.includes(x.k)) return false;
  if(h.match && !((x.c||"").includes(h.match))) return false;
  return !!(h.cat||h.cats||h.match);
}
function afterStatus(h,date){
  const W=DOW[date.getDay()], list=S.after[W]||[], idxs=[];
  list.forEach((x,i)=>{ if(habitMatch(h,x)) idxs.push({x,i}); });
  if(!idxs.length) return {applicable:false,done:false};
  const arr=S.done[todayStr(date)]||[];
  return {applicable:true, done:idxs.some(({x,i})=>arr.includes(W+i+(x.st||x.et)))};
}
function streakAfter(h){
  let s=0;
  for(let k=0;k<120;k++){
    const d=new Date(); d.setDate(d.getDate()-k);
    const r=afterStatus(h,d);
    if(!r.applicable) continue;
    if(r.done) s++;
    else if(k===0) continue;            // 오늘은 아직 진행 중일 수 있어 끊지 않음
    else break;
  }
  return s;
}
function phoneWeek(days){
  let logged=0, ok=0;
  const dots=days.map(d=>{ const r=phoneDay(todayStr(d));
    if(!r.has) return "na"; logged++; if(r.ok)ok++; return r.ok?"on":"bad"; });
  return {dots,logged,ok};
}

    const up=(S.allowance.missions||[]).filter(m=>!m.paid).reduce((a,m)=>a+ +m.amount,0);
    body=`<div class="srow"><span>현재 잔액</span><b>${bal.toLocaleString()}원</b></div>
      <div class="srow"><span>이번 주 수입</span><b class="amt in">+${inc.toLocaleString()}</b></div>
      <div class="srow"><span>이번 주 지출</span><b class="amt out">−${exp.toLocaleString()}</b></div>
      ${up?`<div class="srow"><span>받을 예정(미션)</span><b style="color:var(--accent)">${up.toLocaleString()}원</b></div>`:''}`;
  }
  openSheet(`<h3>${title}<span class="x" onclick="closeSheet()">×</span></h3>
    <div class="sheet-list">${body}</div>
    <div class="sheet-act"><button class="btn" onclick="closeSheet()">닫기</button>
      <button class="btn pri" onclick="go('${dest}')">${title} 메뉴로 →</button></div>`);
}
function habitWeekSheet(){
  const wk=weekDates(); const afterH=S.habits.filter(h=>h.kind==="after");
  let appl=0,don=0; afterH.forEach(h=>wk.forEach(d=>{const r=afterStatus(h,d);if(r.applicable){appl++;if(r.done)don++;}}));
  const rate=appl?Math.round(don/appl*100):0;
  let b=`<div class="hhero"><div><div class="hhero-num">${rate}%</div><div class="hhero-lbl">이번 주 수행률</div></div>
    <div class="hhero-r"><div class="tiny muted">완료 ${don}/${appl}</div><div class="tiny muted" style="margin-top:3px">${weekRangeLabel()}</div></div></div>`;
  b+=`<div class="sec-eyebrow">매일 챙기는 루틴</div>`;
  afterH.forEach(hb=>{ const st=streakAfter(hb); let aw=0,dw=0;
    const dots=wk.map(d=>{const r=afterStatus(hb,d);if(!r.applicable)return "na";aw++;if(r.done){dw++;return "on";}return sameDay(d,new Date())?"today":"off";});
    b+=`<div class="hcard"><div class="hcard-h"><span class="hicon">${hb.icon}</span><span class="hname">${esc(hb.name)}</span>
      <span class="hstreak">${st>0?"🔥 "+st+"일 연속":"—"}</span></div>
      <div class="hdots">${dots.map(c=>`<span class="hd ${c}"></span>`).join("")}</div>
      <div class="tiny muted">이번 주 ${dw}/${aw}일${aw===0?" · 해당 일정 없음":""}</div></div>`; });
  b+=`<div class="sec-eyebrow">학습 진도</div>`;
  S.habits.filter(h=>h.kind==="study").forEach(hb=>{ const m=S.materials.find(x=>x.id===hb.mid); if(!m)return;
    const tot=m.toc.length,dn=m.toc.filter(t=>t.done).length,pct=tot?Math.round(dn/tot*100):0;
    const wkn=m.toc.filter(t=>t.done&&t.dt&&inWeek(t.dt)).length;
    b+=`<div class="hcard"><div class="hcard-h"><span class="hicon">${hb.icon}</span><span class="hname">${esc(hb.name)}</span>
      <span class="hstreak" style="color:var(--accent)">${dn}/${tot}강</span></div>
      <div class="bar" style="margin:9px 0 6px"><i style="width:${pct}%"></i></div>
      <div class="tiny muted">전체 ${pct}% · 이번 주 ${wkn}강</div></div>`; });
  const ph=S.habits.find(h=>h.kind==="phone");
  if(ph){ const {dots,logged,ok}=phoneWeek(lastNDates(7));
    b+=`<div class="sec-eyebrow">핸드폰 기준 · 최근 7일</div>
      <div class="hcard"><div class="hcard-h"><span class="hicon">📱</span><span class="hname">${esc(ph.name)}</span>
        <span class="hstreak" style="color:var(--accent)">${logged?ok+"/"+logged+"일":"—"}</span></div>
      <div class="hdots">${dots.map(c=>`<span class="hd ${c}"></span>`).join("")}</div>
      <div class="tiny muted">사용 ≤ 부여인 날${logged===0?" · 기록 없음":""}</div></div>`; }
  openSheet(`<h3>주간 수행 현황<span class="x" onclick="closeSheet()">×</span></h3>${b}
    <div class="sheet-act"><button class="btn" onclick="closeSheet()">닫기</button>
      <button class="btn coral" onclick="weekReview()">📝 리뷰 요약</button></div>`);
}
function weekReview(){
  const wk=weekDates();
  const lines=[`📝 은서 이번 주 돌아보기 (${weekRangeLabel()})`,""];
  S.habits.filter(h=>h.kind==="after").forEach(hb=>{
    let a=0,d=0; wk.forEach(dt=>{const r=afterStatus(hb,dt);if(r.applicable){a++;if(r.done)d++;}});
    if(a){const st=streakAfter(hb); lines.push(`${hb.icon} ${hb.name}: ${d}/${a}일${st>0?` (연속 ${st}일)`:""}`);}
  });
  S.habits.filter(h=>h.kind==="study").forEach(hb=>{
    const m=S.materials.find(x=>x.id===hb.mid); if(!m)return;
    const wkn=m.toc.filter(t=>t.done&&t.dt&&inWeek(t.dt)).length, dn=m.toc.filter(t=>t.done).length;
    lines.push(`${hb.icon} ${hb.name}: 이번 주 ${wkn}강 (누적 ${dn}/${m.toc.length})`);
  });
  const ph=S.habits.find(h=>h.kind==="phone");
  if(ph){const {logged,ok}=phoneWeek(lastNDates(7)); if(logged) lines.push(`📱 핸드폰 기준 준수: 최근 7일 중 ${ok}/${logged}일`);}
  lines.push("","잘한 점 먼저 칭찬하고, 다음 주 목표 하나만 같이 정해보기 👍");
  const m=lines.join("\n");
  openSheet(`<h3>이번 주 리뷰 요약<span class="x" onclick="closeSheet()">×</span></h3>
    <div class="msgbox">${esc(m)}</div>
    <div class="sheet-act"><button class="btn" onclick="closeSheet()">닫기</button>
      <button class="btn coral" onclick="copyMsg()">복사하기</button></div>
    <div class="tiny muted center" style="margin-top:8px">은서와 함께 보거나, 메신저로 공유하세요</div>`);
  window._msg=m;
}

/* ============ 날짜 달력 ============ */
function openCal(){
  CAL_MONTH=new Date(viewDate); CAL_MONTH.setDate(1);
  scrim.classList.add("on"); _paintCal();
}
function _paintCal(){
  const y=CAL_MONTH.getFullYear(), mo=CAL_MONTH.getMonth();
  const label=`${y}년 ${mo+1}월`;
  const today=todayStr(), sel=viewDateStr();
  // 이달에 데이터 있는 날 집합
  const dataDots=new Set([
    ...Object.keys(S.done),
    ...S.phoneLog.map(e=>e.date),
    ...S.allowance.ledger.map(e=>e.date)
  ]);
  // 달력 첫날~마지막날
  const first=new Date(y,mo,1), last=new Date(y,mo+1,0);
  let startDow=(first.getDay()+6)%7; // 월=0
  const rows=[];
  let day=1-startDow;
  while(day<=last.getDate()){
    const week=[];
    for(let i=0;i<7;i++,day++){
      if(day<1||day>last.getDate()){week.push(null);}
      else {
        const ds=`${y}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        week.push({day,ds,isToday:ds===today,isSel:ds===sel,hasDot:dataDots.has(ds),future:ds>today});
      }
    }
    rows.push(week);
  }
  const heads=["월","화","수","목","금","토","일"];
  let h=`<h3 style="justify-content:space-between;align-items:center;display:flex;margin-bottom:14px">
    <button class="iconbtn" style="font-size:20px" onclick="_calMonth(-1)">‹</button>
    <span style="font-size:16px;font-weight:800">${label}</span>
    <button class="iconbtn" style="font-size:20px" onclick="_calMonth(1)">›</button>
    <span class="x" style="margin-left:12px" onclick="closeSheet()">×</span></h3>`;
  // 헤더 행
  h+=`<table class="cal-grid"><thead><tr>`;
  heads.forEach((d,i)=>h+=`<th class="${i>=5?'cal-wkend':''}">${d}</th>`);
  h+=`</tr></thead><tbody>`;
  rows.forEach(week=>{
    h+=`<tr>`;
    week.forEach((c,i)=>{
      if(!c){h+=`<td></td>`;return;}
      const cls=['cal-cell',c.isToday?'cal-today':'',c.isSel?'cal-sel':'',i>=5?'cal-wkend':'',c.future?'cal-future':''].filter(Boolean).join(' ');
      h+=`<td class="${cls}" onclick="pickDate('${c.ds}')">${c.day}${c.hasDot?'<span class="cal-dot"></span>':''}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  // 오늘로 돌아가기
  if(!isViewToday()) h+=`<button class="btn pri" style="width:100%;padding:12px;margin-top:14px" onclick="pickDate('${today}')">📅 오늘로 돌아가기</button>`;
  else h+=`<div class="tiny muted center" style="margin-top:14px">오늘 날짜를 보고 있어요</div>`;
  sheet.innerHTML=h;
}
function _calMonth(dir){
  CAL_MONTH.setMonth(CAL_MONTH.getMonth()+dir);
  if(CAL_MONTH.getMonth()===new Date().getMonth()&&CAL_MONTH.getFullYear()===new Date().getFullYear()) CAL_MONTH.setDate(1);
  _paintCal();
}
function pickDate(ds){
  viewDate=new Date(ds+"T00:00:00"); closeSheet(); render();
}

/* ============ START ============ */
render();
</script>
