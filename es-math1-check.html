<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체크체크 수학 베이직 1-1 진도표</title>
<style>
  :root{
    --bg:#f5f3fb; --card:#ffffff; --primary:#7c5cdb; --primary-dark:#5b3fb0;
    --accent:#e94e9c; --text:#2c2640; --muted:#8a86a0; --line:#ece9f5;
    --done:#34c77b; --done-bg:#eafaf2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;padding:20px 14px 60px;}
  .wrap{max-width:760px;margin:0 auto;}
  header{background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff;border-radius:22px;padding:28px 26px;box-shadow:0 10px 30px rgba(124,92,219,.25);}
  header h1{font-size:1.45rem;font-weight:800;letter-spacing:-.5px;}
  header p{opacity:.9;font-size:.9rem;margin-top:6px;}
  .stats{display:flex;gap:14px;margin:18px 0 22px;flex-wrap:wrap;}
  .stat{flex:1;min-width:120px;background:var(--card);border-radius:16px;
    padding:16px 18px;box-shadow:0 4px 14px rgba(0,0,0,.04);}
  .stat .num{font-size:1.6rem;font-weight:800;color:var(--primary-dark);}
  .stat .lbl{font-size:.78rem;color:var(--muted);margin-top:2px;}
  .progress-outer{background:#e7e2f5;border-radius:99px;height:14px;overflow:hidden;margin-top:10px;}
  .progress-inner{background:linear-gradient(90deg,var(--primary),var(--accent));
    height:100%;width:0;border-radius:99px;transition:width .5s ease;}
  .unit{margin-top:24px;}
  .unit-title{display:flex;align-items:center;gap:10px;font-weight:800;
    font-size:1.05rem;margin:0 4px 10px;color:var(--primary-dark);}
  .unit-title .badge{background:var(--primary);color:#fff;font-size:.78rem;
    width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .unit-title .u-pct{margin-left:auto;font-size:.8rem;color:var(--muted);font-weight:600;}
  .card{background:var(--card);border-radius:16px;padding:6px;box-shadow:0 4px 14px rgba(0,0,0,.04);}
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
    transition:background .2s;flex-wrap:wrap;}
  .row+.row{border-top:1px solid var(--line);}
  .row.done{background:var(--done-bg);}
  .row .chk{width:24px;height:24px;flex-shrink:0;cursor:pointer;accent-color:var(--done);}
  .row .info{flex:1;min-width:160px;}
  .row .title{font-weight:600;font-size:.95rem;}
  .row.done .title{color:var(--done);}
  .row .meta{font-size:.78rem;color:var(--muted);margin-top:2px;}
  .row .date{border:1px solid var(--line);border-radius:10px;padding:7px 10px;
    font-size:.85rem;color:var(--text);background:#fafafe;font-family:inherit;}
  .row .date:focus{outline:2px solid var(--primary);border-color:transparent;}
  .test-row .title{color:var(--accent);font-weight:700;}
  footer{text-align:center;color:var(--muted);font-size:.78rem;margin-top:30px;}
  .reset{display:block;margin:18px auto 0;background:none;border:1px solid var(--line);
    color:var(--muted);padding:8px 16px;border-radius:10px;font-size:.8rem;cursor:pointer;}
  .reset:hover{color:var(--accent);border-color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>체크체크 수학 베이직 1-1 진도표</h1>
    <p>중1 · 수학 김은혜 선생님 · 총 45강 (19시간 58분)</p>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="doneCount">0</div><div class="lbl">완료한 강의</div></div>
    <div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">전체 강의</div></div>
    <div class="stat" style="flex-basis:100%;">
      <div class="num" id="pct">0%</div><div class="lbl">전체 진행률</div>
      <div class="progress-outer"><div class="progress-inner" id="bar"></div></div>
    </div>
  </div>

  <div id="list"></div>
  <button class="reset" id="resetBtn">기록 초기화</button>
  <footer>입력한 학습날짜와 확인 표시는 이 브라우저에 자동 저장됩니다.</footer>
</div>

<script>
const DATA = [
  {u:1, ut:"소인수분해", items:[
    {n:0, t:"OT", rt:"14:56", p:""},

    {n:6, t:"1. 소인수분해 단원테스트", rt:"26:49", p:"", test:true},
  ]},
  {u:2, ut:"최대공약수와 최소공배수", items:[
    {n:7, t:"공약수와 최대공약수", rt:"40:53", p:"05강 p.26"},
    {n:8, t:"공배수와 최소공배수", rt:"41:32", p:"06강 p.31"},
    {n:9, t:"2. 최대공약수와 최소공배수 단원테스트", rt:"22:17", p:"", test:true},
  ]},
  {u:3, ut:"정수와 유리수", items:[

    {n:12, t:"수의 대소관계", rt:"28:33", p:"09강 p.48"},
    {n:13, t:"3. 정수와 유리수 단원테스트", rt:"29:35", p:"", test:true},
  ]},
  {u:4, ut:"정수와 유리수의 계산", items:[
    {n:14, t:"정수와 유리수의 덧셈 (1)", rt:"18:30", p:"10강 p.56"},
    {n:15, t:"정수와 유리수의 덧셈 (2)", rt:"19:20", p:"10강 p.56"},
    {n:16, t:"정수와 유리수의 뺄셈 (1)", rt:"23:23", p:"11강 p.63"},
    {n:17, t:"정수와 유리수의 뺄셈 (2)", rt:"39:25", p:"11강 p.63"},
    {n:18, t:"정수와 유리수의 곱셈 (1)", rt:"26:32", p:"12강 p.71"},
    {n:19, t:"정수와 유리수의 곱셈 (2)", rt:"25:31", p:"13강 p.75"},
    {n:20, t:"정수와 유리수의 나눗셈", rt:"29:25", p:"14강 p.80"},
    {n:21, t:"정수와 유리수의 혼합계산", rt:"33:04", p:"15강 p.84"},
    {n:22, t:"4. 정수와 유리수의 계산 단원테스트", rt:"27:37", p:"", test:true},
  ]},
  {u:5, ut:"문자의 사용과 식", items:[
    {n:23, t:"문자를 사용한 식", rt:"32:07", p:"16강 p.92"},
    {n:24, t:"식의 값", rt:"22:37", p:"17강 p.97"},

    {n:26, t:"일차식의 계산 (2)", rt:"36:03", p:"19강 p.107"},
    {n:27, t:"5. 문자의 사용과 식 단원테스트", rt:"27:53", p:"", test:true},
  ]},
  {u:6, ut:"일차방정식", items:[
    {n:28, t:"등식", rt:"18:55", p:"20강 p.116"},
    {n:29, t:"등식의 성질", rt:"24:30", p:"21강 p.120"},
    {n:30, t:"일차방정식의 풀이", rt:"26:00", p:"22강 p.124"},
    {n:31, t:"복잡한 일차방정식의 풀이", rt:"25:29", p:"23강 p.128"},
    {n:32, t:"일차방정식의 활용 (1)", rt:"22:08", p:"24강 p.132"},
    {n:33, t:"일차방정식의 활용 (2)", rt:"21:52", p:"24강 p.132"},
    {n:34, t:"6. 일차방정식 단원테스트", rt:"34:43", p:"", test:true},
  ]},
  {u:7, ut:"좌표평면과 그래프", items:[
    {n:35, t:"순서쌍과 좌표", rt:"32:54", p:"25강 p.142"},
    {n:36, t:"그래프와 그 해석", rt:"27:40", p:"26강 p.148"},
    {n:37, t:"7. 좌표평면과 그래프 단원테스트", rt:"09:16", p:"", test:true},
  ]},
  {u:8, ut:"정비례와 반비례", items:[
    {n:38, t:"정비례의 뜻과 그래프", rt:"35:58", p:"27강 p.156"},
    {n:39, t:"정비례 관계의 그래프의 성질 (1)", rt:"22:19", p:"28강 p.162"},
    {n:40, t:"정비례 관계의 그래프의 성질 (2)", rt:"13:51", p:"28강 p.162"},
    {n:41, t:"반비례의 뜻과 그래프", rt:"31:35", p:"29강 p.169"},
    {n:42, t:"반비례 관계의 그래프의 성질 (1)", rt:"21:28", p:"30강 p.174"},
    {n:43, t:"반비례 관계의 그래프의 성질 (2)", rt:"15:54", p:"30강 p.174"},
    {n:44, t:"8. 정비례와 반비례 단원테스트", rt:"26:14", p:"", test:true},
  ]},
];

const KEY = "checkmath_1_1_progress";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  let total=0, done=0;

  DATA.forEach(unit=>{
    let uTotal=0, uDone=0;
    const section = document.createElement('div');
    section.className='unit';
    const card = document.createElement('div');
    card.className='card';

    unit.items.forEach(it=>{
      total++; uTotal++;
      const st = state[it.n] || {};
      if(st.checked){ done++; uDone++; }
      const row = document.createElement('div');
      row.className='row'+(st.checked?' done':'')+(it.test?' test-row':'');
      row.innerHTML = `
        <input type="checkbox" class="chk" ${st.checked?'checked':''} data-n="${it.n}">
        <div class="info">
          <div class="title">${it.n}. ${it.t}</div>
          <div class="meta">⏱ ${it.rt}${it.p?' · 📖 '+it.p:''}</div>
        </div>
        <input type="date" class="date" value="${st.date||''}" data-n="${it.n}">`;
      card.appendChild(row);
    });

    const pct = uTotal? Math.round(uDone/uTotal*100):0;
    section.innerHTML = `<div class="unit-title">
        <span class="badge">${unit.u}</span>${unit.ut}
        <span class="u-pct">${uDone}/${uTotal} · ${pct}%</span></div>`;
    section.appendChild(card);
    list.appendChild(section);
  });

  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  const pct = total? Math.round(done/total*100):0;
  document.getElementById('pct').textContent = pct+'%';
  document.getElementById('bar').style.width = pct+'%';
}

document.addEventListener('change', e=>{
  const n = e.target.dataset.n;
  if(n===undefined) return;
  state[n] = state[n] || {};
  if(e.target.classList.contains('chk')) state[n].checked = e.target.checked;
  if(e.target.classList.contains('date')) state[n].date = e.target.value;
  save(); render();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('모든 학습날짜와 확인 기록을 지울까요?')){ state={}; save(); render(); }
});

render();
</script>
</body>
</html>
