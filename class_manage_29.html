// CSV 다운로드 유틸
function downloadCSV(filename, rows){
  const BOM="\uFEFF"; // 한글 깨짐 방지
  const csv=BOM+rows.map(r=>r.map(c=>{
    const s=String(c==null?"":c).replace(/"/g,'""');
    return /[,"\n\r]/.test(s)?`"${s}"`:s;
  }).join(",")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// JSON 다운로드 유틸
function downloadJSON(filename, obj){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}));
  a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// 오늘 날짜 파일명용
function todayFilename(){ return todayStr().replace(/-/g,""); }

/* 항목별 내보내기 함수들 */
function exportAttendance(db){
  const students=db.students; const att=db.attendance||{};
  const dates=[...new Set(Object.keys(att))].sort();
  const header=["학번","학년","반","번호","이름",...dates];
  const rows=[header];
  students.forEach(s=>{
    rows.push([s.sid,s.grade,s.cls,s.no,s.name,...dates.map(d=>(att[d]&&att[d][s.id])||"")]);
  });
  downloadCSV(`출결_${todayFilename()}.csv`,rows);
}

function exportExams(db){
  const rows=[["시험명","학생ID","학번","학년","반","번호","이름","총점","만점","성취수준","문항별정오"]];
  (db.exams||[]).forEach(ex=>{
    Object.entries(ex.scores||{}).forEach(([sid,sc])=>{
      const s=db.students.find(x=>x.id===sid);
      if(!s) return;
      const score=studentScore(ex,sc);
      const max=examMax(ex);
      const g=score!=null?gradeOf(score,examBands(ex,db)):null;
      let marksStr="";
      if(sc.mode==="item"&&sc.marks) marksStr=Object.entries(sc.marks).map(([n,v])=>`${n}:${v?"O":"X"}`).join(" ");
      rows.push([ex.title,sid,s.sid,s.grade,s.cls,s.no,s.name,score,max,g?g.grade:"",marksStr]);
    });
  });
  downloadCSV(`지필평가_${todayFilename()}.csv`,rows);
}

function exportPerf(db){
  const perf=db.perf; if(!perf) return;
  const rows=[["학생ID","학번","학년","반","번호","이름","문제해결력","주제글쓰기","포트폴리오","합계","주제","글내용"]];
  db.students.forEach(s=>{
    const r=perfTotal(perf,s.id);
    const topic=perf.areas.topic.contents?.[s.id];
    rows.push([s.id,s.sid,s.grade,s.cls,s.no,s.name,
      r.parts.problem??"",r.parts.topic??"",r.parts.portfolio??"",r.total,
      topic?.topic??"",topic?.text??""]);
  });
  downloadCSV(`수행평가_${todayFilename()}.csv`,rows);
}

function exportPrep(db){
  const rows=[["날짜","반","교시","진도","학습지","할일"]];
  Object.entries(db.prep||{}).forEach(([k,v])=>{
    const [date,cls,period]=k.split("|");
    rows.push([date,cls,period,v.progress||"",v.handout||"",v.todo||""]);
  });
  rows.sort((a,b)=>a[0]<b[0]?-1:1);
  downloadCSV(`수업준비_${todayFilename()}.csv`,rows);
}

function exportObs(db){
  const rows=[["날짜","학생ID","학번","학년","반","번호","이름","코러닝","발표","질문","메모"]];
  Object.entries(db.obs||{}).forEach(([k,o])=>{
    const [date,sid]=k.split("|");
    const s=db.students.find(x=>x.id===sid);
    if(!s) return;
    rows.push([date,sid,s.sid,s.grade,s.cls,s.no,s.name,
      o.colearn?1:0,o.present?1:0,o.question?1:0,o.memo||""]);
  });
  rows.sort((a,b)=>a[0]<b[0]?-1:1);
  downloadCSV(`수업관찰_${todayFilename()}.csv`,rows);
}

function exportFormative(db){
  const rows=[["세트ID","제목","날짜","반","학생ID","학번","학년","반","번호","이름","점수","집중도","어려운점","서술","피드백"]];
  (db.formative?.sets||[]).forEach(fm=>{
    Object.entries(fm.results||{}).forEach(([sid,r])=>{
      const s=db.students.find(x=>x.id===sid);
      if(!s) return;
      rows.push([fm.id,fm.title,fm.date,fm.cls,sid,s.sid,s.grade,s.cls,s.no,s.name,
        r.score??"",r.focus??"",
        (r.difficulties||[]).join(" / "),
        (r.texts||[]).join(" / "),
        r.feedback||""]);
    });
  });
  downloadCSV(`형성평가_${todayFilename()}.csv`,rows);
}

function BackupManager({db,update}){
  const [restoreStatus,setRestoreStatus]=useState("");
  const fileRef=useRef(null);

  // 전체 백업
  function backupAll(){
    const data={_exported:todayStr(),_version:db._v,...db};
    downloadJSON(`교과학습관리_백업_${todayFilename()}.json`,data);
  }
  // 복원
  function handleRestore(e){
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.students||!data.classInfo){ setRestoreStatus("❌ 유효하지 않은 백업 파일입니다."); return; }
        if(!confirm(`백업 파일(${data._exported||"날짜미상"})으로 복원할까요?\n현재 데이터가 모두 백업 파일로 대체됩니다.`)) return;
        localStorage.setItem("eduapp_v1",JSON.stringify(data));
        setRestoreStatus("✅ 복원 완료. 페이지를 새로고침합니다.");
        setTimeout(()=>window.location.reload(),1200);
      }catch(err){ setRestoreStatus("❌ 파일을 읽을 수 없습니다: "+err.message); }
    };
    reader.readAsText(file);
  }

  const exports=[
    {key:"att",label:"출결 현황",desc:"날짜별 출결 상태 (학생×날짜)",ic:"✓",fn:()=>exportAttendance(db)},

    {key:"fm",label:"형성평가",desc:"세트별 학생 응답·점수·피드백",ic:"✎",fn:()=>exportFormative(db)},
  ];

  return (

      {/* 전체 백업/복원 */}

        <div className="card-h"><h3>💾 전체 백업 · 복원</h3></div>

          <div className="helpbox" style={{marginBottom:16}}>
            <span className="ic">ℹ</span>
            <div>전체 백업은 시스템의 <b>모든 데이터를 JSON 파일로</b> 내려받습니다. 나중에 같은 파일을 올리면 그 시점으로 복원됩니다. 수기 입력한 점수·메모·진도 등을 안전하게 보관하세요.</div>
          </div>
          <div className="row" style={{gap:12,flexWrap:"wrap"}}>
            <button className="btn primary" onClick={backupAll} style={{gap:8,fontSize:14,padding:"11px 22px"}}>
              ⬇ 전체 백업 다운로드
            </button>
            <div>
              <button className="btn ghost" onClick={()=>fileRef.current.click()} style={{fontSize:14,padding:"11px 22px"}}>

function usePerfStudents(db, cls){
  const scopeCls=db.perf.clsScope;

/* ---------- ① 문제해결력 (점수만 입력) ---------- */
function PerfSimpleScore({db,update,areaKey}){
  const area=db.perf.areas[areaKey];
  const scopeCls=db.perf.clsScope;
  const grades=[...new Set(db.students.filter(s=>scopeCls.includes(s.cls)).map(s=>s.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=[...new Set(db.students.filter(s=>s.grade===grade && scopeCls.includes(s.cls)).map(s=>s.cls))];
  const [cls,setCls]=useState(classesInGrade[0]||"");
  const [photos]=useState(()=>loadPhotos());
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls)
    .sort((a,b)=>a.no-b.no);
  const entered=list.filter(s=>area.scores[s.id]!=null).length;

  function setScore(sid,val){
    update(d=>{
      const sc=d.perf.areas[areaKey].scores;
      if(val==="") delete sc[sid];
      else sc[sid]=Math.max(0,Math.min(area.max,Number(val)));
    });
  }
  return (
    <div className="card">
      <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
        <h3>{area.name}</h3>
        <div className="seg">
          {grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>setGrade(g)}>{gradeLabel(g)}</button>)}
        </div>
        <div className="seg">
          {classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}
        </div>
        <span className="sub" style={{marginLeft:"auto"}}>입력 {entered}/{list.length} · 만점 {area.max}점</span>
      </div>
      <div className="scrollx">
        <table>
          <thead><tr><th style={{width:48}}></th><th style={{width:45}}>번호</th><th>이름</th><th style={{width:140}}>점수 (만점 {area.max})</th></tr></thead>
          <tbody>
            {list.map(s=>(
              <tr key={s.id}>
                <td><Avatar student={s} photos={photos} size={32}/></td>
                <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                <td style={{fontWeight:600}}>{s.name}</td>
                <td>
                  <input type="number" min="0" max={area.max} step="0.5" value={area.scores[s.id]??""} onChange={e=>setScore(s.id,e.target.value)} placeholder="–" style={{padding:"5px 9px",fontSize:13,width:100}}/>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function TopicImport({db,update,onClose}){
  const [txt,setTxt]=useState("");
  function apply(){
    const lines=txt.trim().split("\n").filter(l=>l.trim());
    if(!lines.length){ toast("내용이 없습니다"); return; }
    let matched=0, unmatched=[];
    update(d=>{
      const c=d.perf.areas.topic.contents;
      lines.forEach(line=>{
        const parts=line.split(/\t/).map(x=>x.trim()); // 탭 구분 (이름 / 주제 / 내용)
        if(parts.length<2) return;
        const [name, topic, text] = parts;
        const stu=d.students.find(s=>s.name===name || s.sid===name);
        if(stu){ c[stu.id]={topic:topic||"", text:text||""}; matched++; }
        else unmatched.push(name);
      });
    });
    toast(`${matched}명 매칭${unmatched.length?` · ${unmatched.length}명 미매칭`:""}`);
    if(unmatched.length) alert("매칭 안 됨:\n"+unmatched.join(", "));
    onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
        <div className="modal-h"><h3>구글폼 응답 업로드</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="helpbox" style={{marginBottom:14}}>
            <span className="ic">📋</span>
            <div>구글시트에서 <b>이름 · 주제 · 내용</b> 세 열을 복사해 붙여넣으세요(탭 구분). 이름으로 학생을 찾아 주제·내용을 채웁니다.</div>
          </div>
          <textarea rows={8} value={txt} onChange={e=>setTxt(e.target.value)} placeholder={"권소민\t피보나치 수열과 자연\t자연 속에서 발견되는 피보나치..."} style={{fontFamily:"monospace",fontSize:12.5,lineHeight:1.7}}/>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn primary" onClick={apply}>불러오기</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- ③ 포트폴리오 (학습지별 A/B/C 누적) ---------- */
function PerfPortfolio({db,update}){
  const port=db.perf.areas.portfolio;
  const scopeCls=db.perf.clsScope;
  const grades=[...new Set(db.students.filter(s=>scopeCls.includes(s.cls)).map(s=>s.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=[...new Set(db.students.filter(s=>s.grade===grade && scopeCls.includes(s.cls)).map(s=>s.cls))];
  const [cls,setCls]=useState(classesInGrade[0]||"");
  const [activeSheet,setActiveSheet]=useState(1);
  const [photos]=useState(()=>loadPhotos());
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls).sort((a,b)=>a.no-b.no);
  const n=port.sheetCount;

  function setGrade1(sid,sheet,g){
    update(d=>{
      const gr=d.perf.areas.portfolio.grades;
      gr[sid]=gr[sid]||{};
      if(gr[sid][sheet]===g) delete gr[sid][sheet];
      else gr[sid][sheet]=g;
    });
  }
  // 나머지 모두 A: 현재 회차에서 미입력 학생만 A 처리
  function markRestA(){
    const rest=list.filter(s=>{ const gr=port.grades[s.id]; return !gr||!gr[activeSheet]; });
    if(rest.length===0){ toast("이미 모두 입력됨"); return; }
    update(d=>{
      const gr=d.perf.areas.portfolio.grades;
      rest.forEach(s=>{ gr[s.id]=gr[s.id]||{}; gr[s.id][activeSheet]="A"; });
    });
    toast(`나머지 ${rest.length}명 A 처리`);
  }

  const cntByGrade={A:0,B:0,C:0,none:0};
  list.forEach(s=>{ const g=port.grades[s.id]?.[activeSheet]; if(g)cntByGrade[g]++; else cntByGrade.none++; });

  return (
    <div className="grid" style={{gap:14}}>
      <div className="card">
        <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
          <h3>{port.name}</h3>
          <div className="seg">{grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>setGrade(g)}>{gradeLabel(g)}</button>)}</div>
          <div className="seg">{classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}</div>
          <span className="sub" style={{marginLeft:"auto"}}>학습지 {n}회 · 만점 {port.max}점</span>
        </div>
        <div className="card-pad" style={{paddingTop:14,paddingBottom:14}}>
          {/* 회차 선택 */}
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:12}}>
            <span style={{fontSize:12.5,fontWeight:600,color:"var(--ink-2)"}}>학습지 회차</span>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {Array.from({length:n},(_,i)=>i+1).map(sheet=>(
                <button key={sheet} onClick={()=>setActiveSheet(sheet)}
                  className="att-btn" style={{width:"auto",minWidth:34,padding:"5px 10px",
                    background:activeSheet===sheet?"var(--accent)":"var(--surface)",
                    color:activeSheet===sheet?"#fff":"var(--ink-3)",
                    borderColor:activeSheet===sheet?"var(--accent)":"var(--line-2)"}}>{sheet}</button>
              ))}
            </div>
          </div>
          <div className="row" style={{gap:8,alignItems:"center"}}>
            <span className="pill green">A {cntByGrade.A}</span>
            <span className="pill warn">B {cntByGrade.B}</span>
            <span className="pill red">C {cntByGrade.C}</span>
            {cntByGrade.none>0 && <span className="pill gray">미입력 {cntByGrade.none}</span>}
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>
              <button className="btn primary sm" onClick={markRestA}>나머지 모두 A ✓</button>
              <button className="btn ghost sm" onClick={()=>{ if(confirm(`${activeSheet}회차 입력을 모두 지울까요?`)) update(d=>{ list.forEach(s=>{ if(d.perf.areas.portfolio.grades[s.id]) delete d.perf.areas.portfolio.grades[s.id][activeSheet]; }); }); }}>회차 초기화</button>
            </div>
          </div>
          <p style={{fontSize:11.5,color:"var(--ink-3)",marginTop:10}}>💡 B·C 학생만 먼저 체크한 뒤 <b>나머지 모두 A</b>를 누르면 나머지가 A로 일괄 처리됩니다. (A=3 · B=2 · C=1점 환산)</p>
        </div>
      </div>

      <div className="card">
        <div className="scrollx">
          <table>
            <thead><tr>
              <th style={{width:44}}></th><th style={{width:42}}>No</th><th>이름</th>
              <th style={{width:150}}>{activeSheet}회차 평가</th>
              <th style={{width:90,textAlign:"center"}}>누적 환산</th>
              <th style={{width:80,textAlign:"center"}}>최종점수</th>
            </tr></thead>
            <tbody>
              {list.map(s=>{
                const grRec=port.grades[s.id]||{};
                const cur=grRec[activeSheet];
                const raw=portfolioRawScore(grRec, n);
                const fin=portfolioFinal(raw, port.bands);
                const filled=Object.keys(grRec).filter(k=>k<=n).length;
                return (
                  <tr key={s.id}>
                    <td><Avatar student={s} photos={photos} size={30}/></td>
                    <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                    <td style={{fontWeight:600}}>{s.name}</td>
                    <td>
                      <div className="att-btns">
                        {["A","B","C"].map(g=>(
                          <button key={g} onClick={()=>setGrade1(s.id,activeSheet,g)}
                            className={"att-btn"+(cur===g?(g==="A"?" on-present":g==="B"?" on-late":" on-absent"):"")}
                            style={{width:38}}>{g}</button>
                        ))}
                      </div>
                    </td>
                    <td style={{textAlign:"center",fontSize:12.5}}>{raw}점 <span style={{color:"var(--ink-3)",fontSize:11}}>({filled}/{n})</span></td>
                    <td style={{textAlign:"center",fontWeight:700,color:"var(--accent)"}}>{fin}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ---------- ④ 종합 합산 ---------- */
function PerfTotal({db}){
  const perf=db.perf;
  const scopeCls=perf.clsScope;
  const grades=[...new Set(db.students.filter(s=>scopeCls.includes(s.cls)).map(s=>s.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=[...new Set(db.students.filter(s=>s.grade===grade && scopeCls.includes(s.cls)).map(s=>s.cls))];
  const [cls,setCls]=useState("전체");
  useEffect(()=>{ setCls("전체"); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && (cls==="전체"||s.cls===cls) && scopeCls.includes(s.cls))
    .sort((a,b)=> a.cls===b.cls? a.no-b.no : a.cls.localeCompare(b.cls,undefined,{numeric:true}));
  const a=perf.areas;
  const totalMax=a.problem.max+a.topic.max+a.portfolio.max;

  function exportCSV(){
    const head=["학년","반","번호","이름","문제해결력","주제글쓰기","포트폴리오","수행평가합계"];
    const lines=[head.join(",")];
    list.forEach(s=>{
      const {total,parts}=perfTotal(perf,s.id);
      lines.push([s.grade,s.cls,s.no,s.name,parts.problem??"",parts.topic??"",parts.portfolio??"",total].join(","));
    });
    const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
    const aE=document.createElement("a"); aE.href=URL.createObjectURL(blob);
    aE.download=`수행평가합계_${grade}학년${cls==="전체"?"":cls}.csv`; aE.click();
    toast("CSV 내보내기 완료");
  }

  return (
    <div className="card">
      <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
        <h3>수행평가 종합</h3>
        <div className="seg">{grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>setGrade(g)}>{gradeLabel(g)}</button>)}</div>
        <div className="seg">
          <button className={cls==="전체"?"on":""} onClick={()=>setCls("전체")}>전체</button>
          {classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}
        </div>
        <button className="btn sm" style={{marginLeft:"auto"}} onClick={exportCSV}>⬇ CSV</button>
      </div>
      <div className="card-pad" style={{paddingTop:12,paddingBottom:6}}>
        <span className="sub" style={{fontSize:12.5,color:"var(--ink-3)"}}>합계 만점 {totalMax}점 (문제해결 {a.problem.max} + 주제글쓰기 {a.topic.max} + 포트폴리오 {a.portfolio.max})</span>
      </div>
      <div className="scrollx">
        <table>
          <thead><tr>
            <th style={{width:50}}>반</th><th style={{width:42}}>No</th><th>이름</th>
            <th style={{width:90,textAlign:"center"}}>문제해결력<br/><span style={{fontWeight:400,fontSize:10}}>/{a.problem.max}</span></th>
            <th style={{width:90,textAlign:"center"}}>주제글쓰기<br/><span style={{fontWeight:400,fontSize:10}}>/{a.topic.max}</span></th>
            <th style={{width:90,textAlign:"center"}}>포트폴리오<br/><span style={{fontWeight:400,fontSize:10}}>/{a.portfolio.max}</span></th>
            <th style={{width:90,textAlign:"center"}}>합계<br/><span style={{fontWeight:400,fontSize:10}}>/{totalMax}</span></th>
          </tr></thead>
          <tbody>
            {list.map(s=>{
              const {total,parts}=perfTotal(perf,s.id);
              const cell=(v)=> v==null? <span style={{color:"var(--ink-3)",fontSize:12}}>–</span> : <b>{v}</b>;
              const complete = parts.problem!=null && parts.topic!=null && parts.portfolio!=null;
              return (
                <tr key={s.id}>
                  <td style={{color:"var(--ink-3)"}}>{s.cls}</td>
                  <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  <td style={{textAlign:"center"}}>{cell(parts.problem)}</td>
                  <td style={{textAlign:"center"}}>{cell(parts.topic)}</td>
                  <td style={{textAlign:"center"}}>{cell(parts.portfolio)}</td>
                  <td style={{textAlign:"center",fontWeight:700,color:complete?"var(--accent)":"var(--ink-3)"}}>{total}{!complete && <span style={{fontSize:10,color:"var(--warn)"}}> (미완)</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ---------- 수행평가 설정 (만점 + 포트폴리오 회차/급간) ---------- */
function PerfSettings({db,update,onClose}){
  const perf=db.perf;
  const [pMax,setPMax]=useState(perf.areas.problem.max);
  const [tMax,setTMax]=useState(perf.areas.topic.max);
  const [pfMax,setPfMax]=useState(perf.areas.portfolio.max);
  const [sheetCount,setSheetCount]=useState(perf.areas.portfolio.sheetCount);
  const [bands,setBands]=useState(perf.areas.portfolio.bands.map(b=>({...b})));

  const maxRaw=sheetCount*3; // 전부 A일 때 최대 환산점

  function addBand(){ setBands([...bands,{min:0,score:0}]); }
  function updBand(i,key,val){ const c=[...bands]; c[i]={...c[i],[key]:Number(val)||0}; setBands(c); }
  function delBand(i){ setBands(bands.filter((_,idx)=>idx!==i)); }
  function save(){
    // 급간 내림차순 정렬
    const sortedBands=[...bands].sort((a,b)=>b.min-a.min);
    update(d=>{
      d.perf.areas.problem.max=Number(pMax)||0;
      d.perf.areas.topic.max=Number(tMax)||0;
      d.perf.areas.portfolio.max=Number(pfMax)||0;
      d.perf.areas.portfolio.sheetCount=Math.max(1,Number(sheetCount)||1);
      d.perf.areas.portfolio.bands=sortedBands;
    });
    toast("설정을 저장했습니다"); onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
        <div className="modal-h"><h3>수행평가 설정</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <label className="fld">영역별 만점</label>
          <div className="row" style={{marginBottom:16}}>
            <div className="field" style={{flex:1,marginBottom:0}}><label className="fld" style={{fontWeight:400}}>문제해결력</label><input type="number" value={pMax} onChange={e=>setPMax(e.target.value)}/></div>
            <div className="field" style={{flex:1,marginBottom:0}}><label className="fld" style={{fontWeight:400}}>주제글쓰기</label><input type="number" value={tMax} onChange={e=>setTMax(e.target.value)}/></div>
            <div className="field" style={{flex:1,marginBottom:0}}><label className="fld" style={{fontWeight:400}}>포트폴리오</label><input type="number" value={pfMax} onChange={e=>setPfMax(e.target.value)}/></div>
          </div>

          <div style={{borderTop:"1px solid var(--line)",paddingTop:14}}>
            <label className="fld">포트폴리오 학습지 회차 수</label>
            <input type="number" min="1" value={sheetCount} onChange={e=>setSheetCount(e.target.value)} style={{width:120}}/>
            <span style={{fontSize:12,color:"var(--ink-3)",marginLeft:10}}>전부 A일 때 최대 환산점 = {maxRaw}점 (A 3·B 2·C 1 고정)</span>
          </div>

          <div style={{marginTop:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <label className="fld" style={{margin:0}}>최종점수 급간 (환산점 합 → 최종점수)</label>
              <button className="btn sm" onClick={addBand}>+ 급간</button>
            </div>
            <div style={{border:"1px solid var(--line)",borderRadius:8,overflow:"hidden"}}>
              <table>
                <thead><tr><th>환산점 (이상)</th><th>→ 최종점수</th><th style={{width:40}}></th></tr></thead>
                <tbody>
                  {bands.map((b,i)=>(
                    <tr key={i}>
                      <td><input type="number" value={b.min} onChange={e=>updBand(i,"min",e.target.value)} style={{padding:"4px 8px",fontSize:13,width:90}}/> 점 이상</td>
                      <td><input type="number" value={b.score} onChange={e=>updBand(i,"score",e.target.value)} style={{padding:"4px 8px",fontSize:13,width:80}}/> 점</td>
                      <td><button className="btn ghost sm danger" onClick={()=>delBand(i)} style={{padding:"3px 7px"}}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p style={{fontSize:11.5,color:"var(--ink-3)",marginTop:8}}>예: 27점 이상→15점, 24점 이상→13점… 높은 기준부터 자동 정렬됩니다. 환산점이 어느 급간에도 못 미치면 가장 낮은 급간 점수가 부여됩니다.</p>
          </div>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn primary" onClick={save}>저장</button>
        </div>
      </div>
    </div>
  );
}

function ExamEditor({examId,db,update,onClose}){
  const exam=db.exams.find(e=>e.id===examId);
  const [title,setTitle]=useState(exam.title);
  const [date,setDate]=useState(exam.date);
  const [items,setItems]=useState(exam.items);

  function addItem(){
    const last=items[items.length-1];
    setItems([...items,{no:items.length+1,unit:last?.unit||"단원1",domain:last?.domain||"개념",pts:5,ans:""}]);
  }
  function upd(i,key,val){ const c=[...items]; c[i]={...c[i],[key]:key==="pts"?Number(val)||0:val}; setItems(c); }
  function del(i){ const c=items.filter((_,idx)=>idx!==i).map((it,idx)=>({...it,no:idx+1})); setItems(c); }
  function save(){
    update(d=>{ const e=d.exams.find(x=>x.id===examId); e.title=title; e.date=date; e.items=items; });
    toast("시험 구조를 저장했습니다"); onClose();
  }
  const units=[...new Set(items.map(i=>i.unit))];
  const totalPts=items.reduce((s,i)=>s+i.pts,0);

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
        <div className="modal-h"><h3>시험 구조 편집</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="row">
            <div className="field" style={{flex:2}}><label className="fld">평가명</label><input value={title} onChange={e=>setTitle(e.target.value)}/></div>
            <div className="field" style={{flex:1}}><label className="fld">시행일</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"6px 0 8px"}}>
            <label className="fld" style={{margin:0}}>문항 구성 ({items.length}문항 · 합계 {totalPts}점)</label>
            <button className="btn sm" onClick={addItem}>+ 문항</button>
          </div>
          <div style={{maxHeight:300,overflowY:"auto",border:"1px solid var(--line)",borderRadius:8}}>
            <table>
              <thead><tr><th style={{width:40}}>No</th><th>단원</th><th style={{width:90}}>영역</th><th style={{width:60}}>배점</th><th style={{width:36}}></th></tr></thead>
              <tbody>
                {items.map((it,i)=>(
                  <tr key={i}>
                    <td style={{color:"var(--ink-3)"}}>{it.no}</td>
                    <td><input list="unitlist" value={it.unit} onChange={e=>upd(i,"unit",e.target.value)} style={{padding:"4px 7px",fontSize:12.5}}/></td>
                    <td>
                      <select value={it.domain} onChange={e=>upd(i,"domain",e.target.value)} style={{padding:"4px 6px",fontSize:12.5}}>
                        <option>개념</option><option>계산</option><option>적용</option><option>탐구</option>
                      </select>
                    </td>
                    <td><input type="number" value={it.pts} onChange={e=>upd(i,"pts",e.target.value)} style={{padding:"4px 7px",fontSize:12.5}}/></td>
                    <td><button className="btn ghost sm danger" onClick={()=>del(i)} style={{padding:"3px 6px"}}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <datalist id="unitlist">{units.map(u=><option key={u} value={u}/>)}</datalist>
          <p style={{fontSize:11.5,color:"var(--ink-3)",marginTop:8}}>영역은 계산/개념 외에 적용·탐구도 선택할 수 있습니다. 단원명은 자유 입력입니다.</p>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn primary" onClick={save}>저장</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
