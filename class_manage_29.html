<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과학습 관리 시스템</title>
<style>
  :root{
    --bg:#f4f5f3; --surface:#ffffff; --surface-2:#faf9f6;
    --ink:#23241f; --ink-2:#5f5e58; --ink-3:#8a897f;
    --line:#e3e2da; --line-2:#d0cfc5;
    --accent:#2f6f5e; --accent-soft:#e2efe9; --accent-ink:#1d5142;
    --warn:#b5701a; --warn-soft:#f7ecd9;
    --danger:#a8392f; --danger-soft:#f6e3e0;
    --good:#3b6d2f; --good-soft:#e8f1de;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 1px 8px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    font-size:15px; line-height:1.55;
  }
  #root{display:flex;min-height:100vh}

  /* sidebar */
  .sidebar{
    width:250px;background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;
  }
  .brand{padding:20px 20px 16px;border-bottom:1px solid var(--line)}
  .brand h1{font-size:16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
  .brand p{font-size:11.5px;color:var(--ink-3);margin-top:5px;padding-left:35px}
  .nav{flex:1;overflow-y:auto;padding:10px 12px}
  .nav-group-label{font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-3);text-transform:uppercase;padding:14px 10px 6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--radius-sm);font-size:13.5px;color:var(--ink-2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .12s}
  .nav-item:hover{background:var(--surface-2)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
  .nav-item .ic{width:18px;text-align:center;font-size:15px;flex-shrink:0}
  .nav-badge{margin-left:auto;font-size:10px;background:var(--line);color:var(--ink-3);padding:1px 7px;border-radius:20px;font-weight:600}
  .sidebar-foot{padding:12px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}
  @keyframes pulse{0%{opacity:1}50%{opacity:.25}100%{opacity:1}}

  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
  .topbar h2{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .topbar .sub{font-size:12.5px;color:var(--ink-3)}
  .topbar-spacer{flex:1}
  .content{padding:24px 28px 60px;max-width:1100px;width:100%}

  .menu-toggle{display:none;background:none;border:1px solid var(--line-2);border-radius:8px;width:38px;height:38px;font-size:18px;cursor:pointer;color:var(--ink-2)}

  /* generic */
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-pad{padding:18px 20px}
  .card-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .card-h h3{font-size:14.5px;font-weight:700}
  .card-h .sub{font-size:12px;color:var(--ink-3)}
  .grid{display:grid;gap:14px}

  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .label{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
  .stat .val{font-size:27px;font-weight:700;letter-spacing:-.02em;margin-top:6px;line-height:1}
  .stat .val small{font-size:14px;color:var(--ink-3);font-weight:600}
  .stat .meta{font-size:11.5px;color:var(--ink-3);margin-top:7px}

  .btn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--surface);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .12s;white-space:nowrap}
  .btn:hover{background:var(--surface-2);border-color:var(--ink-3)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-ink)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.ghost{border-color:transparent;background:none}
  .btn.ghost:hover{background:var(--surface-2)}
  .btn.danger{color:var(--danger);border-color:var(--danger-soft)}
  .btn.danger:hover{background:var(--danger-soft)}

  input,select,textarea{font-family:inherit;font-size:14px;padding:8px 11px;border:1px solid var(--line-2);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  label.fld{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
  .field{margin-bottom:14px}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:11.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.03em;padding:10px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
  td{padding:10px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill.green{background:var(--good-soft);color:var(--good)}
  .pill.warn{background:var(--warn-soft);color:var(--warn)}
  .pill.red{background:var(--danger-soft);color:var(--danger)}
  .pill.gray{background:var(--line);color:var(--ink-2)}

  .seg{display:inline-flex;border:1px solid var(--line-2);border-radius:var(--radius-sm);overflow:hidden}
  .seg button{border:none;background:var(--surface);padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-2);font-family:inherit;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--accent);color:#fff}
  .seg button:disabled{background:var(--surface);color:var(--ink-3);opacity:.4;cursor:not-allowed}

  .att-btns{display:inline-flex;gap:5px}
  .att-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface);font-size:13px;font-weight:700;cursor:pointer;color:var(--ink-3);font-family:inherit;transition:all .1s}
  .att-btn:hover{border-color:var(--ink-3)}
  .att-btn.on-present{background:var(--good);border-color:var(--good);color:#fff}
  .att-btn.on-late{background:var(--warn);border-color:var(--warn);color:#fff}
  .att-btn.on-absent{background:var(--danger);border-color:var(--danger);color:#fff}
  .att-btn.on-excused{background:#5566aa;border-color:#5566aa;color:#fff}

  .empty{text-align:center;padding:48px 20px;color:var(--ink-3)}
  .empty .big{font-size:34px;margin-bottom:10px;opacity:.5}
  .empty p{font-size:13.5px}

  .modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal{background:var(--surface);border-radius:var(--radius);max-width:480px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.2)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-h h3{font-size:16px;font-weight:700}
  .modal-b{padding:20px 22px}
  .modal-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.25);animation:up .3s}
  @keyframes up{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

  .helpbox{background:var(--accent-soft);border:1px solid #c8e0d6;border-radius:var(--radius);padding:14px 16px;font-size:13px;color:var(--accent-ink);display:flex;gap:10px;line-height:1.5}
  .helpbox .ic{font-size:16px;flex-shrink:0}

  .bar-track{height:8px;background:var(--line);border-radius:20px;overflow:hidden}
  .bar-fill{height:100%;border-radius:20px;background:var(--accent)}

  .scrollx{overflow-x:auto}
  table.tt{border-collapse:separate;border-spacing:0;min-width:680px}
  table.tt th{background:var(--surface-2);padding:8px 6px;font-size:12.5px;border-bottom:1px solid var(--line)}
  table.tt td{border:1px solid var(--line);min-width:108px;height:54px}
  .tt-cell{padding:5px 7px;border-radius:6px;margin-bottom:3px;font-size:11.5px;line-height:1.35}
  .tt-cell:last-child{margin-bottom:0}
  .obs-chk{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .1s}
  .obs-chk:hover{border-color:var(--ink-3)}

  .cal-day{cursor:pointer;transition:background .12s}
  .cal-day:hover{background:rgba(255,255,255,0.26)!important}
  .daydetail-row{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px}
  .daydetail-row:last-child{margin-bottom:0}

  .dev-split{display:flex}
  @media(max-width:1100px){
    .dev-split{flex-direction:column}
    .dev-sebteuk{position:static !important;width:100%}
  }
  @media(max-width:860px){
    .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:transform .25s;box-shadow:0 0 40px rgba(0,0,0,.2)}
    .sidebar.open{transform:translateX(0)}
    .menu-toggle{display:flex;align-items:center;justify-content:center}
    .content{padding:18px 16px 60px}
    .topbar{padding:12px 16px}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:55}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef} = React;

/* ---------- 저장소: localStorage 기반 영구 저장 ---------- */
const DB_KEY = "eduapp_v1";
const DB_VERSION = 12; // 학사일정(휴일·시험·행사) 반영
function loadDB(){
  try{ const r = localStorage.getItem(DB_KEY); if(r) return JSON.parse(r); }catch(e){}
  return null;
}
function saveDB(db){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){ console.warn("저장 실패",e); }
}

/* ===================== 클라우드 동기화 (구글 드라이브) ===================== */
/* ▼▼▼ 설정: 아래 CLIENT_ID 한 줄만 본인 값으로 바꾸면 됩니다 (설정 안내는 별도 문서 참고) ▼▼▼ */
const CLOUD = {
  CLIENT_ID: "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",  // ← 구글 OAuth 클라이언트 ID 붙여넣기 (예: "1234567-abcd.apps.googleusercontent.com")
  SCOPE: "https://www.googleapis.com/auth/drive.file", // 앱이 만든 파일만 접근(최소 권한)
  FILE_NAME: "gyogwa_haksupgwalli_db.json",
};
/* ▲▲▲ 여기까지 ▲▲▲ */
const BASE_KEY="eduapp_base_v1", FILEID_KEY="eduapp_driveFileId_v1";
const cloudCfgOk = ()=> !!CLOUD.CLIENT_ID;
const httpsOk = ()=> location.protocol==="https:" || location.hostname==="localhost" || location.hostname==="127.0.0.1";
function loadBase(){ try{ return JSON.parse(localStorage.getItem(BASE_KEY)||"null"); }catch(e){ return null; } }
function saveBase(o){ try{ localStorage.setItem(BASE_KEY, JSON.stringify(o)); }catch(e){} }
function getFileId(){ try{ return localStorage.getItem(FILEID_KEY)||null; }catch(e){ return null; } }
function setFileId(id){ try{ id? localStorage.setItem(FILEID_KEY,id):localStorage.removeItem(FILEID_KEY); }catch(e){} }

/* ----- 3-way 병합 엔진 (base=마지막 동기화 기준, local=내 기기, remote=클라우드) ----- */
const ID_ARRAY_KEYS = { students:"id", exams:"id" }; // id 있는 배열은 id 기준 병합, 그 외 배열은 통째 3-way
function _isObj(x){ return x && typeof x==="object" && !Array.isArray(x); }
function _eq(a,b){ return JSON.stringify(a)===JSON.stringify(b); }
function _idx(arr,idf){ const m={}; (arr||[]).forEach(x=>{ if(x&&x[idf]!=null) m[x[idf]]=x; }); return m; }
function _scalar3(base,local,remote){
  if(_eq(local,remote)) return local;
  if(_eq(local,base)) return remote;   // 나만 그대로 → 클라우드 변경 채택
  if(_eq(remote,base)) return local;    // 클라우드 그대로 → 내 변경 채택
  return remote;                        // 둘 다 다르게(드묾) → 결정적 승자=클라우드
}
function _mergeArr(key,base,local,remote){
  const idf=ID_ARRAY_KEYS[key];
  if(!idf) return _scalar3(base,local,remote);
  base=base||[]; local=local||[]; remote=remote||[];
  const bm=_idx(base,idf), lm=_idx(local,idf), rm=_idx(remote,idf);
  const ids=new Set([...Object.keys(lm),...Object.keys(rm)]); const out=[];
  for(const id of ids){ const b=bm[id], l=lm[id], r=rm[id];
    if(l&&!r){ if(b&&_eq(b,l)) continue; out.push(l); continue; }   // 상대가 삭제 & 나는 그대로 → 삭제
    if(!l&&r){ if(b&&_eq(b,r)) continue; out.push(r); continue; }
    out.push(_isObj(l)&&_isObj(r)? _mergeObj(b,l,r) : _scalar3(b,l,r));
  }
  return out;
}
function _mergeObj(base,local,remote){
  base=base||{}; local=local||{}; remote=remote||{};
  const out={}; const keys=new Set([...Object.keys(local),...Object.keys(remote)]);
  for(const k of keys){ const b=base[k], l=local[k], r=remote[k]; const inL=k in local, inR=k in remote;
    if(inL&&!inR){ if((k in base)&&_eq(b,l)) continue; out[k]=l; continue; } // 상대가 삭제
    if(!inL&&inR){ if((k in base)&&_eq(b,r)) continue; out[k]=r; continue; }
    if(_isObj(l)&&_isObj(r)) out[k]=_mergeObj(b,l,r);
    else if(Array.isArray(l)&&Array.isArray(r)) out[k]=_mergeArr(k,b,l,r);
    else out[k]=_scalar3(b,l,r);
  }
  return out;
}
function mergeDB(base,local,remote){
  if(!remote || Object.keys(remote).length===0) return local;
  if(!local || Object.keys(local).length===0) return remote;
  const merged=_mergeObj(base||{},local,remote);
  merged._v=Math.max(local._v||0, remote._v||0, DB_VERSION);
  return merged;
}

/* ----- 구글 드라이브 REST ----- */
async function driveFind(token){
  const q=encodeURIComponent(`name='${CLOUD.FILE_NAME}' and trashed=false`);
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`,{headers:{Authorization:"Bearer "+token}});
  if(!r.ok) throw new Error("목록 조회 실패("+r.status+")");
  const j=await r.json(); return (j.files&&j.files[0])? j.files[0].id : null;
}
async function driveCreate(token,obj){
  const meta={name:CLOUD.FILE_NAME,mimeType:"application/json"};
  const boundary="eduapp"+Date.now();
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(obj)}\r\n--${boundary}--`;
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
    {method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"multipart/related; boundary="+boundary},body});
  if(!r.ok) throw new Error("파일 생성 실패("+r.status+")");
  return (await r.json()).id;
}
async function driveDownload(token,id){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{Authorization:"Bearer "+token}});
  if(r.status===404) return null;
  if(!r.ok) throw new Error("다운로드 실패("+r.status+")");
  const t=await r.text(); if(!t) return {};
  try{ return JSON.parse(t); }catch(e){ return {}; }
}
async function driveUpload(token,id,obj){
  const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
    {method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(obj)});
  if(!r.ok) throw new Error("업로드 실패("+r.status+")");
  return true;
}

/* ----- 동기화 컨트롤러 (React 훅) ----- */
function useCloud(dbRef, applyMerged){
  const [state,setState]=useState(()=>({status: cloudCfgOk()? (httpsOk()?"signedout":"needhost") : "local", lastSync:null, msg:null}));
  const tcRef=useRef(null), tokRef=useRef(null), busyRef=useRef(false), pendRef=useRef(false), timerRef=useRef(null);

  useEffect(()=>{
    if(!cloudCfgOk()||!httpsOk()) return;
    let tries=0;
    (function init(){
      if(!(window.google&&google.accounts&&google.accounts.oauth2)){ if(tries++<40){ setTimeout(init,300); } return; }
      tcRef.current=google.accounts.oauth2.initTokenClient({client_id:CLOUD.CLIENT_ID,scope:CLOUD.SCOPE,callback:()=>{}});
      setState(s=>({...s,status:"signedout"}));
    })();
    const onFocus=()=>{ if(tokRef.current) doSync(false); };
    window.addEventListener("focus",onFocus);
    return ()=>window.removeEventListener("focus",onFocus);
  },[]);

  function requestToken(interactive){
    return new Promise((res,rej)=>{
      const tc=tcRef.current; if(!tc){ rej(new Error("로그인 모듈 준비 중")); return; }
      tc.callback=(resp)=>{ if(resp&&resp.access_token){ tokRef.current={tok:resp.access_token,exp:Date.now()+((resp.expires_in||3500)*1000)}; res(resp.access_token); } else rej(new Error("로그인이 취소되었습니다")); };
      try{ tc.requestAccessToken({prompt: interactive?"consent":""}); }catch(e){ rej(e); }
    });
  }
  async function token(interactive){
    const t=tokRef.current;
    if(t&&t.tok&&Date.now()<t.exp-60000) return t.tok;
    return await requestToken(!!interactive);
  }
  async function doSync(interactive){
    if(!cloudCfgOk()||!httpsOk()) return;
    if(busyRef.current){ pendRef.current=true; return; }
    busyRef.current=true; setState(s=>({...s,status:"syncing",msg:null}));
    try{
      const tk=await token(interactive);
      let id=getFileId();
      let remote=null;
      if(id){ remote=await driveDownload(tk,id); if(remote===null){ id=null; setFileId(null); } }
      if(!id){ id=await driveFind(tk); if(id){ remote=await driveDownload(tk,id); } }
      const local=dbRef.current||{};
      const base=loadBase();
      const merged=mergeDB(base,local,remote||{});
      if(!id){ id=await driveCreate(tk,merged); }
      else{ await driveUpload(tk,id,merged); }
      setFileId(id); saveBase(merged); applyMerged(merged);
      setState(s=>({...s,status:"synced",lastSync:Date.now(),msg:null}));
    }catch(e){
      setState(s=>({...s,status:"error",msg:String(e&&e.message||e)}));
    }finally{
      busyRef.current=false;
      if(pendRef.current){ pendRef.current=false; setTimeout(()=>doSync(false),60); }
    }
  }
  function signIn(){ doSync(true); }
  function signOut(){
    const t=tokRef.current;
    if(t&&t.tok&&window.google&&google.accounts&&google.accounts.oauth2){ try{ google.accounts.oauth2.revoke(t.tok,()=>{}); }catch(e){} }
    tokRef.current=null; setState(s=>({...s,status:"signedout",lastSync:null,msg:null}));
  }
  function schedulePush(){
    if(!cloudCfgOk()||!httpsOk()) return;
    if(!tokRef.current) return; // 로그인 전엔 푸시 안 함
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>doSync(false),2500);
  }
  return {state,signIn,signOut,syncNow:()=>doSync(false),schedulePush};
}

// 로컬 시간 기준 YYYY-MM-DD (toISOString의 UTC 변환 버그 방지)
function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
const todayStr = ()=> ymd(new Date());
const DOW = ["일","월","화","수","목","금","토"];
// 특정 날짜에 수업이 있는 반 목록 (교시 순 정렬). 한 반이 같은 날 여러 교시면 각각 항목 생성.
function classesOnDay(classInfo, dateStr){
  if(!classInfo) return [];
  const d = new Date(dateStr+"T00:00");
  const dow = DOW[d.getDay()];
  const out=[];
  classInfo.forEach(c=>{
    if(!c.sched || c.sched[dow]==null) return;
    const periods = Array.isArray(c.sched[dow]) ? c.sched[dow] : [c.sched[dow]];
    periods.forEach(p=> out.push({...c, period:p, dow}));
  });
  return out.sort((a,b)=> a.period-b.period);
}
function gradeLabel(g){ return g+"학년"; }

// 날짜 → 그 주 월요일
function mondayOf(dateStr){
  const d=new Date(dateStr+"T00:00");
  const day=d.getDay(); // 0일~6토
  const diff=(day===0?-6:1-day);
  d.setDate(d.getDate()+diff);
  return ymd(d);
}
function addDays(dateStr,n){ const d=new Date(dateStr+"T00:00"); d.setDate(d.getDate()+n); return ymd(d); }
function fmtMD(dateStr){ const d=new Date(dateStr+"T00:00"); return (d.getMonth()+1)+"/"+d.getDate(); }
// prep 키
function prepKey(date,cls,period){ return date+"|"+cls+"|"+period; }
// 관찰 키
function obsKey(date,sid){ return date+"|"+sid; }

function avatarColor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length; return AVATAR_COLORS[h]; }
function Avatar({student, photos, size=34}){
  const photo = photos && photos[student.id];
  if(photo) return <img src={photo} alt={student.name} style={{width:size,height:size,borderRadius:8,objectFit:"cover",flexShrink:0}}/>;
  const col=avatarColor(student.name);
  return <div style={{width:size,height:size,borderRadius:8,background:col+"22",color:col,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:size*0.4,flexShrink:0}}>{student.name[0]}</div>;
}

let toastFn=null;
function Toaster(){
  const [msg,setMsg]=useState(null);
  useEffect(()=>{ toastFn=(m)=>{ setMsg(m); setTimeout(()=>setMsg(null),2200); }; },[]);
  if(!msg) return null;
  return <div className="toast">{msg}</div>;
}
const toast = m => toastFn && toastFn(m);

/* ---------- 클라우드 동기화 상태 표시 ---------- */
function CloudStatus({cloud, compact}){
  const {state,signIn,signOut,syncNow}=cloud;
  const t = state.lastSync ? new Date(state.lastSync).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}) : null;

  if(state.status==="local"){
    if(compact) return null;
    return <span title="CLIENT_ID를 넣고 https로 호스팅하면 기기 간 동기화가 켜집니다" style={{display:"inline-flex",alignItems:"center",gap:6}}>
      <span className="dot" style={{background:"var(--ink-3)"}}></span> 이 기기에만 저장 (클라우드 미설정)
    </span>;
  }
  if(state.status==="needhost"){
    if(compact) return null;
    return <span style={{display:"inline-flex",alignItems:"center",gap:6,color:"#b5701a"}}>
      <span className="dot" style={{background:"#b5701a"}}></span> https 주소에서 열어야 동기화됩니다 (file:// 불가)
    </span>;
  }
  const dotColor = state.status==="synced"?"var(--good)":state.status==="syncing"?"#2563a8":state.status==="error"?"#a8392f":"var(--ink-3)";
  const label = state.status==="syncing"?"동기화 중…":state.status==="synced"?(t?`동기화됨 · ${t}`:"동기화됨"):state.status==="error"?"동기화 실패":"동기화 꺼짐";
  const pulse = state.status==="syncing"?"pulse 1s infinite":"none";

  if(compact){
    return (
      <div style={{display:"inline-flex",alignItems:"center",gap:7}}>
        <span className="dot" style={{background:dotColor,animation:pulse}}></span>
        {state.status==="signedout"
          ? <button className="btn ghost sm" onClick={signIn}>☁ 동기화 로그인</button>
          : <button className="btn ghost sm" onClick={syncNow} disabled={state.status==="syncing"} title={state.msg||""}>{state.status==="syncing"?"동기화 중…":"↻ 동기화"}</button>}
      </div>
    );
  }
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6,width:"100%"}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:7}}>
        <span className="dot" style={{background:dotColor,animation:pulse}}></span>
        <span style={{fontWeight:600,color:"var(--ink-2)"}}>{label}</span>
      </div>
      {state.status==="error" && state.msg && <div style={{fontSize:10.5,color:"#a8392f",wordBreak:"break-all"}}>{state.msg}</div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {state.status==="signedout"
          ? <button className="btn primary sm" onClick={signIn}>☁ 구글로 동기화 시작</button>
          : <>
              <button className="btn ghost sm" onClick={syncNow} disabled={state.status==="syncing"}>↻ 지금 동기화</button>
              <button className="btn ghost sm" onClick={signOut}>로그아웃</button>
            </>}
      </div>
      <div style={{fontSize:10,color:"var(--ink-3)"}}>내 드라이브의 파일 1개에 보관 · 기기 간 자동 합침</div>
    </div>
  );
}

/* ---------- 월간 달력 (대시보드 헤더용) ---------- */
function MonthCalendar({db,onDayClick}){
  const cal=db.cal||{};
  const today=todayStr();
  const now=new Date();
  const [ym,setYm]=useState({y:now.getFullYear(), m:now.getMonth()}); // m: 0~11

  const first=new Date(ym.y, ym.m, 1);
  const startDow=first.getDay(); // 0=일
  const daysInMonth=new Date(ym.y, ym.m+1, 0).getDate();
  // 셀 배열 (앞 빈칸 + 날짜)
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const typeColor={off:"#ffd7d2", exam:"#ffe6c2", event:"#cfe2f7"};
  function dateStr(d){ return `${ym.y}-${String(ym.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
  function move(delta){ const nd=new Date(ym.y, ym.m+delta, 1); setYm({y:nd.getFullYear(), m:nd.getMonth()}); }
  function goToday(){ setYm({y:now.getFullYear(), m:now.getMonth()}); }

  const WK=["일","월","화","수","목","금","토"];
  // 이 달 일정 목록 (하단 범례용)
  const monthEvents=[];
  for(let d=1;d<=daysInMonth;d++){ const ev=cal[dateStr(d)]; if(ev) monthEvents.push({d,...ev}); }

  return (
    <div style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 14px",backdropFilter:"blur(2px)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>move(-1)} style={calNavStyle}>‹</button>
        <div style={{fontSize:14,fontWeight:700}}>{ym.y}년 {ym.m+1}월</div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={goToday} style={{...calNavStyle,width:"auto",padding:"0 10px",fontSize:11}}>오늘</button>
          <button onClick={()=>move(1)} style={calNavStyle}>›</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {WK.map((w,i)=>(
          <div key={w} style={{textAlign:"center",fontSize:10.5,fontWeight:600,opacity:.75,padding:"2px 0",color:i===0?"#ffd0c8":i===6?"#cfe0f5":"#fff"}}>{w}</div>
        ))}
        {cells.map((d,i)=>{
          if(d===null) return <div key={"e"+i}/>;
          const ds=dateStr(d);
          const ev=cal[ds];
          const isToday=ds===today;
          const dow=(startDow+d-1)%7;
          return (
            <div key={d} title={ev?ev.label:""} className={onDayClick?"cal-day":""}
              onClick={()=>onDayClick&&onDayClick(ds)} style={{
              position:"relative", textAlign:"center", fontSize:11.5, padding:"4px 0", borderRadius:6,
              minHeight:26,
              background:isToday?"rgba(255,255,255,0.9)":(ev?"rgba(255,255,255,0.08)":"transparent"),
              color:isToday?"var(--accent)":(dow===0?"#ffd0c8":dow===6?"#cfe0f5":"#fff"),
              fontWeight:isToday?800:500,
            }}>
              {d}
              {ev && <div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:5,height:5,borderRadius:"50%",background:typeColor[ev.type]}}/>}
            </div>
          );
        })}
      </div>
      {monthEvents.length>0 && (
        <div style={{marginTop:9,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.18)",display:"flex",flexDirection:"column",gap:3,maxHeight:88,overflowY:"auto"}}>
          {monthEvents.map(e=>(
            <div key={e.d} style={{display:"flex",gap:7,fontSize:11,alignItems:"center"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:typeColor[e.type],flexShrink:0}}/>
              <span style={{opacity:.8,width:30,flexShrink:0}}>{ym.m+1}/{e.d}</span>
              <span style={{opacity:.95,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
const calNavStyle={width:24,height:24,borderRadius:6,border:"none",background:"rgba(255,255,255,0.18)",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"};

/* ---------- 달력 날짜 클릭 → 하루 보기 (수업정보 · 수업준비 · 출결현황) ---------- */
function DayDetailModal({db,update,date,onClose,onAttendance}){
  const cal=db.cal||{};
  const ev=cal[date];
  const off = ev && (ev.type==="off"||ev.type==="exam");
  const classes = off? [] : classesOnDay(db.classInfo, date);
  const dayAtt = db.attendance[date]||{};
  const [prepCell,setPrepCell]=useState(null);
  const evTone = ev ? (ev.type==="off"?{bg:"#f6e3e0",c:"#a8392f",t:"휴업일"}
                      : ev.type==="exam"?{bg:"#f7ecd9",c:"#b5701a",t:"시험일"}
                      : {bg:"#eaf1f8",c:"#1d4e85",t:"행사"}) : null;

  function summ(cls){
    const studs=db.students.filter(s=>s.cls===cls);
    let marked=0,p=0,l=0,a=0,e=0;
    studs.forEach(s=>{ const v=dayAtt[s.id]; if(v){ marked++; if(v==="present")p++;else if(v==="late")l++;else if(v==="absent")a++;else if(v==="excused")e++; } });
    return {total:studs.length, marked, present:p, late:l, absent:a, excused:e};
  }

  return (
    <>
      <div className="modal-bg" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:580}}>
          <div className="modal-h">
            <h3>{fmtDate(date)} · 하루 보기</h3>
            <button className="btn ghost sm" onClick={onClose}>✕</button>
          </div>
          <div className="modal-b">
            {evTone && (
              <div style={{fontSize:12.5,fontWeight:600,padding:"7px 11px",borderRadius:8,background:evTone.bg,color:evTone.c,marginBottom:14}}>
                {evTone.t} · {ev.label}{off?" (수업 없음)":""}
              </div>
            )}
            {classes.length===0 ? (
              <div className="empty" style={{padding:"26px"}}>
                <div className="big">📅</div>
                <p>{off? `${ev.label}(으)로 수업이 없습니다.` : "이 날은 시간표상 수업이 없습니다."}</p>
              </div>
            ) : (
              <div>
                <div style={{fontSize:12,color:"var(--ink-3)",marginBottom:10}}>{classes.length}개 수업 · 교시 순</div>
                {classes.map(c=>{
                  const k=prepKey(date,c.cls,c.period);
                  const prep=db.prep[k]||{};
                  const hasPrep=prep.progress||prep.handout||prep.todo;
                  const s=summ(c.cls);
                  const col=gradeColor(c.grade);
                  const done=s.total>0 && s.marked>=s.total;
                  return (
                    <div key={c.cls+"_"+c.period} className="daydetail-row" style={{borderLeft:`4px solid ${col.bar}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:8}}>
                        <span style={{width:28,height:28,borderRadius:7,background:"var(--accent-soft)",color:"var(--accent-ink)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12}}>{c.period}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:700,color:col.ink,lineHeight:1.1}}>{gradeLabel(c.grade)} {c.cls}</div>
                          <div style={{fontSize:11,color:"var(--ink-3)"}}>{c.subject} · {c.period}교시 {db.periodTimes&&db.periodTimes[c.period]?`(${db.periodTimes[c.period]})`:""}</div>
                        </div>
                        {done ? <span className="pill green">완료</span>
                          : s.marked>0 ? <span className="pill warn">{s.marked}/{s.total}</span>
                          : <span className="pill gray">미체크</span>}
                      </div>

                      {/* 수업 준비 (진도/학습지/할일) */}
                      <div style={{background:"var(--surface-2)",borderRadius:8,padding:"8px 10px",marginBottom:8,fontSize:12}}>
                        {hasPrep ? (
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            {prep.progress && <div><span style={{color:"var(--ink-3)"}}>📖</span> {prep.progress}</div>}
                            {prep.handout && <div><span style={{color:"var(--ink-3)"}}>📄</span> {prep.handout}</div>}
                            {prep.todo && <div style={{color:"var(--ink-2)"}}><span style={{color:"var(--ink-3)"}}>✓</span> {prep.todo}</div>}
                          </div>
                        ) : <span style={{color:"var(--ink-3)",fontSize:11.5}}>진도·학습지·할 일이 아직 없습니다</span>}
                      </div>

                      {/* 출결 현황 */}
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        {s.marked>0 ? (
                          <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                            {s.present>0 && <span className="pill green" style={{fontSize:10.5}}>출석 {s.present}</span>}
                            {s.late>0 && <span className="pill warn" style={{fontSize:10.5}}>지각 {s.late}</span>}
                            {s.absent>0 && <span className="pill red" style={{fontSize:10.5}}>결석 {s.absent}</span>}
                            {s.excused>0 && <span className="pill gray" style={{fontSize:10.5}}>인정 {s.excused}</span>}
                            <span style={{fontSize:11,color:"var(--ink-3)"}}>/ {s.total}명</span>
                          </div>
                        ) : <span style={{fontSize:11.5,color:"var(--ink-3)"}}>출결 미체크 · {s.total}명</span>}
                        <div style={{marginLeft:"auto",display:"flex",gap:5}}>
                          <button className="btn ghost sm" onClick={()=>setPrepCell({date,cls:c.cls,period:c.period,dow:c.dow,subject:c.subject,grade:c.grade})}>준비</button>
                          <button className="btn sm" onClick={()=>{ onClose(); onAttendance&&onAttendance({date,grade:c.grade,cls:c.cls}); }}>출결</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div className="modal-f">
            <button className="btn primary" onClick={onClose}>닫기</button>
          </div>
        </div>
      </div>
      {prepCell && <PrepEditor db={db} update={update} cell={prepCell} onClose={()=>setPrepCell(null)}
        onAttendance={onAttendance?(t)=>{ setPrepCell(null); onClose(); onAttendance(t); }:undefined}/>}
    </>
  );
}

                <div key={c.cls+"_"+c.period} className="card" style={{border:done?"1px solid var(--good)":"1px solid var(--line)",padding:0}}>

                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{width:30,height:30,borderRadius:8,background:"var(--accent-soft)",color:"var(--accent-ink)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12.5}}>{c.period}</span>
                        <div>
                          <div style={{fontSize:15,fontWeight:700,lineHeight:1.1}}>{gradeLabel(c.grade)} {c.cls}</div>
                          <div style={{fontSize:11.5,color:"var(--ink-3)"}}>{c.subject} · {c.period}교시 {db.periodTimes&&db.periodTimes[c.period]?`(${db.periodTimes[c.period]})`:""}</div>
                        </div>
                      </div>
                      {done ? <span className="pill green">완료</span>
                        : pr.marked>0 ? <span className="pill warn">{pr.marked}/{pr.total}</span>
                        : <span className="pill gray">미체크</span>}
                    </div>

                    {/* 진도/학습지/할일 */}
                    <div style={{background:"var(--surface-2)",borderRadius:8,padding:"9px 11px",marginBottom:10,minHeight:38}}>
                      {(prep.progress||prep.handout||prep.todo) ? (
                        <div style={{display:"flex",flexDirection:"column",gap:3,fontSize:12}}>
                          {prep.progress && <div><span style={{color:"var(--ink-3)"}}>📖</span> {prep.progress}</div>}
                          {prep.handout && <div><span style={{color:"var(--ink-3)"}}>📄</span> {prep.handout}</div>}
                          {prep.todo && <div style={{color:"var(--ink-2)"}}><span style={{color:"var(--ink-3)"}}>✓</span> {prep.todo}</div>}
                        </div>
                      ) : (
                        <div style={{fontSize:11.5,color:"var(--ink-3)"}}>진도·학습지·할 일이 아직 없습니다</div>
                      )}
                    </div>

                    <div className="bar-track" style={{marginBottom:8}}><div className="bar-fill" style={{width:pct+"%",background:done?"var(--good)":"var(--accent)"}}/></div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                      {pr.marked>0 ? (
                        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                          {pr.present>0 && <span className="pill green" style={{fontSize:10.5}}>출석 {pr.present}</span>}
                          {pr.late>0 && <span className="pill warn" style={{fontSize:10.5}}>지각 {pr.late}</span>}
                          {pr.absent>0 && <span className="pill red" style={{fontSize:10.5}}>결석 {pr.absent}</span>}
                          {pr.excused>0 && <span className="pill gray" style={{fontSize:10.5}}>인정 {pr.excused}</span>}
                        </div>
                      ) : <span style={{fontSize:11.5,color:"var(--ink-3)"}}>출석 미체크</span>}

      {dayDetail && <DayDetailModal db={db} update={update} date={dayDetail} onClose={()=>setDayDetail(null)} onAttendance={(t)=>{ setDayDetail(null); go("attendance",t); }}/>}

      {/* 진행 단계 */}
      <div className="card">
        <div className="card-h"><h3>구축 진행 단계</h3><span className="sub">단계적으로 완성됩니다</span></div>
        <div className="card-pad">
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <RoadStep done n="1" t="대시보드 · 학생 명단 · 출석" d="사용 가능"/>

            <RoadStep n="5" t="종합 발달평가 + 형성평가" d="출석·평가 종합 서술, 구글폼 연동"/>
          </div>
        </div>

function RoadStep({n,t,d,done}){
  return (
    <div style={{display:"flex",gap:13,alignItems:"flex-start"}}>

/* ============================ STUDENTS ============================ */
function Students({db,update}){
  const grades=[...new Set(db.classInfo? db.classInfo.map(c=>c.grade): db.students.map(s=>s.grade))].sort();
  const [filterGrade,setFilterGrade]=useState(grades[0]||1);
  const [filterCls,setFilterCls]=useState("전체");
  const [q,setQ]=useState("");
  const [modal,setModal]=useState(null);
  const [importOpen,setImportOpen]=useState(false);
  const [photos,setPhotos]=useState(()=>loadPhotos());
  const fileRef=useRef(null);
  const [photoTarget,setPhotoTarget]=useState(null);

  // 현재 학년의 반 목록
  const classesInGrade=[...new Set(db.students.filter(s=>s.grade===filterGrade).map(s=>s.cls))];

  const filtered=db.students
    .filter(s=>s.grade===filterGrade)
    .filter(s=>filterCls==="전체"||s.cls===filterCls)
    .filter(s=>!q||s.name.includes(q)||(s.sid||"").includes(q))
    .sort((a,b)=> a.cls===b.cls ? a.no-b.no : a.cls.localeCompare(b.cls,undefined,{numeric:true}));

  function removeStudent(id){
    if(!confirm("이 학생을 명단에서 삭제할까요? 관련 출석 기록도 함께 사라집니다.")) return;
    update(d=>{
      d.students=d.students.filter(s=>s.id!==id);
      Object.keys(d.attendance).forEach(date=>{ delete d.attendance[date][id]; });
    });
    toast("학생을 삭제했습니다");
  }
  function pickPhoto(sid){ setPhotoTarget(sid); fileRef.current.click(); }
  function onPhotoFile(e){
    const file=e.target.files[0]; if(!file||!photoTarget) return;
    if(file.size>3*1024*1024){ alert("사진은 3MB 이하만 가능합니다."); return; }
    const reader=new FileReader();
    reader.onload=()=>{
      // 캔버스로 리사이즈(저장공간 절약)
      const img=new Image();
      img.onload=()=>{
        const max=200, sc=Math.min(max/img.width,max/img.height,1);
        const cv=document.createElement("canvas"); cv.width=img.width*sc; cv.height=img.height*sc;
        cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
        const data=cv.toDataURL("image/jpeg",0.8);
        const np={...photos,[photoTarget]:data}; setPhotos(np); savePhotos(np); toast("사진을 등록했습니다");
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }
  function delPhoto(sid){ const np={...photos}; delete np[sid]; setPhotos(np); savePhotos(np); toast("사진을 삭제했습니다"); }

  const gradeSubjects=db.classInfo? db.classInfo.filter(c=>c.grade===filterGrade) : [];
  const subjLabel=[...new Set(gradeSubjects.map(c=>c.subject))].join(", ");

  return (
    <div className="grid" style={{gap:16}}>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onPhotoFile}/>
      <div className="card">
        <div className="card-h">
          <h3>학생 명단</h3>
          <span className="sub">총 {db.students.length}명 · {db.classes.length}개 반</span>
          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            <button className="btn sm" onClick={()=>setImportOpen(true)}>⬇ 일괄 등록</button>
            <button className="btn primary sm" onClick={()=>setModal({mode:"add",student:{grade:filterGrade,cls:classesInGrade[0]||"",no:"",name:"",sid:""}})}>+ 학생 추가</button>
          </div>
        </div>
        <div className="card-pad" style={{paddingBottom:12}}>
          {/* 학년 셀렉트 (상위) */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,color:"var(--ink-2)",minWidth:34}}>학년</span>
            <div className="seg">
              {grades.map(g=> <button key={g} className={filterGrade===g?"on":""} onClick={()=>{setFilterGrade(g);setFilterCls("전체");}}>{gradeLabel(g)}</button>)}
            </div>
            {subjLabel && <span style={{fontSize:12,color:"var(--ink-3)"}}>· {subjLabel}</span>}
          </div>
          {/* 반 셀렉트 (하위) */}
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,fontWeight:700,color:"var(--ink-2)",minWidth:34}}>반</span>
            <div className="seg">
              <button className={filterCls==="전체"?"on":""} onClick={()=>setFilterCls("전체")}>전체</button>
              {classesInGrade.map(c=> <button key={c} className={filterCls===c?"on":""} onClick={()=>setFilterCls(c)}>{c}</button>)}
            </div>
            <div style={{flex:1,minWidth:120}}>
              <input placeholder="이름 또는 학번 검색" value={q} onChange={e=>setQ(e.target.value)}/>
            </div>
          </div>
        </div>
        <div className="scrollx">
          {filtered.length===0 ? (
            <div className="empty"><div className="big">👤</div><p>해당하는 학생이 없습니다.</p></div>
          ):(
          <table>
            <thead><tr>
              <th style={{width:54}}>사진</th><th style={{width:54}}>반</th><th style={{width:46}}>번호</th>
              <th>이름</th><th>학번</th><th style={{width:150,textAlign:"right"}}>관리</th>
            </tr></thead>
            <tbody>
              {filtered.map(s=>(
                <tr key={s.id}>
                  <td><Avatar student={s} photos={photos} size={36}/></td>
                  <td>{s.cls}</td>
                  <td>{s.no}</td>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  <td style={{color:"var(--ink-3)"}}>{s.sid||"–"}</td>
                  <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                    {photos[s.id]
                      ? <button className="btn ghost sm" onClick={()=>delPhoto(s.id)} title="사진 삭제">📷✕</button>
                      : <button className="btn ghost sm" onClick={()=>pickPhoto(s.id)} title="사진 등록">📷</button>}
                    <button className="btn ghost sm" onClick={()=>setModal({mode:"edit",student:s})}>수정</button>
                    <button className="btn ghost sm danger" onClick={()=>removeStudent(s.id)}>삭제</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          )}
        </div>
      </div>

      <div className="helpbox">
        <span className="ic">🔒</span>
        <div>학생 사진은 <b>이 기기에만</b> 저장되며 외부로 전송되지 않습니다(개인정보 보호). 📷 버튼으로 직접 등록·삭제할 수 있고, 등록하지 않으면 이름 첫 글자 아바타로 표시됩니다.</div>
      </div>

      {modal && <StudentModal db={db} modal={modal} update={update} onClose={()=>setModal(null)}/>}
      {importOpen && <ImportModal db={db} update={update} onClose={()=>setImportOpen(false)}/>}
    </div>
  );
}

function StudentModal({db,modal,update,onClose}){
  const [f,setF]=useState({grade:modal.student.grade||1, ...modal.student});
  const isEdit=modal.mode==="edit";
  const grades=[...new Set(db.students.map(s=>s.grade))].sort();
  function save(){
    if(!f.name.trim()){ toast("이름을 입력하세요"); return; }
    update(d=>{
      if(isEdit){
        const i=d.students.findIndex(s=>s.id===f.id);
        d.students[i]={...d.students[i],grade:Number(f.grade),cls:f.cls,no:Number(f.no)||0,name:f.name.trim(),sid:f.sid.trim()};
      }else{
        if(!d.classes.includes(f.cls)) d.classes.push(f.cls);
        d.students.push({id:"s"+Date.now(),grade:Number(f.grade),cls:f.cls,no:Number(f.no)||(d.students.filter(s=>s.cls===f.cls).length+1),name:f.name.trim(),sid:f.sid.trim()});
      }
    });
    toast(isEdit?"수정되었습니다":"학생을 추가했습니다");
    onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-h"><h3>{isEdit?"학생 정보 수정":"학생 추가"}</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="row">
            <div className="field" style={{flex:"0 0 110px"}}><label className="fld">학년</label>
              <select value={f.grade} onChange={e=>setF({...f,grade:e.target.value})}>
                {[1,2,3].map(g=><option key={g} value={g}>{g}학년</option>)}
              </select>
            </div>
            <div className="field" style={{flex:1}}><label className="fld">반</label>
              <input list="clslist" value={f.cls} onChange={e=>setF({...f,cls:e.target.value})} placeholder="예: 8반"/>
              <datalist id="clslist">{[...new Set(db.students.map(s=>s.cls))].map(c=><option key={c} value={c}/>)}</datalist>
            </div>
          </div>
          <div className="row">
            <div className="field" style={{flex:"0 0 100px"}}><label className="fld">번호</label>
              <input type="number" value={f.no} onChange={e=>setF({...f,no:e.target.value})} placeholder="번호"/></div>
            <div className="field" style={{flex:1}}><label className="fld">이름</label>
              <input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="홍길동"/></div>
          </div>
          <div className="field"><label className="fld">학번 (선택)</label>
            <input value={f.sid} onChange={e=>setF({...f,sid:e.target.value})} placeholder="예: 2026101"/></div>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn primary" onClick={save}>{isEdit?"저장":"추가"}</button>
        </div>
      </div>
    </div>
  );
}

function ImportModal({db,update,onClose}){
  const [txt,setTxt]=useState("");
  const sample="1반\t1\t김민준\t2026101\n1반\t2\t이서연\t2026102\n2반\t1\t박도윤\t2026201";
  function parse(){
    const lines=txt.trim().split("\n").filter(l=>l.trim());
    if(!lines.length){ toast("붙여넣은 내용이 없습니다"); return; }
    const rows=[];
    for(const line of lines){
      const parts=line.split(/\t|,/).map(x=>x.trim());
      if(parts.length<2) continue;
      const [cls,no,name,sid]=parts;
      if(!name && !no) continue;
      // 유연 처리: 4열(반,번호,이름,학번) 또는 3열(반,이름,학번)
      if(parts.length>=4) rows.push({cls,no:Number(no)||0,name,sid:sid||""});
      else if(parts.length===3) rows.push({cls,no:0,name:no,sid:name}); // 반,이름,학번
      else rows.push({cls,no:0,name:no,sid:""});
    }
    if(!rows.length){ toast("형식을 인식하지 못했습니다"); return; }
    update(d=>{
      rows.forEach(r=>{
        if(!d.classes.includes(r.cls)) d.classes.push(r.cls);
        d.students.push({id:"s"+Date.now()+Math.random().toString(36).slice(2,6),cls:r.cls,no:r.no||(d.students.filter(s=>s.cls===r.cls).length+1),name:r.name,sid:r.sid});
      });
      d.classes.sort();
    });
    toast(rows.length+"명을 등록했습니다");
    onClose();
  }
  function replaceAll(){
    if(!confirm("기존 학생 명단을 모두 지우고 새로 등록할까요? (출석 기록도 초기화됩니다)")) return;
    const lines=txt.trim().split("\n").filter(l=>l.trim());
    const rows=[];
    for(const line of lines){
      const parts=line.split(/\t|,/).map(x=>x.trim());
      if(parts.length<2) continue;
      const [cls,no,name,sid]=parts;
      if(parts.length>=4) rows.push({cls,no:Number(no)||0,name,sid:sid||""});
      else if(parts.length===3) rows.push({cls,no:0,name:no,sid:name});
    }
    if(!rows.length){ toast("형식을 인식하지 못했습니다"); return; }
    update(d=>{
      d.students=[]; d.classes=[]; d.attendance={};
      rows.forEach(r=>{
        if(!d.classes.includes(r.cls)) d.classes.push(r.cls);
        d.students.push({id:"s"+Date.now()+Math.random().toString(36).slice(2,6),cls:r.cls,no:r.no||(d.students.filter(s=>s.cls===r.cls).length+1),name:r.name,sid:r.sid});
      });
      d.classes.sort();
    });
    toast(rows.length+"명으로 교체했습니다");
    onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:540}}>
        <div className="modal-h"><h3>학생 일괄 등록</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="helpbox" style={{marginBottom:14}}>
            <span className="ic">📋</span>
            <div>엑셀이나 구글 시트에서 <b>반 / 번호 / 이름 / 학번</b> 순서로 복사해 아래에 붙여넣으세요.
            탭 또는 쉼표로 구분된 형식을 인식합니다.</div>
          </div>
          <textarea rows={8} value={txt} onChange={e=>setTxt(e.target.value)} placeholder={sample} style={{fontFamily:"monospace",fontSize:12.5,lineHeight:1.6}}/>
          <button className="btn ghost sm" style={{marginTop:8}} onClick={()=>setTxt(sample)}>예시 채우기</button>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn danger" onClick={replaceAll}>전체 교체</button>
          <button className="btn primary" onClick={parse}>추가 등록</button>
        </div>
      </div>
    </div>
  );
}

/* ============================ ATTENDANCE ============================ */
function Attendance({db,update,initial,onConsumed}){
  const grades=[...new Set(db.students.map(s=>s.grade))].sort();
  const [date,setDate]=useState(todayStr());
  const [grade,setGrade]=useState(()=>{
    // 오늘 수업 있는 반의 학년을 기본 선택
    const tc=classesOnDay(db.classInfo, todayStr());
    return tc[0]? tc[0].grade : (grades[0]||1);
  });
  const classesInGrade=[...new Set(db.students.filter(s=>s.grade===grade).map(s=>s.cls))];
  // 선택한 날짜에 시간표상 수업이 있는 반 집합
  const classesToday=new Set(classesOnDay(db.classInfo, date).map(c=>c.cls));
  // 그날 수업 있는 반 중 현재 학년에 해당하는 것
  const openClassesInGrade=classesInGrade.filter(c=>classesToday.has(c));
  // 그날 수업 있는 학년 집합

/* ============================ 지필평가 분석 ============================ */
function gradeOf(score, bands){
  for(const b of bands){ if(score>=b.min) return b; }
  return bands[bands.length-1];
}
// 시험별 분할점수 (시험에 bands가 있으면 우선, 없으면 전역 1학년 기준)
function examBands(exam, db){ return (exam && exam.bands) ? exam.bands : db.achievementBands; }
// 선택형 만점 (items 합산)
function examSelMax(exam){ return Math.round(exam.items.reduce((s,it)=>s+(Number(it.pts)||0),0)*10)/10; }
// 전체 만점 (선택형 + 서답형)
function examMax(exam){ return Math.round((examSelMax(exam) + (Number(exam.essayMax)||0))*10)/10; }

// 교과서 목차 기준 중단원 정렬 순서
const MIDUNIT_ORDER = ["다항식","나머지 정리와 인수분해","복소수와 이차방정식","이차방정식과 이차함수","여러 가지 방정식과 부등식"];
// 중단원 → 대단원 매핑
const BIGUNIT_OF = {
  "다항식":"Ⅰ. 다항식",
  "나머지 정리와 인수분해":"Ⅰ. 다항식",
  "복소수와 이차방정식":"Ⅱ. 방정식과 부등식",
  "이차방정식과 이차함수":"Ⅱ. 방정식과 부등식",
  "여러 가지 방정식과 부등식":"Ⅱ. 방정식과 부등식",
};
function midUnitSort(a,b){
  const ia=MIDUNIT_ORDER.indexOf(a), ib=MIDUNIT_ORDER.indexOf(b);
  return (ia<0?99:ia)-(ib<0?99:ib);
}

// 5등급제 누적 비율 컷 (2025~ 고교학점제 5등급제)
// 1등급 10% 이하 / 2등급 34% 이하 / 3등급 66% 이하 / 4등급 90% 이하 / 5등급 100%
const GRADE5_PCTS = [0.10, 0.34, 0.66, 0.90, 1.00];
const GRADE5_LABELS = ['1등급','2등급','3등급','4등급','5등급'];
// 전체 점수배열(내림차순)에서 각 등급 컷 점수 계산
function calc5GradeCuts(allScDesc){
  const total=allScDesc.length;
  return GRADE5_PCTS.map(p=>allScDesc[Math.min(Math.floor(p*total)-1,total-1)]);
}
// 점수 → 등급
function grade5Of(score, cuts){
  for(let i=0;i<cuts.length;i++) if(score>=cuts[i]) return i+1;
  return 5;
}

// 한 학생의 점수 계산 (서답형 포함)
function studentScore(exam, sc){
  if(!sc) return null;
  if(sc.mode==="total") return Number(sc.total)||0;
  // item 모드: 맞은 문항 배점 합 + 서답형
  let s=0;
  exam.items.forEach(it=>{ if(sc.marks && sc.marks[it.no]) s+=Number(it.pts)||0; });
  s += Number(sc.essayScore)||0;
  return Math.round(s*10)/10;
}
// 선택형만 점수 (문항 O/X 분석용)
function studentSelScore(exam, sc){
  if(!sc||sc.mode==="total") return null;
  let s=0;
  exam.items.forEach(it=>{ if(sc.marks && sc.marks[it.no]) s+=Number(it.pts)||0; });
  return Math.round(s*10)/10;
}

// 단원/영역/난이도별 집계 (item 모드 학생만 가능)
function analyzeBreakdown(exam){
  const units={}, domains={}, diffs={};
  exam.items.forEach(it=>{
    units[it.unit]=units[it.unit]||{name:it.unit,max:0,got:0,answered:0};
    units[it.unit].max += Number(it.pts)||0;
    domains[it.domain]=domains[it.domain]||{name:it.domain,max:0,got:0,answered:0};
    domains[it.domain].max += Number(it.pts)||0;
    if(it.diff){ diffs[it.diff]=diffs[it.diff]||{name:it.diff,max:0,got:0,answered:0}; diffs[it.diff].max+=Number(it.pts)||0; }
  });
  let itemStudents=0;
  Object.values(exam.scores||{}).forEach(sc=>{
    if(sc.mode!=="item"||!sc.marks) return;
    itemStudents++;
    exam.items.forEach(it=>{
      const ok = sc.marks[it.no];
      units[it.unit].answered += Number(it.pts)||0;
      domains[it.domain].answered += Number(it.pts)||0;
      if(it.diff){ diffs[it.diff].answered+=Number(it.pts)||0; }
      if(ok){
        units[it.unit].got += Number(it.pts)||0;
        domains[it.domain].got += Number(it.pts)||0;
        if(it.diff) diffs[it.diff].got+=Number(it.pts)||0;
      }
    });
  });
  const u = Object.values(units).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const d = Object.values(domains).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  const df = Object.values(diffs).map(x=>({...x,rate: x.answered? Math.round(x.got/x.answered*100):null}));
  return {units:u, domains:d, diffs:df, itemStudents};
}

/* ---------- 점수 입력 ---------- */

    .sort((a,b)=> a.cls===b.cls? a.no-b.no : a.cls.localeCompare(b.cls));

  function setTotal(sid,val){
    update(d=>{
      const e=d.exams.find(x=>x.id===exam.id);
      const v=val===""?null:Math.max(0,Math.min(max,Number(val)));
      if(v==null){ delete e.scores[sid]; }
      else e.scores[sid]={mode:"total",total:v};
    });
  }
  function toggleMark(sid,no){
    update(d=>{
      const e=d.exams.find(x=>x.id===exam.id);
      const cur=e.scores[sid];
      if(!cur||cur.mode!=="item") e.scores[sid]={mode:"item",marks:{}};
      const sc=e.scores[sid];
      sc.marks={...sc.marks,[no]:!sc.marks[no]};
    });
  }
  function setItemMode(sid,on){
    update(d=>{
      const e=d.exams.find(x=>x.id===exam.id);
      if(on){ const allRight={}; e.items.forEach(it=>allRight[it.no]=true); e.scores[sid]={mode:"item",marks:allRight}; }
      else delete e.scores[sid];
    });
  }
  const entered=list.filter(s=>exam.scores[s.id]).length;

  return (
    <>
    <div className="card">
      <div className="card-h" style={{gap:10}}>
        <div className="seg">
          <button className={cls==="전체"?"on":""} onClick={()=>setCls("전체")}>전체</button>
          {db.classes.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}
        </div>
        <span className="sub">입력 완료 {entered}/{list.length} · 만점 {max}점</span>
        <button className="btn sm" style={{marginLeft:"auto"}} onClick={()=>setImportOpen(true)}>⬇ 점수표 업로드</button>
      </div>
      <div className="helpbox" style={{margin:"14px 20px 4px"}}>
        <span className="ic">💡</span>
        <div><b>총점만 입력</b>하면 성취수준·분포가 나오고, <b>문항별 O/X</b>를 입력하면 단원·영역별 강약점까지 분석됩니다. 학생 이름 옆 <b>문항별</b>을 켜고 맞은 문항을 클릭하세요.</div>
      </div>
      <div className="scrollx">
        <table>
          <thead><tr>
            <th style={{width:50}}>반</th><th style={{width:42}}>No</th><th>이름</th>
            <th style={{width:130}}>총점 입력</th><th style={{width:70}}>성취</th><th style={{width:150}}>문항별 O/X</th>
          </tr></thead>
          <tbody>
            {list.map(s=>{
              const sc=exam.scores[s.id];
              const score=studentScore(exam,sc);
              const pct=score!=null&&max>0? Math.round(score/max*100):null;
              const g=pct!=null? gradeOf(pct,examBands(exam,db)):null;
              const isItem=sc&&sc.mode==="item";
              return (
              <React.Fragment key={s.id}>
              <tr>
                <td style={{color:"var(--ink-3)"}}>{s.cls}</td>
                <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                <td style={{fontWeight:600}}>{s.name}</td>
                <td>
                  {isItem ? <span style={{fontSize:12.5,color:"var(--ink-3)"}}>{score}점 <span style={{fontSize:11}}>(문항합산)</span></span>
                  : <input type="number" min="0" max={max} value={sc?.total??""} onChange={e=>setTotal(s.id,e.target.value)} placeholder="–" style={{padding:"5px 8px",fontSize:13}}/>}
                </td>
                <td>{g? <span className="pill" style={{background:g.color+"22",color:g.color}}>{g.grade} {pct}%</span> : <span style={{color:"var(--ink-3)",fontSize:12}}>–</span>}</td>
                <td>
                  {isItem
                    ? <button className="btn ghost sm" onClick={()=>setOpenStu(openStu===s.id?null:s.id)}>{openStu===s.id?"접기":"문항 펼치기"}</button>
                    : <button className="btn ghost sm" onClick={()=>{setItemMode(s.id,true);setOpenStu(s.id);}}>문항별로</button>}
                  {isItem && <button className="btn ghost sm" onClick={()=>setItemMode(s.id,false)} title="총점 입력으로 전환">↺</button>}
                </td>
              </tr>
              {isItem && openStu===s.id && (
                <tr><td colSpan={6} style={{background:"var(--surface-2)",padding:"12px 16px"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                    {exam.items.map(it=>{
                      const ok=sc.marks[it.no];
                      return (
                        <button key={it.no} onClick={()=>toggleMark(s.id,it.no)}
                          className={"att-btn"+(ok?" on-present":"")} style={{width:"auto",padding:"5px 9px",fontSize:11.5}}
                          title={`${it.unit} · ${it.domain} · ${it.pts}점`}>
                          {it.no}{ok?" ○":" ✕"}
                        </button>
                      );
                    })}
                  </div>
                  <p style={{fontSize:11,color:"var(--ink-3)",marginTop:8}}>버튼: 초록=정답, 회색=오답 · 클릭하여 토글</p>
                </td></tr>
              )}
              </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
    {importOpen && <ScoreImport exam={exam} db={db} update={update} onClose={()=>setImportOpen(false)}/>}
    </>
  );
}

/* ---------- 점수표 업로드 ---------- */
function ScoreImport({exam,db,update,onClose}){
  const [txt,setTxt]=useState("");
  const max=examMax(exam);
  function apply(){
    const lines=txt.trim().split("\n").filter(l=>l.trim());
    if(!lines.length){ toast("내용이 없습니다"); return; }
    let matched=0, unmatched=[];
    update(d=>{
      const e=d.exams.find(x=>x.id===exam.id);
      lines.forEach(line=>{
        const parts=line.split(/\t|,/).map(x=>x.trim());
        if(parts.length<2) return;
        const key=parts[0], scoreVal=Number(parts[parts.length-1]);
        if(isNaN(scoreVal)) return;
        // 이름 또는 학번으로 매칭
        const stu=d.students.find(s=>s.name===key||s.sid===key);
        if(stu){ e.scores[stu.id]={mode:"total",total:Math.max(0,Math.min(max,scoreVal))}; matched++; }
        else unmatched.push(key);
      });
    });
    toast(`${matched}명 점수 입력${unmatched.length?` · ${unmatched.length}명 미매칭`:""}`);
    if(unmatched.length) alert("매칭 안 된 항목(이름/학번 확인 필요):\n"+unmatched.join(", "));
    onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:540}}>
        <div className="modal-h"><h3>점수표 업로드</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="helpbox" style={{marginBottom:14}}>
            <span className="ic">📋</span>
            <div>구글시트·엑셀에서 <b>이름(또는 학번) / 총점</b> 두 열을 복사해 붙여넣으세요. 이름이나 학번으로 학생을 찾아 총점을 입력합니다. (만점 {max}점)</div>
          </div>
          <textarea rows={8} value={txt} onChange={e=>setTxt(e.target.value)}
            placeholder={"김민준\t88\n이서연\t92\n2026103\t75"} style={{fontFamily:"monospace",fontSize:12.5,lineHeight:1.7}}/>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn primary" onClick={apply}>불러오기</button>
        </div>
      </div>
    </div>
  );
}
