function diagnose(domains, units, diffs){
  const msgs = [];
  // 영역별 진단
  const conv=domains.find(d=>d.name==="복소수");
  const poly=domains.find(d=>d.name==="다항식");
  const func=domains.find(d=>d.name==="방정식·함수");
  const weakDomain=[conv,poly,func].filter(Boolean).sort((a,b)=>a.rate-b.rate)[0];
  if(weakDomain && weakDomain.rate<70)
    msgs.push(`'${weakDomain.name}' 영역(${weakDomain.rate}%)이 상대적으로 약합니다.`);

  // 난이도별 진단
  if(diffs){
    const easy=diffs.find(d=>d.name==="쉬움");
    const hard=diffs.find(d=>d.name==="어려움");
    if(easy && easy.rate<80) msgs.push(`쉬운 문항 득점률이 ${easy.rate}%로 낮습니다. 기본 개념 보강이 필요합니다.`);
    else if(hard && hard.rate<40) msgs.push(`어려운 문항(${hard.rate}%)에서 실점이 집중됩니다. 심화 학습이 효과적입니다.`);
  }
  // 단원별 최약점
  const weak=units[0];
  if(weak && weak.rate<60) msgs.push(`특히 '${weak.name}' 단원(${weak.rate}%)의 집중 보강이 필요합니다.`);
  else if(weak && weak.rate<80) msgs.push(`'${weak.name}' 단원이 상대적으로 약한 편입니다.`);

  return msgs.length? msgs.join(' ') : "전반적으로 고르게 학습된 상태입니다.";
}

/* ---------- 학급 분석 ---------- */
function ClassAnalysis({exam,db}){
  const scopeCls = exam.clsScope || db.classes;
  const [cls,setCls]=useState("전체");
  const max=examMax(exam);
  const list=db.students
    .filter(s=>scopeCls.includes(s.cls))
    .filter(s=>cls==="전체"||s.cls===cls)
    .filter(s=>exam.scores[s.id]);
  if(list.length===0) return <div className="card"><div className="empty"><div className="big">②</div><p>점수가 입력된 학생이 없습니다.</p></div></div>;

  const scores=list.map(s=>studentScore(exam,exam.scores[s.id]));
  const avg=(scores.reduce((a,b)=>a+b,0)/scores.length);
  const maxS=Math.max(...scores), minS=Math.min(...scores);
  const under40=scores.filter(s=>s<40).length; // 40점 미만 학생수

  const bands=examBands(exam,db);
  const allSc=exam.allScores;

  // 학급 성취수준 분포
  const dist={}; bands.forEach(b=>dist[b.grade]=0);
  scores.forEach(s=>{ dist[gradeOf(s,bands).grade]++; });

  // 학년 전체 성취수준 분포 (allScores 기준)
  const gradeDist={}; bands.forEach(b=>gradeDist[b.grade]=0);
  if(allSc) allSc.forEach(s=>{ gradeDist[gradeOf(s,bands).grade]++; });

  // 석차등급 컷 (5등급제, 학년 전체 기준)
  let cuts=null, clsRankDist=null, gradeRankDist=null;
  if(allSc){
    cuts=calc5GradeCuts(allSc);
    const rankOf=(score)=>grade5Of(score,cuts);
    // 학급 석차등급 분포
    clsRankDist=[1,2,3,4,5].map(()=>0);
    scores.forEach(s=>{ clsRankDist[rankOf(s)-1]++; });
    // 학년 석차등급 분포
    gradeRankDist=[1,2,3,4,5].map(()=>0);
    allSc.forEach(s=>{ gradeRankDist[rankOf(s)-1]++; });
  }

  // 단원/영역/난이도 분석
  const bd=analyzeBreakdown({...exam, scores:Object.fromEntries(list.map(s=>[s.id,exam.scores[s.id]]))});
  // 중단원/영역: 교과서 순서 정렬
  const unitsSorted=bd.units.filter(u=>u.rate!=null).sort((a,b)=>midUnitSort(a.name,b.name));
  const domainsSorted=bd.domains.filter(d=>d.rate!=null).sort((a,b)=>midUnitSort(a.name,b.name));

  const rateColor=(r)=> r<60?"var(--danger)":r<80?"var(--warn)":"var(--good)";

  // 가로 막대 행 (세로 배치용)
  function RateBar({name,rate,got,mx}){
    return (
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
          <span style={{fontWeight:600}}>{name}</span>
          <span style={{color:rateColor(rate),fontWeight:700}}>{rate}% <span style={{color:"var(--ink-3)",fontWeight:400,fontSize:11}}>({got.toFixed(1)}/{mx.toFixed(1)})</span></span>
        </div>
        <div className="bar-track"><div className="bar-fill" style={{width:rate+"%",background:rateColor(rate)}}/></div>
      </div>
    );
  }

  return (
    <div className="grid" style={{gap:14}}>
      <div className="card">
        <div className="card-h" style={{flexWrap:"wrap",gap:10}}>
          <div className="seg">
            <button className={cls==="전체"?"on":""} onClick={()=>setCls("전체")}>전체</button>
            {scopeCls.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}
          </div>
          <span className="sub" style={{marginLeft:"auto"}}>{list.length}명 분석 · 만점 {max}점</span>
        </div>
        <div className="card-pad">
          <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10}}>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">평균</div><div className="val" style={{fontSize:22}}>{avg.toFixed(1)}<small>점</small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">최고</div><div className="val" style={{fontSize:22}}>{maxS}<small>점</small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">최저</div><div className="val" style={{fontSize:22}}>{minS}<small>점</small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">40점 미만</div><div className="val" style={{fontSize:22,color:under40>0?"var(--danger)":"inherit"}}>{under40}<small>명</small></div></div>
          </div>
        </div>
      </div>

      {/* 성취수준 분포 + 석차등급 분포 (학년 대비) */}
      <div className="row" style={{gap:14}}>
        <div className="card" style={{flex:"1 1 300px"}}>
          <div className="card-h"><h3>성취수준 분포</h3><span className="sub">학급 vs 학년 전체</span></div>
          <div className="card-pad">
            {bands.map(b=>{
              const n=dist[b.grade], p=list.length?Math.round(n/list.length*100):0;
              const gn=gradeDist[b.grade]||0, gp=allSc?Math.round(gn/allSc.length*100):0;
              return (
                <div key={b.grade} style={{marginBottom:11}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                    <span><b style={{color:b.color}}>{b.grade}</b> <span style={{fontSize:11,color:"var(--ink-3)"}}>({b.min}점↑)</span></span>
                    <span style={{fontWeight:600}}>{n}명 <span style={{color:b.color,fontSize:11.5}}>{p}%</span>
                      {allSc && <span style={{color:"var(--ink-3)",fontSize:11,fontWeight:400}}> · 학년 {gp}%</span>}</span>
                  </div>
                  <div style={{position:"relative"}}>
                    <div className="bar-track"><div className="bar-fill" style={{width:p+"%",background:b.color}}/></div>
                    {allSc && <div style={{position:"absolute",top:-1,left:gp+"%",width:2,height:10,background:"var(--ink-2)"}} title={"학년 "+gp+"%"}/>}
                  </div>
                </div>
              );
            })}
            {allSc && <p style={{fontSize:11,color:"var(--ink-3)",marginTop:8}}>막대=학급 비율, 세로선=학년 전체 비율</p>}
          </div>
        </div>

        <div className="card" style={{flex:"1 1 300px"}}>
          <div className="card-h"><h3>석차등급 분포</h3><span className="sub">학급 vs 학년 전체</span></div>
          <div className="card-pad">
            {cuts ? [1,2,3,4,5].map((gnum,i)=>{
              const n=clsRankDist[i], p=list.length?Math.round(n/list.length*100):0;
              const gn=gradeRankDist[i], gp=Math.round(gn/allSc.length*100);
              const pctLabel=['10%','24%','32%','24%','10%'][i]; // 5등급제 기준 비율
              return (
                <div key={gnum} style={{marginBottom:11}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                    <span><b style={{color:"var(--accent)"}}>{gnum}등급</b> <span style={{fontSize:11,color:"var(--ink-3)"}}>({cuts[i].toFixed(1)}점↑ · 기준 {pctLabel})</span></span>
                    <span style={{fontWeight:600}}>{n}명 <span style={{color:"var(--accent)",fontSize:11.5}}>{p}%</span>
                      <span style={{color:"var(--ink-3)",fontSize:11,fontWeight:400}}> · 학년 {gp}%</span></span>
                  </div>
                  <div style={{position:"relative"}}>
                    <div className="bar-track"><div className="bar-fill" style={{width:p+"%",background:"var(--accent)"}}/></div>
                    <div style={{position:"absolute",top:-1,left:gp+"%",width:2,height:10,background:"var(--ink-2)"}}/>
                  </div>
                </div>
              );
            }) : <p style={{fontSize:12.5,color:"var(--ink-3)"}}>학년 전체 데이터가 없어 석차등급을 계산할 수 없습니다.</p>}
            <p style={{fontSize:11,color:"var(--ink-3)",marginTop:6}}>5등급제: 1등급 10% · 2등급 24% · 3등급 32% · 4등급 24% · 5등급 10% (누적 10/34/66/90%)</p>
          </div>
        </div>
      </div>

      {/* 단원별/영역별/난이도별 정답률 (세로 배치) */}
      {bd.itemStudents>0 && (
      <div className="row" style={{gap:14,alignItems:"flex-start"}}>
        <div className="card" style={{flex:"1 1 280px"}}>
          <div className="card-h"><h3>중단원별 정답률</h3><span className="sub">교과서 순서</span></div>
          <div className="card-pad">
            <p style={{fontSize:11,color:"var(--ink-3)",marginBottom:8}}>문항별 입력 {bd.itemStudents}명 기준</p>
            {(() => {
              let lastBig=null;
              return unitsSorted.map(u=>{
                const big=BIGUNIT_OF[u.name]||"";
                const showBig=big && big!==lastBig;
                lastBig=big;
                return (
                  <div key={u.name}>
                    {showBig && <div style={{fontSize:11.5,fontWeight:700,color:"var(--accent-ink)",margin:"6px 0 8px",paddingBottom:4,borderBottom:"1px solid var(--line)"}}>{big}</div>}
                    <RateBar name={u.name} rate={u.rate} got={u.got} mx={u.max}/>
                  </div>
                );
              });
            })()}
          </div>
        </div>

        <div className="card" style={{flex:"1 1 220px"}}>
          <div className="card-h"><h3>영역별 정답률</h3><span className="sub">단원 순서</span></div>
          <div className="card-pad">
            {domainsSorted.map(d=> <RateBar key={d.name} name={d.name} rate={d.rate} got={d.got} mx={d.max}/>)}
          </div>
        </div>

        <div className="card" style={{flex:"1 1 220px"}}>
          <div className="card-h"><h3>난이도별 정답률</h3></div>
          <div className="card-pad">
            {['쉬움','보통','어려움'].map(dk=>{
              const d=bd.diffs.find(x=>x.name===dk);
              if(!d||d.rate==null) return null;
              return <RateBar key={dk} name={dk} rate={d.rate} got={d.got} mx={d.max}/>;
            })}
          </div>
        </div>
      </div>
      )}
    </div>
  );
}


/* ============================ 전체 분포 분석 ============================ */
function DistAnalysis({exam,db}){
  const allSc = exam.allScores; // 내림차순 정렬된 429명 점수
  const total = allSc.length;
  const bands = examBands(exam,db); // A/B/C/D/E 분할점수

  // 담당 반 학생 테이블 필터 상태
  const [fCls,setFCls]=useState("전체");
  const [fAchv,setFAchv]=useState("전체");
  const [fRank,setFRank]=useState("전체");
  const [fName,setFName]=useState("");
  const [sortKey,setSortKey]=useState("score"); // score|no|name
  const [sortDir,setSortDir]=useState("desc");

  // 석차 5등급 컷 계산
  const gradeCuts = calc5GradeCuts(allSc);
  const gradePcts = GRADE5_PCTS;
  const gradeLabels = GRADE5_LABELS;

  // 5점 구간 분포
  const bucketMap={};
  allSc.forEach(s=>{ const b=Math.floor(s/5)*5; bucketMap[b]=(bucketMap[b]||0)+1; });
  const buckets=[];
  let cumul=0;
  for(let b=95; b>=0; b-=5){
    const cnt=bucketMap[b]||0;
    cumul+=cnt;
    // 이 구간의 성취수준 판정
    const midScore = b+2.5;
    const achv = gradeOf(midScore, bands);
    // 석차등급 판정
    let gLabel='';
    for(let gi=0;gi<gradeCuts.length;gi++){
      if(midScore >= gradeCuts[gi]){ gLabel=gradeLabels[gi]; break; }
    }
    buckets.push({lo:b, hi:b+4.9, cnt, cumul, pct:cnt/total*100, cpct:cumul/total*100, achv, gLabel});
  }

  // 담당 반(8반/9반) 학생 위치 파악
  const myStudents = db.students.filter(s=>(exam.clsScope||[]).includes(s.cls) && exam.scores[s.id]);
  function studentRank(score){
    // 전체 중 이 점수 이상인 학생 수
    let above = allSc.filter(s=>s>=score).length;
    return {rank:above, pct:Math.round(above/total*100)};
  }
  function studentGrade9(score){ return grade5Of(score, gradeCuts); }
  function studentAchv(score){ return gradeOf(score, bands); }

  // 평균/중앙/최고/최저
  const avg = allSc.reduce((a,b)=>a+b,0)/total;
  const med = allSc[Math.floor(total/2)];

  return (
    <div className="grid" style={{gap:16}}>
      {/* 전체 통계 요약 */}
      <div className="card">
        <div className="card-h">
          <h3>{exam.gradeScope||"전"}학년 전체 성적 분포</h3>
          <span className="sub">{total}명 · {exam.title}</span>
        </div>
        <div className="card-pad">
          <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10}}>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">전체 응시</div><div className="val" style={{fontSize:22}}>{total}<small>명</small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">전체 평균</div><div className="val" style={{fontSize:22}}>{avg.toFixed(1)}<small>점</small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">중앙값</div><div className="val" style={{fontSize:22}}>{med.toFixed(1)}<small>점</small></div></div>
            <div className="stat" style={{padding:"12px 14px"}}><div className="label">최고점</div><div className="val" style={{fontSize:22}}>{allSc[0]}<small>점</small></div></div>
          </div>
        </div>
      </div>

      <div className="row" style={{gap:16,alignItems:"flex-start"}}>
        {/* 점수구간 분포표 */}
        <div className="card" style={{flex:"1 1 400px"}}>
          <div className="card-h"><h3>점수구간별 분포표</h3><span className="sub">성취수준 · 석차등급 병기</span></div>
          <div className="scrollx">
            <table style={{fontSize:12.5}}>
              <thead><tr>
                <th style={{width:90}}>점수 구간</th>
                <th style={{width:55,textAlign:"center"}}>학생수</th>
                <th style={{width:55,textAlign:"center"}}>비율</th>
                <th style={{width:60,textAlign:"center"}}>누적</th>
                <th style={{width:65,textAlign:"center"}}>누적비율</th>
                <th style={{width:70,textAlign:"center"}}>성취도</th>
                <th style={{width:80,textAlign:"center"}}>석차등급</th>
              </tr></thead>
              <tbody>
                {buckets.filter(r=>r.cnt>0||r.lo>=30).map(r=>{
                  const isCut = bands.some(b=>b.min>r.lo && b.min<=r.hi);
                  const isGradeCut = gradeCuts.some(c=>c>=r.lo && c<r.hi+0.1);
                  return (
                  <tr key={r.lo} style={{background: isCut?"var(--accent-soft)": isGradeCut?"var(--warn-soft)":""}}>
                    <td style={{fontWeight:600}}>{r.lo.toFixed(1)} ~ {r.hi.toFixed(1)}</td>
                    <td style={{textAlign:"center",fontWeight:r.cnt>0?700:400,color:r.cnt>0?"var(--ink)":"var(--ink-3)"}}>{r.cnt}</td>
                    <td style={{textAlign:"center",color:"var(--ink-3)"}}>{r.pct.toFixed(2)}%</td>
                    <td style={{textAlign:"center"}}>{r.cumul}</td>
                    <td style={{textAlign:"center",color:"var(--ink-3)"}}>{r.cpct.toFixed(2)}%</td>
                    <td style={{textAlign:"center"}}>
                      {bands.some(b=>b.min===r.lo+2.5||Math.abs(b.min-(r.lo+2.5))<2.6) && (() => {
                        const a=gradeOf(r.lo+2.5,bands);
                        // 경계 구간 표시
                        const prevA=r.lo>=5?gradeOf(r.lo-2.5,bands):null;
                        if(prevA && prevA.grade!==a.grade)
                          return <span style={{fontSize:11,fontWeight:700,color:a.color}}>{prevA.grade}/{a.grade} 경계</span>;
                        return <span style={{fontSize:11,fontWeight:700,color:a.color}}>{a.grade}</span>;
                      })()}
                    </td>
                    <td style={{textAlign:"center",fontSize:11}}>
                      {gradeCuts.map((c,gi)=>{
                        if(c>=r.lo && c<=r.hi+0.1)
                          return <span key={gi} style={{color:"var(--warn)",fontWeight:700}}>{gi+1}등급({c.toFixed(1)})</span>;
                        return null;
                      })}
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* 오른쪽: 등급 컷 + 담당반 학생 위치 */}
        <div style={{flex:"0 0 300px",display:"flex",flexDirection:"column",gap:14}}>
          <div className="card">
            <div className="card-h"><h3>성취수준 분할점수</h3></div>
            <div className="card-pad">
              {bands.map((b,i)=>{
                const nextMin = i+1<bands.length? bands[i+1].min : 0;
                const cnt = allSc.filter(s=>s>=b.min && (i===0||s<bands[i-1].min)).length;
                return (
                <div key={b.grade} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                  <div style={{width:32,height:32,borderRadius:8,background:b.color+"22",color:b.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,flexShrink:0}}>{b.grade}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:"var(--ink-3)"}}>{b.min}점 이상{i===0?'':''}</div>
                    <div className="bar-track" style={{marginTop:4}}><div className="bar-fill" style={{width:(cnt/total*100)+'%',background:b.color}}/></div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,minWidth:45,textAlign:"right"}}>{cnt}명</div>
                </div>
                );
              })}
            </div>
          </div>

          <div className="card">
            <div className="card-h"><h3>석차 5등급 컷</h3></div>
            <div className="card-pad">
              {gradeCuts.map((c,gi)=>(
                <div key={gi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid var(--line)",fontSize:13}}>
                  <span style={{fontWeight:600}}>{gi+1}등급</span>
                  <span style={{color:"var(--ink-3)",fontSize:11}}>상위 {Math.round(gradePcts[gi]*100)}%</span>
                  <span style={{fontWeight:700,color:"var(--accent)"}}>{c.toFixed(1)}점</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* 담당반 학생 전체 순위 */}
      {myStudents.length>0 && (() => {
        // 필터링 + 정렬된 행 계산
        const myCls = [...new Set(myStudents.map(s=>s.cls))];
        let rows = myStudents.map(s=>{
          const sc=studentScore(exam,exam.scores[s.id]);
          const {rank,pct}=studentRank(sc);
          const g9=studentGrade9(sc);
          const achv=studentAchv(sc);
          return {...s, sc, rank, pct, g9, achvGrade:achv.grade, achvColor:achv.color};
        });
        // 필터 적용
        rows = rows.filter(r=>
          (fCls==="전체"||r.cls===fCls) &&
          (fAchv==="전체"||r.achvGrade===fAchv) &&
          (fRank==="전체"||String(r.g9)===fRank) &&
          (!fName || r.name.includes(fName) || String(r.sid||"").includes(fName))
        );
        // 정렬
        rows.sort((a,b)=>{
          let v=0;
          if(sortKey==="score") v=a.sc-b.sc;
          else if(sortKey==="no") v= a.cls===b.cls? a.no-b.no : a.cls.localeCompare(b.cls,undefined,{numeric:true});
          else if(sortKey==="name") v=a.name.localeCompare(b.name);
          return sortDir==="desc"? -v : v;
        });
        const sortBtn=(key,label)=>(
          <button className="btn ghost sm" style={{padding:"3px 7px",fontWeight:sortKey===key?700:400,color:sortKey===key?"var(--accent)":"var(--ink-3)"}}
            onClick={()=>{ if(sortKey===key) setSortDir(d=>d==="desc"?"asc":"desc"); else {setSortKey(key);setSortDir("desc");} }}>
            {label}{sortKey===key?(sortDir==="desc"?" ↓":" ↑"):""}
          </button>
        );
        return (
      <div className="card">
        <div className="card-h" style={{flexWrap:"wrap",gap:8}}>
          <h3>담당 반 학생 — 전체 위치</h3>
          <span className="sub">{(exam.clsScope||[]).join('·')} · 필터 {rows.length}명 / 전체 {myStudents.length}명</span>
        </div>
        {/* 필터 바 */}
        <div className="card-pad" style={{paddingTop:14,paddingBottom:12,borderBottom:"1px solid var(--line)"}}>
          <div className="row" style={{gap:10,alignItems:"center"}}>
            <div>
              <label className="fld" style={{marginBottom:3}}>반</label>
              <div className="seg">
                <button className={fCls==="전체"?"on":""} onClick={()=>setFCls("전체")}>전체</button>
                {myCls.map(c=> <button key={c} className={fCls===c?"on":""} onClick={()=>setFCls(c)}>{c}</button>)}
              </div>
            </div>
            <div>
              <label className="fld" style={{marginBottom:3}}>성취수준</label>
              <select value={fAchv} onChange={e=>setFAchv(e.target.value)} style={{width:"auto",minWidth:90,padding:"6px 9px",fontSize:13}}>
                <option value="전체">전체</option>
                {bands.map(b=> <option key={b.grade} value={b.grade}>{b.grade}</option>)}
              </select>
            </div>
            <div>
              <label className="fld" style={{marginBottom:3}}>석차등급</label>
              <select value={fRank} onChange={e=>setFRank(e.target.value)} style={{width:"auto",minWidth:90,padding:"6px 9px",fontSize:13}}>
                <option value="전체">전체</option>
                {[1,2,3,4,5].map(g=> <option key={g} value={String(g)}>{g}등급</option>)}
              </select>
            </div>
            <div style={{flex:1,minWidth:140}}>
              <label className="fld" style={{marginBottom:3}}>이름·학번 검색</label>
              <input value={fName} onChange={e=>setFName(e.target.value)} placeholder="이름 또는 학번" style={{padding:"6px 10px",fontSize:13}}/>
            </div>
            {(fCls!=="전체"||fAchv!=="전체"||fRank!=="전체"||fName) &&

// 관찰 항목 정의 (고정)
const OBS_ITEMS = [
  {key:"colearn", label:"코러닝", full:"코러닝·코티칭 참여", ic:"🤝", color:"#3b6d2f"},
  {key:"present", label:"발표",   full:"칠판 발표 (문제 해결)", ic:"✍", color:"#2563a8"},
  {key:"question",label:"질문",   full:"질문·피드백", ic:"🙋", color:"#a8651d"},
];

function Observe({db,update}){

/* ---------- ① 관찰 입력 ---------- */
function ObsInput({db,update}){
  const [date,setDate]=useState(todayStr());
  const scopeCls=db.classInfo.map(c=>c.cls);
  const grades=[...new Set(db.classInfo.map(c=>c.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=db.classInfo.filter(c=>c.grade===grade).map(c=>c.cls);
  const [cls,setCls]=useState(classesInGrade[0]||"");
  const [photos]=useState(()=>loadPhotos());
  const [memoStu,setMemoStu]=useState(null);
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls).sort((a,b)=>a.no-b.no);
  // 그날 그 반에 기록이 있는 학생 수
  const recorded=list.filter(s=>{ const o=db.obs[obsKey(date,s.id)]; return o&&(o.colearn||o.present||o.question||o.memo); }).length;

  function toggle(sid,key){
    update(d=>{
      const k=obsKey(date,sid);
      d.obs[k]=d.obs[k]||{};
      d.obs[k][key]=!d.obs[k][key];
      // 빈 기록이면 정리
      const o=d.obs[k];
      if(!o.colearn&&!o.present&&!o.question&&!o.memo) delete d.obs[k];
    });
  }
  function setMemo(sid,val){
    update(d=>{
      const k=obsKey(date,sid);
      d.obs[k]=d.obs[k]||{};
      d.obs[k].memo=val;
      const o=d.obs[k];
      if(!o.colearn&&!o.present&&!o.question&&!o.memo) delete d.obs[k];
    });
  }

  return (
    <div className="card">
      <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
        <h3>수업 관찰</h3>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"auto",padding:"5px 9px",fontSize:13}}/>
        <div className="seg">{grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>setGrade(g)}>{gradeLabel(g)}</button>)}</div>
        <div className="seg">{classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>setCls(c)}>{c}</button>)}</div>
        <span className="sub" style={{marginLeft:"auto"}}>기록 {recorded}/{list.length}명</span>
      </div>
      <div className="helpbox" style={{margin:"14px 20px 4px"}}>
        <span className="ic">👁</span>
        <div>수업 중 활동을 가볍게 체크하세요. <b>{OBS_ITEMS.map(i=>i.ic+" "+i.full).join(" · ")}</b>. 메모는 세특 작성 시 활용됩니다.</div>
      </div>
      <div className="scrollx">
        <table>
          <thead><tr>
            <th style={{width:44}}></th><th style={{width:42}}>No</th><th style={{width:90}}>이름</th>
            {OBS_ITEMS.map(it=> <th key={it.key} style={{width:70,textAlign:"center"}}>{it.ic}<br/><span style={{fontSize:11,fontWeight:400}}>{it.label}</span></th>)}
            <th>메모</th>
          </tr></thead>
          <tbody>
            {list.map(s=>{
              const o=db.obs[obsKey(date,s.id)]||{};
              return (
                <tr key={s.id}>
                  <td><Avatar student={s} photos={photos} size={30}/></td>
                  <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  {OBS_ITEMS.map(it=>(
                    <td key={it.key} style={{textAlign:"center"}}>
                      <button onClick={()=>toggle(s.id,it.key)} className="obs-chk"
                        style={{background:o[it.key]?it.color:"var(--surface)",borderColor:o[it.key]?it.color:"var(--line-2)",color:o[it.key]?"#fff":"var(--ink-3)"}}>
                        {o[it.key]?"✓":""}
                      </button>
                    </td>
                  ))}
                  <td>
                    {memoStu===s.id ? (
                      <input autoFocus value={o.memo||""} onChange={e=>setMemo(s.id,e.target.value)} onBlur={()=>setMemoStu(null)}
                        placeholder="간단 메모" style={{padding:"4px 8px",fontSize:12.5,width:"100%",minWidth:160}}/>
                    ) : (
                      <div onClick={()=>setMemoStu(s.id)} style={{cursor:"text",fontSize:12.5,color:o.memo?"var(--ink)":"var(--ink-3)",minHeight:20,padding:"3px 0"}}>
                        {o.memo||"메모 입력…"}
                      </div>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ---------- ② 누적 조회 ---------- */
function ObsReport({db}){
  const grades=[...new Set(db.classInfo.map(c=>c.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=db.classInfo.filter(c=>c.grade===grade).map(c=>c.cls);
  const [cls,setCls]=useState(classesInGrade[0]||"");
  const [detailStu,setDetailStu]=useState(null);
  const [photos]=useState(()=>loadPhotos());
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls).sort((a,b)=>a.no-b.no);

  // 학생별 누적 집계
  function tally(sid){
    const res={colearn:0,present:0,question:0, days:[], memos:[]};
    Object.entries(db.obs).forEach(([k,o])=>{
      const [d,sid2]=k.split("|");
      if(sid2!==sid) return;
      OBS_ITEMS.forEach(it=>{ if(o[it.key]) res[it.key]++; });
      if(o.colearn||o.present||o.question||o.memo) res.days.push(d);
      if(o.memo) res.memos.push({date:d,memo:o.memo});
    });
    res.days.sort(); res.memos.sort((a,b)=>a.date.localeCompare(b.date));
    return res;
  }

  const detail = detailStu? db.students.find(s=>s.id===detailStu) : null;
  const detailT = detail? tally(detail.id) : null;

  return (
    <div className="row" style={{alignItems:"flex-start",gap:14}}>
      <div className="card" style={{flex:1,minWidth:340}}>
        <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
          <h3>누적 관찰</h3>
          <div className="seg">{grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>{setGrade(g);setDetailStu(null);}}>{gradeLabel(g)}</button>)}</div>
          <div className="seg">{classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>{setCls(c);setDetailStu(null);}}>{c}</button>)}</div>
        </div>
        <div className="scrollx">
          <table>
            <thead><tr>
              <th style={{width:42}}>No</th><th>이름</th>
              {OBS_ITEMS.map(it=> <th key={it.key} style={{width:60,textAlign:"center"}}>{it.ic}<br/><span style={{fontSize:10.5,fontWeight:400}}>{it.label}</span></th>)}
              <th style={{width:55,textAlign:"center"}}>메모</th>
            </tr></thead>
            <tbody>
              {list.map(s=>{
                const t=tally(s.id);
                const active=detailStu===s.id;
                const total=t.colearn+t.present+t.question;
                return (
                  <tr key={s.id} onClick={()=>setDetailStu(s.id)} style={{cursor:"pointer",background:active?"var(--accent-soft)":""}}>
                    <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                    <td style={{fontWeight:600}}>{s.name} {total===0&&<span style={{fontSize:10.5,color:"var(--ink-3)",fontWeight:400}}>기록없음</span>}</td>
                    {OBS_ITEMS.map(it=>(
                      <td key={it.key} style={{textAlign:"center",fontWeight:t[it.key]?700:400,color:t[it.key]?it.color:"var(--ink-3)"}}>{t[it.key]||"·"}</td>
                    ))}
                    <td style={{textAlign:"center",color:t.memos.length?"var(--accent)":"var(--ink-3)"}}>{t.memos.length||"·"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {detail && detailT && (
        <div className="card" style={{flex:"0 0 320px"}}>
          <div className="card-h"><h3>{detail.name}</h3><span className="sub">{detail.cls} · 누적 기록</span></div>
          <div className="card-pad">
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {OBS_ITEMS.map(it=>(
                <div key={it.key} style={{flex:1,textAlign:"center",padding:"10px 6px",background:"var(--surface-2)",borderRadius:10}}>
                  <div style={{fontSize:18}}>{it.ic}</div>
                  <div style={{fontSize:22,fontWeight:700,color:it.color,margin:"2px 0"}}>{detailT[it.key]}</div>
                  <div style={{fontSize:10.5,color:"var(--ink-3)"}}>{it.label}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12.5,color:"var(--ink-3)",marginBottom:10}}>활동 기록일 {detailT.days.length}일</div>
            {detailT.memos.length>0 ? (
              <div>
                <div className="fld" style={{marginBottom:8}}>관찰 메모 ({detailT.memos.length})</div>
                <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto"}}>
                  {detailT.memos.map((m,i)=>(
                    <div key={i} style={{background:"var(--surface-2)",borderRadius:8,padding:"8px 11px"}}>
                      <div style={{fontSize:10.5,color:"var(--ink-3)",marginBottom:2}}>{fmtMD(m.date)}</div>
                      <div style={{fontSize:13,lineHeight:1.5}}>{m.memo}</div>
                    </div>
                  ))}
                </div>
              </div>
            ) : <p style={{fontSize:12.5,color:"var(--ink-3)"}}>메모가 없습니다.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================ 수업 준비 ============================ */
const DOW_KR = ["월","화","수","목","금"];
// 학년별 색상 (1·2학년 구분)
const GRADE_COLORS = {
  1: {bar:"#3b6d2f", bg:"#eef5ea", ink:"#2f5a26"},
  2: {bar:"#2563a8", bg:"#eaf1f8", ink:"#1d4e85"},
  3: {bar:"#a8651d", bg:"#f8f0e6", ink:"#8a5215"},
};
function gradeColor(g){ return GRADE_COLORS[g]||GRADE_COLORS[1]; }

/* ---------- 주간 시간표 (대시보드·수업준비 공용) ---------- */
function WeekTimetable({db, weekMon, onCellClick, ttEdit, compact}){
  const classInfo=db.classInfo;
  const periodTimes=db.periodTimes||{1:"09:10",2:"10:10",3:"11:10",4:"13:00",5:"14:00",6:"15:00",7:"16:00"};
  const cal=db.cal||{};
  const maxPeriod=7;
  const weekDates = DOW_KR.map((_,i)=>addDays(weekMon,i));
  const todayD=todayStr();
  function classAt(dow, period){
    const out=[];
    classInfo.forEach(c=>{
      const ps = c.sched && c.sched[dow] ? (Array.isArray(c.sched[dow])?c.sched[dow]:[c.sched[dow]]) : [];
      if(ps.includes(period)) out.push(c);
    });
    return out;
  }
  const TODAY_SHADE="rgba(74,124,89,0.06)"; // 옅은 초록 음영 (오늘 열)
  // 행사 라벨이 하나라도 있으면 라벨 행 표시
  const hasAnyLabel = weekDates.some(d=>cal[d]);

  return (
    <div className="scrollx">
      <table className="tt">
        <thead><tr>
          <th style={{width:54}}>교시</th>
          {DOW_KR.map((d,i)=>{
            const isToday=weekDates[i]===todayD;
            return <th key={d} style={{textAlign:"center",background:isToday?"var(--accent-soft)":""}}>
              {d} <span style={{fontSize:11,fontWeight:400,color:isToday?"var(--accent-ink)":"var(--ink-3)"}}>{fmtMD(weekDates[i])}</span>
              {isToday && <div style={{fontSize:9.5,fontWeight:700,color:"var(--accent-ink)"}}>오늘</div>}
            </th>;
          })}
        </tr></thead>
        <tbody>
          {/* 학사일정 라벨 행 */}
          {hasAnyLabel && (
            <tr>
              <td style={{textAlign:"center",fontSize:10,color:"var(--ink-3)"}}>일정</td>
              {DOW_KR.map((dow,di)=>{
                const date=weekDates[di]; const ev=cal[date]; const isToday=date===todayD;
                const tone = ev?.type==="off"?{bg:"#f6e3e0",c:"#a8392f"}:ev?.type==="exam"?{bg:"#f7ecd9",c:"#b5701a"}:ev?{bg:"#eaf1f8",c:"#1d4e85"}:null;
                return (
                  <td key={dow} style={{padding:4,verticalAlign:"top",background:isToday?TODAY_SHADE:""}}>
                    {ev && <div style={{fontSize:10.5,fontWeight:600,padding:"3px 6px",borderRadius:6,background:tone.bg,color:tone.c,textAlign:"center"}}>{ev.label}</div>}
                  </td>
                );
              })}
            </tr>
          )}
          {Array.from({length:maxPeriod},(_,i)=>i+1).map(period=>(
            <tr key={period}>
              <td style={{textAlign:"center",fontWeight:600,fontSize:12}}>
                {period}<br/><span style={{fontSize:10,color:"var(--ink-3)",fontWeight:400}}>{periodTimes[period]}</span>
              </td>
              {DOW_KR.map((dow,di)=>{
                const date=weekDates[di];
                const isToday=date===todayD;
                const ev=cal[date];
                const noClass = ev && (ev.type==="off"||ev.type==="exam"); // 휴일·시험엔 수업 미표시
                const cs=noClass? [] : classAt(dow,period);
                return (
                  <td key={dow} style={{padding:4,background:isToday?TODAY_SHADE:"",verticalAlign:"top"}}>
                    {noClass && period===1 && (
                      <div style={{fontSize:10.5,color:"var(--ink-3)",textAlign:"center",padding:"6px 2px"}}>{ev.type==="exam"?"시험":"휴업"}</div>
                    )}
                    {cs.map(c=>{
                      const k=prepKey(date,c.cls,period);
                      const prep=db.prep[k];
                      const hasPrep=prep && (prep.progress||prep.handout||prep.todo);
                      const col=gradeColor(c.grade);
                      if(ttEdit){
                        return <div key={c.cls} className="tt-cell" style={{background:col.bg,borderLeft:`4px solid ${col.bar}`}}>
                          <b style={{fontSize:15,color:col.ink}}>{c.grade}-{c.cls.replace("반","")}</b> <span style={{fontSize:11,color:"var(--ink-3)"}}>{c.subject}</span>
                        </div>;
                      }
                      return (
                        <div key={c.cls} className="tt-cell" onClick={()=>onCellClick&&onCellClick({date,cls:c.cls,period,dow,subject:c.subject,grade:c.grade})}
                          style={{cursor:onCellClick?"pointer":"default",borderLeft:`4px solid ${col.bar}`,background:hasPrep?col.bg:"var(--surface)"}}>
                          <div style={{fontWeight:800,fontSize:17,lineHeight:1.15,color:col.ink}}>{c.grade}-{c.cls.replace("반","")}</div>
                          <div style={{fontSize:10.5,color:"var(--ink-3)",marginTop:1}}>{c.subject}</div>
                          {!compact && prep && prep.progress && <div style={{fontSize:10.5,color:col.ink,marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📖 {prep.progress}</div>}
                          {!compact && hasPrep && (prep.handout||prep.todo) && <div style={{fontSize:9.5,color:"var(--ink-3)",marginTop:1}}>{prep.handout?"📄 ":""}{prep.todo?"✓":""}</div>}
                          {compact && hasPrep && <div style={{fontSize:9.5,color:col.ink,marginTop:2}}>📖</div>}
                        </div>
                      );
                    })}
                    {ttEdit && !noClass && <button className="btn ghost sm" style={{width:"100%",fontSize:11,padding:"3px",marginTop:cs.length?4:0,color:"var(--ink-3)"}} onClick={()=>onCellClick&&onCellClick({date,cls:null,period,dow,addMode:true})}>+ 추가</button>}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

  const [editCell,setEditCell]=useState(null); // {date,cls,period,dow,subject}

  return (
    <div className="grid" style={{gap:16}}>

          <h3>주간 시간표</h3>

function PrepEditor({db,update,cell,onClose,onAttendance}){
  const k=prepKey(cell.date,cell.cls,cell.period);
  const cur=db.prep[k]||{progress:"",handout:"",todo:""};
  const [progress,setProgress]=useState(cur.progress||"");
  const [handout,setHandout]=useState(cur.handout||"");
  const [todo,setTodo]=useState(cur.todo||"");
  function save(){
    update(d=>{
      if(!progress && !handout && !todo){ delete d.prep[k]; }
      else d.prep[k]={progress,handout,todo};
    });
    toast("저장했습니다"); onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
        <div className="modal-h"><h3>{cell.grade}-{cell.cls.replace("반","")} · {cell.dow} {cell.period}교시</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="helpbox" style={{marginBottom:14}}>
            <span className="ic">📅</span>
            <div>{fmtMD(cell.date)} ({cell.dow}) · {cell.subject}</div>
          </div>

            <input value={progress} onChange={e=>setProgress(e.target.value)} placeholder="예: 이차함수의 최대·최소 (p.61~63)"/></div>
          <div className="field"><label className="fld">📄 학습지 / 교재</label>
            <input value={handout} onChange={e=>setHandout(e.target.value)} placeholder="예: 포트폴리오 학습지 5회차 배부"/></div>
          <div className="field" style={{marginBottom:0}}><label className="fld">✓ 할 일 / 메모</label>
            <textarea rows={3} value={todo} onChange={e=>setTodo(e.target.value)} placeholder="예: 지난 시간 결석생 보충, 수행평가 안내"/></div>
        </div>
        <div className="modal-f" style={{justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:8}}>
            {db.prep[k] && <button className="btn ghost danger" onClick={()=>{ update(d=>delete d.prep[k]); toast("삭제했습니다"); onClose(); }}>삭제</button>}
            {onAttendance && cell.cls && <button className="btn ghost" onClick={()=>{ onClose(); onAttendance({date:cell.date, grade:cell.grade, cls:cell.cls}); }}>✓ 출결</button>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" onClick={onClose}>취소</button>
            <button className="btn primary" onClick={save}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- 시간표 수정 (수업 이동/추가/삭제) ---------- */
function TimetableEditor({db,update,cell,onClose}){
  const classInfo=db.classInfo;
  const [selCls,setSelCls]=useState(cell.cls||classInfo[0]?.cls);
  const [dow,setDow]=useState(cell.dow);
  const [period,setPeriod]=useState(cell.period);

  function addClass(){
    update(d=>{
      const c=d.classInfo.find(x=>x.cls===selCls);
      if(!c) return;
      if(!c.sched[dow]) c.sched[dow]=[];
      if(!Array.isArray(c.sched[dow])) c.sched[dow]=[c.sched[dow]];
      if(!c.sched[dow].includes(period)) c.sched[dow].push(period);
      c.sched[dow].sort((a,b)=>a-b);
    });
    toast(`${selCls} ${dow} ${period}교시 추가`); onClose();
  }
  function removeClass(){
    update(d=>{
      const c=d.classInfo.find(x=>x.cls===selCls);
      if(!c||!c.sched[dow]) return;
      const arr=Array.isArray(c.sched[dow])?c.sched[dow]:[c.sched[dow]];
      c.sched[dow]=arr.filter(p=>p!==period);
      if(c.sched[dow].length===0) delete c.sched[dow];
    });
    toast(`${selCls} ${dow} ${period}교시 삭제`); onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
        <div className="modal-h"><h3>시간표 수정</h3><button className="btn ghost sm" onClick={onClose}>✕</button></div>
        <div className="modal-b">
          <div className="helpbox" style={{marginBottom:14}}>
            <span className="ic">⚙</span>
            <div>수업의 요일·교시를 옮기거나 추가/삭제합니다. 변경은 매주 반복되는 정규 시간표에 반영됩니다.</div>
          </div>
          <div className="field"><label className="fld">반</label>
            <select value={selCls} onChange={e=>setSelCls(e.target.value)}>
              {classInfo.map(c=> <option key={c.cls} value={c.cls}>{c.grade}-{c.cls.replace("반","")} ({c.subject})</option>)}
            </select></div>
          <div className="row">
            <div className="field" style={{flex:1}}><label className="fld">요일</label>
              <select value={dow} onChange={e=>setDow(e.target.value)}>{DOW_KR.map(d=> <option key={d} value={d}>{d}</option>)}</select></div>
            <div className="field" style={{flex:1}}><label className="fld">교시</label>
              <select value={period} onChange={e=>setPeriod(Number(e.target.value))}>{[1,2,3,4,5,6,7].map(p=> <option key={p} value={p}>{p}교시</option>)}</select></div>
          </div>
        </div>
        <div className="modal-f">
          <button className="btn ghost danger" style={{marginRight:"auto"}} onClick={removeClass}>이 칸 삭제</button>
          <button className="btn" onClick={onClose}>취소</button>
          <button className="btn primary" onClick={addClass}>이 위치로 추가</button>
        </div>
      </div>
    </div>
  );
}

function FormativeSets({db,update}){
  const sets=db.formative.sets||[];
  const [openId,setOpenId]=useState(null);

  function delSet(id){
    if(!confirm("이 형성평가를 삭제할까요? 결과도 함께 삭제됩니다.")) return;
    update(d=>{ d.formative.sets=d.formative.sets.filter(s=>s.id!==id); });
    if(openId===id) setOpenId(null);

  if(openId){

        ) : (

// 성취기준 코드 → 마스터 조회 (서술 가져올 때 빈 수준은 상위 수준으로 대체)
function masterLevel(code, grade){
  const m=STANDARD_MASTER[code]; if(!m) return null;
  const order=["A","B","C","D","E"];
  const out={...m.levels};
  // 빈 수준 채우기: 위에서 가장 가까운 정의된 수준 사용
  let last=null;
  order.forEach(g=>{ if(out[g]) last=out[g]; else if(last) out[g]=last; });
  return {name:m.name, levels:out, target:grade?out[grade]:null};
}

const FM_ROLES = [
  {v:"ignore", t:"무시"},
  {v:"sid", t:"학번"},
  {v:"name", t:"이름"},
  {v:"score", t:"총점"},
  {v:"cognitive", t:"인지 문항"},
  {v:"focus", t:"집중도(1~5)"},
  {v:"difficulty", t:"어려운 점"},
  {v:"text", t:"자유 서술"},
];
// 헤더로 역할 자동 추측
function guessRole(header){
  const h=(header||"").toString().toLowerCase();
  if(/타임스탬프|timestamp/.test(h)) return "ignore";
  if(/학번/.test(h)) return "sid";
  if(/이름|성명/.test(h)) return "name";
  if(/점수|score|총점/.test(h)) return "score";
  if(/집중|척도|1~5|참여/.test(h)) return "focus";
  if(/어려|헷갈|難|difficult/.test(h)) return "difficulty";
  if(/노트|의견|질문|서술|느낀|배움/.test(h)) return "text";
  return "cognitive"; // 기본
}

function FmUploadWizard({db,update,onClose,onDone}){
  const [step,setStep]=useState(1); // 1=업로드, 2=열지정, 3=메타
  const [rows,setRows]=useState(null);      // 전체 행(배열의 배열)
  const [headers,setHeaders]=useState([]);
  const [cols,setCols]=useState([]);         // [{idx,header,role,label,level}]
  const [err,setErr]=useState("");
  const classes=db.classInfo.map(c=>`${c.grade}-${c.cls.replace("반","")}`);
  const [meta,setMeta]=useState({title:"",date:todayStr(),cls:classes[0]||"",standards:""});

  function handleFile(e){
    const file=e.target.files[0]; if(!file) return;
    setErr("");
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(!arr.length){ setErr("빈 시트입니다."); return; }
        const hdr=arr[0].map(x=>String(x));
        const body=arr.slice(1).filter(r=>r.some(c=>String(c).trim()!==""));
        setHeaders(hdr);
        setRows(body);
        setCols(hdr.map((h,i)=>({idx:i,header:h,role:guessRole(h),label:cleanHeader(h),level:"표준"})));
        // 제목 추측: 파일명
        const fname=file.name.replace(/\.(xlsx|xls|csv)$/i,"").replace(/_응답.*$/,"").replace(/_/g," ").trim();
        setMeta(m=>({...m,title:fname}));
        setStep(2);
      }catch(ex){ setErr("파일을 읽지 못했습니다: "+ex.message); }
    };
    reader.readAsArrayBuffer(file);
  }

  function setColRole(idx,role){ setCols(cs=>cs.map(c=>c.idx===idx?{...c,role}:c)); }
  function setColLevel(idx,level){ setCols(cs=>cs.map(c=>c.idx===idx?{...c,level}:c)); }

  const sidCol=cols.find(c=>c.role==="sid");
  const nameCol=cols.find(c=>c.role==="name");
  const scoreCol=cols.find(c=>c.role==="score");

  function finish(){
    if(!sidCol && !nameCol){ setErr("학번 또는 이름 열이 최소 하나는 지정되어야 매칭할 수 있습니다."); return; }
    const id="fm"+Date.now();
    // 학생 매칭 + 결과 생성
    const results={}; const unmatched=[];
    rows.forEach(r=>{
      const sidVal=sidCol? String(r[sidCol.idx]).replace(/\.0$/,"").trim() : "";
      const nameVal=nameCol? String(r[nameCol.idx]).trim() : "";
      // 학번 우선 매칭
      let stu=null;
      if(sidVal) stu=db.students.find(s=>s.sid===sidVal);
      if(!stu && nameVal) stu=db.students.find(s=>s.name===nameVal);
      if(!stu){ unmatched.push(nameVal||sidVal||"(불명)"); return; }
      const rec={ name:stu.name, answers:{}, difficulties:[], texts:[] };
      cols.forEach(c=>{
        const val=r[c.idx];
        if(c.role==="score") rec.score=Number(String(val).replace(/[^0-9.\-]/g,""))||0;
        else if(c.role==="cognitive") rec.answers[c.idx]=val;
        else if(c.role==="focus") rec.focus=Number(String(val).replace(/[^0-9.]/g,""))||null;
        else if(c.role==="difficulty"){ if(String(val).trim()) rec.difficulties.push(String(val).trim()); }
        else if(c.role==="text"){ if(String(val).trim()) rec.texts.push(String(val).trim()); }
      });
      results[stu.id]=rec;
    });
    update(d=>{
      d.formative.sets.push({
        id, title:meta.title||"형성평가", date:meta.date, cls:meta.cls, standards:meta.standards,
        source:"upload",
        columns:cols.map(c=>({idx:c.idx,header:c.header,role:c.role,label:c.label,level:c.level})),
        results
      });
    });
    toast(`${Object.keys(results).length}명 취합${unmatched.length?` · ${unmatched.length}명 미매칭`:""}`);
    if(unmatched.length) alert("매칭 안 된 응답 (학번·이름 확인 필요):\n"+unmatched.join(", "));
    onDone(id);
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:step===2?720:480}}>
        <div className="modal-h">
          <h3>구글폼 결과 업로드 {step===1?"":`· ${step-1}/2단계`}</h3>
          <button className="btn ghost sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-b">
          {err && <div className="helpbox" style={{marginBottom:12,background:"var(--danger-soft)",color:"var(--danger)"}}><span className="ic">⚠</span><div>{err}</div></div>}

          {step===1 && (
            <div>
              <div className="helpbox" style={{marginBottom:14}}>
                <span className="ic">📄</span>
                <div>구글폼 응답 스프레드시트를 내려받아(.xlsx 또는 .csv) 올려주세요. 첫 행은 문항 제목, 그 아래는 학생 응답이어야 합니다.</div>
              </div>
              <label className="btn primary" style={{display:"inline-block",cursor:"pointer"}}>
                파일 선택
                <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
              </label>
            </div>
          )}

          {step===2 && (
            <div>
              <p style={{fontSize:12.5,color:"var(--ink-2)",marginBottom:10}}>각 열의 <b>역할</b>을 지정하세요. 학번·이름·총점은 자동 추측했습니다. 인지 문항은 단계(기초·표준·심화)도 지정할 수 있습니다. (응답 {rows.length}명)</p>
              <div className="scrollx" style={{maxHeight:340,overflowY:"auto"}}>
                <table>
                  <thead><tr><th style={{width:38}}>#</th><th>문항 제목</th><th style={{width:120}}>역할</th><th style={{width:90}}>단계</th><th style={{width:90}}>예시값</th></tr></thead>
                  <tbody>
                    {cols.map(c=>(
                      <tr key={c.idx}>
                        <td style={{color:"var(--ink-3)"}}>{c.idx+1}</td>
                        <td style={{fontSize:11.5,maxWidth:240}}><div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={c.header}>{c.label||c.header}</div></td>
                        <td>
                          <select value={c.role} onChange={e=>setColRole(c.idx,e.target.value)} style={{padding:"4px 6px",fontSize:12}}>
                            {FM_ROLES.map(r=> <option key={r.v} value={r.v}>{r.t}</option>)}
                          </select>
                        </td>
                        <td>
                          {c.role==="cognitive" ? (
                            <select value={c.level} onChange={e=>setColLevel(c.idx,e.target.value)} style={{padding:"4px 6px",fontSize:12}}>
                              <option>기초</option><option>표준</option><option>심화</option>
                            </select>
                          ) : <span style={{color:"var(--ink-3)",fontSize:11}}>–</span>}
                        </td>
                        <td style={{fontSize:11,color:"var(--ink-3)",maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={rows[0]?String(rows[0][c.idx]):""}>{rows[0]?String(rows[0][c.idx]).slice(0,14):""}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{display:"flex",gap:8,marginTop:10,fontSize:11.5,color:"var(--ink-3)",flexWrap:"wrap"}}>
                <span>학번 {sidCol?`✓ ${sidCol.idx+1}열`:"미지정"}</span>·
                <span>이름 {nameCol?`✓ ${nameCol.idx+1}열`:"미지정"}</span>·
                <span>총점 {scoreCol?`✓ ${scoreCol.idx+1}열`:"미지정"}</span>·
                <span>인지문항 {cols.filter(c=>c.role==="cognitive").length}개</span>
              </div>
            </div>
          )}

          {step===3 && (
            <div>
              <div className="field"><label className="fld">형성평가 제목</label>
                <input value={meta.title} onChange={e=>setMeta(m=>({...m,title:e.target.value}))} placeholder="예: 절댓값 부등식 형성평가"/></div>
              <div className="row">
                <div className="field" style={{flex:1}}><label className="fld">실시일</label>
                  <input type="date" value={meta.date} onChange={e=>setMeta(m=>({...m,date:e.target.value}))}/></div>
                <div className="field" style={{flex:1}}><label className="fld">반</label>
                  <select value={meta.cls} onChange={e=>setMeta(m=>({...m,cls:e.target.value}))}>{classes.map(c=> <option key={c} value={c}>{c}</option>)}</select></div>
              </div>
              <div className="field" style={{marginBottom:0}}><label className="fld">점검 성취기준 (선택)</label>
                <select value={meta.standards} onChange={e=>setMeta(m=>({...m,standards:e.target.value}))}>
                  <option value="">없음</option>
                  {standardsFor(parseInt((meta.cls||"").split("-")[0])).map(st=> <option key={st} value={st}>{st}</option>)}
                </select>
                <p style={{fontSize:11,color:"var(--ink-3)",marginTop:6}}>교수학습 평가운영계획의 성취기준 목록입니다. 선택하지 않으면 '없음'으로 저장됩니다.</p>
              </div>
            </div>
          )}
        </div>
        <div className="modal-f">
          {step>1 && <button className="btn" style={{marginRight:"auto"}} onClick={()=>setStep(step-1)}>← 이전</button>}
          <button className="btn" onClick={onClose}>취소</button>
          {step===2 && <button className="btn primary" onClick={()=>setStep(3)}>다음 →</button>}
          {step===3 && <button className="btn primary" onClick={finish}>형성평가 생성</button>}
        </div>
      </div>
    </div>
  );
}
// 헤더에서 문항 본문만 짧게
function cleanHeader(h){
  let s=String(h||"").split("\n")[0].trim();
  return s.length>40? s.slice(0,40)+"…" : s;
}

/* ---------- 형성평가 편집 (가변층 1~4 + 결과) ---------- */
function FormativeEditor({db,update,setId,onBack}){
  const set=db.formative.sets.find(s=>s.id===setId);
  const [sub,setSub]=useState("results"); // results | responses
  if(!set) return null;
  return (
    <div className="grid" style={{gap:14}}>
      <div className="card">
        <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
          <button className="btn ghost sm" onClick={onBack}>← 목록</button>
          <h3 style={{fontSize:14}}>{set.title}</h3>
          <span className="sub">{fmtMD(set.date)} · {set.cls}</span>
          <div className="seg" style={{marginLeft:"auto"}}>
            <button className={sub==="results"?"on":""} onClick={()=>setSub("results")}>결과·피드백</button>
            <button className={sub==="responses"?"on":""} onClick={()=>setSub("responses")}>응답 원본</button>

/* ---------- 세트 결과·피드백 (업로드 기반) ---------- */
function FmSetResults({db,update,setId}){
  const set=db.formative.sets.find(s=>s.id===setId);
  const cols=set.columns||[];
  const cogCols=cols.filter(c=>c.role==="cognitive");
  const hasScore=cols.some(c=>c.role==="score");
  const hasFocus=cols.some(c=>c.role==="focus");
  // 반 학생
  const m=(set.cls||"").match(/(\d+)-(\d+)/);
  const grade=m?+m[1]:null, clsLabel=m?m[2]+"반":null;
  const list=db.students.filter(s=>s.grade===grade && s.cls===clsLabel).sort((a,b)=>a.no-b.no);

  function setFeedback(sid,val){
    update(d=>{ const s=d.formative.sets.find(x=>x.id===setId); s.results[sid]=s.results[sid]||{}; s.results[sid].feedback=val; });
  }
  const responded=list.filter(s=>set.results[s.id]);
  const nResp=responded.length;
  // 점수 평균
  const scores=responded.map(s=>set.results[s.id].score).filter(v=>v!=null);
  const avg=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):null;

  return (
    <div className="grid" style={{gap:14}}>
      <div className="card">
        <div className="card-h" style={{gap:10,flexWrap:"wrap"}}>
          <h3>결과 · 피드백</h3>
          <span className="sub">{set.cls} · 응답 {nResp}/{list.length}명{avg!=null?` · 평균 ${avg}`:""}</span>
        </div>
        <div className="helpbox" style={{margin:"14px 20px 4px"}}>
          <span className="ic">💬</span>
          <div>업로드된 응답이 학번 기준으로 매칭되었습니다. 학생별 <b>개인 피드백</b>은 다음 수업 준비와 종합 발달평가에서 다시 보입니다.</div>
        </div>
        <div className="scrollx">
          <table>
            <thead><tr>
              <th style={{width:42}}>No</th><th style={{width:78}}>이름</th>
              {hasScore && <th style={{width:60,textAlign:"center"}}>총점</th>}
              {hasFocus && <th style={{width:64,textAlign:"center"}}>집중도</th>}
              <th style={{width:130}}>틀린 문항</th>
              <th>개인 피드백</th>
            </tr></thead>
            <tbody>
              {list.map(s=>{
                const r=set.results[s.id];
                if(!r) return (
                  <tr key={s.id} style={{opacity:.5}}>
                    <td style={{color:"var(--ink-3)"}}>{s.no}</td><td>{s.name}</td>
                    {hasScore && <td style={{textAlign:"center",color:"var(--ink-3)"}}>–</td>}
                    {hasFocus && <td style={{textAlign:"center",color:"var(--ink-3)"}}>–</td>}
                    <td colSpan={2} style={{color:"var(--ink-3)",fontSize:12}}>미응답</td>
                  </tr>
                );
                // 틀린 문항: 인지문항 중 빈칸이 아닌 것 (정답 비교 없이 응답값 표시 곤란 → 키워드 기반은 2단계)
                return (
                  <tr key={s.id}>
                    <td style={{color:"var(--ink-3)"}}>{s.no}</td>
                    <td style={{fontWeight:600}}>{s.name}</td>
                    {hasScore && <td style={{textAlign:"center",fontWeight:700,color:"var(--accent)"}}>{r.score??"–"}</td>}
                    {hasFocus && <td style={{textAlign:"center"}}>{r.focus? <span className="pill" style={{background:r.focus>=4?"var(--good-soft)":r.focus>=3?"var(--warn-soft)":"var(--danger-soft)",color:r.focus>=4?"var(--good)":r.focus>=3?"var(--warn)":"var(--danger)"}}>{r.focus}</span>:<span style={{color:"var(--ink-3)"}}>–</span>}</td>}
                    <td style={{fontSize:11.5,color:"var(--ink-3)"}}>{cogCols.length?`${cogCols.length}문항`:"–"}</td>
                    <td><input value={r.feedback||""} onChange={e=>setFeedback(s.id,e.target.value)} placeholder="개인 피드백 메모" style={{padding:"4px 8px",fontSize:12.5,width:"100%",minWidth:170}}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      <FmSetSelfReport set={set}/>
    </div>
  );
}

/* ---------- 자기보고 집계 (집중도·어려운점·서술) ---------- */
function FmSetSelfReport({set}){
  const results=Object.values(set.results||{});
  if(results.length===0) return null;
  const cols=set.columns||[];
  const hasFocus=cols.some(c=>c.role==="focus");
  const hasDiff=cols.some(c=>c.role==="difficulty");
  const hasText=cols.some(c=>c.role==="text");
  // 집중도 평균/분포
  const focusVals=results.map(r=>r.focus).filter(v=>v);
  const focusAvg=focusVals.length?(focusVals.reduce((a,b)=>a+b,0)/focusVals.length).toFixed(1):null;
  // 어려운점 빈도
  const diffCount={};
  results.forEach(r=>(r.difficulties||[]).forEach(d=>{ diffCount[d]=(diffCount[d]||0)+1; }));
  // 서술 모음
  const texts=[]; results.forEach(r=>(r.texts||[]).forEach(t=>texts.push({name:r.name,t})));

  return (
    <div className="row" style={{gap:14,alignItems:"flex-start"}}>
      {hasFocus && (
        <div className="card" style={{flex:"0 0 150px"}}>
          <div className="card-h"><h3>집중도</h3></div>
          <div className="card-pad" style={{textAlign:"center"}}>
            <div style={{fontSize:30,fontWeight:700,color:"var(--accent)"}}>{focusAvg||"–"}</div>
            <div style={{fontSize:11,color:"var(--ink-3)"}}>평균 (5점)</div>
          </div>
        </div>
      )}
      {hasDiff && (
        <div className="card" style={{flex:1,minWidth:220}}>
          <div className="card-h"><h3>어려웠던 점</h3><span className="sub">응답 빈도</span></div>
          <div className="card-pad">
            {Object.keys(diffCount).length===0? <p style={{fontSize:12.5,color:"var(--ink-3)"}}>데이터 없음</p> :
              Object.entries(diffCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",gap:10,fontSize:12.5,padding:"4px 0",borderBottom:"1px solid var(--line)"}}>
                  <span style={{flex:1}}>{k}</span><b style={{flexShrink:0}}>{v}명</b>
                </div>
              ))}
          </div>
        </div>
      )}
      {hasText && (
        <div className="card" style={{flex:1,minWidth:220}}>
          <div className="card-h"><h3>학생 서술</h3><span className="sub">{texts.length}건</span></div>
          <div className="card-pad" style={{maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:7}}>
            {texts.length===0? <p style={{fontSize:12.5,color:"var(--ink-3)"}}>데이터 없음</p> :
              texts.map((x,i)=>(
                <div key={i} style={{background:"var(--surface-2)",borderRadius:8,padding:"7px 10px"}}>
                  <div style={{fontSize:10.5,color:"var(--ink-3)"}}>{x.name}</div>
                  <div style={{fontSize:12.5,lineHeight:1.5}}>{x.t}</div>
                </div>
              ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 응답 원본 보기 ---------- */
function FmSetResponses({db,setId}){
  const set=db.formative.sets.find(s=>s.id===setId);
  const cols=set.columns||[];
  const showCols=cols.filter(c=>c.role!=="ignore");
  const m=(set.cls||"").match(/(\d+)-(\d+)/);
  const grade=m?+m[1]:null, clsLabel=m?m[2]+"반":null;
  const list=db.students.filter(s=>s.grade===grade && s.cls===clsLabel).sort((a,b)=>a.no-b.no);
  return (
    <div className="card">
      <div className="card-h"><h3>응답 원본</h3><span className="sub">업로드된 그대로</span></div>
      <div className="scrollx">
        <table>
          <thead><tr><th style={{width:70}}>이름</th>
            {showCols.map(c=> <th key={c.idx} style={{fontSize:11,minWidth:90}}>{c.label||c.header}<br/><span style={{fontWeight:400,color:"var(--ink-3)",fontSize:10}}>{FM_ROLES.find(r=>r.v===c.role)?.t}{c.role==="cognitive"&&c.level?`·${c.level}`:""}</span></th>)}
          </tr></thead>
          <tbody>
            {list.filter(s=>set.results[s.id]).map(s=>{
              const r=set.results[s.id];
              return (
                <tr key={s.id}>
                  <td style={{fontWeight:600}}>{s.name}</td>
                  {showCols.map(c=>{
                    let v="";
                    if(c.role==="score") v=r.score??"";
                    else if(c.role==="focus") v=r.focus??"";
                    else if(c.role==="sid") v=s.sid;
                    else if(c.role==="name") v=r.name;
                    else if(c.role==="cognitive") v=r.answers?.[c.idx]??"";
                    else if(c.role==="difficulty") v=(r.difficulties||[]).join(", ");
                    else if(c.role==="text") v=(r.texts||[]).join(" / ");
                    return <td key={c.idx} style={{fontSize:11.5,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={String(v)}>{String(v)}</td>;
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ---------- 학생별 누적 (덩어리 2) ---------- */
function FmStudentHistory({db,update}){
  const sets=db.formative.sets||[];
  const grades=[...new Set(db.classInfo.map(c=>c.grade))].sort();
  const [grade,setGrade]=useState(grades[0]||1);
  const classesInGrade=db.classInfo.filter(c=>c.grade===grade).map(c=>c.cls);
  const [cls,setCls]=useState(classesInGrade[0]||"");
  const [selSid,setSelSid]=useState(null);
  const [photos]=useState(()=>loadPhotos());
  useEffect(()=>{ if(!classesInGrade.includes(cls)) setCls(classesInGrade[0]||""); },[grade]);

  const list=db.students.filter(s=>s.grade===grade && s.cls===cls).sort((a,b)=>a.no-b.no);
  const clsLabelFull=`${grade}-${(cls||"").replace("반","")}`;

  // 이 반을 대상으로 한 형성평가들 (시간순)
  const clsSets=sets.filter(s=>s.cls===clsLabelFull).sort((a,b)=>(a.date||"").localeCompare(b.date||""));

  // 학생별 응시 횟수
  function countFor(sid){ return clsSets.filter(s=>s.results&&s.results[sid]).length; }

  const detail = selSid? db.students.find(s=>s.id===selSid) : null;

  return (
    <div className="row" style={{alignItems:"flex-start",gap:14}}>
      <div className="card" style={{flex:"0 0 300px"}}>
        <div className="card-h" style={{gap:8,flexWrap:"wrap"}}>
          <h3>학생 선택</h3>
          <div className="seg">{grades.map(g=> <button key={g} className={grade===g?"on":""} onClick={()=>{setGrade(g);setSelSid(null);}}>{gradeLabel(g)}</button>)}</div>
          <div className="seg">{classesInGrade.map(c=> <button key={c} className={cls===c?"on":""} onClick={()=>{setCls(c);setSelSid(null);}}>{c}</button>)}</div>
        </div>
        <div className="card-pad" style={{paddingTop:6}}>
          <div style={{fontSize:11.5,color:"var(--ink-3)",marginBottom:8}}>{clsLabelFull} 형성평가 {clsSets.length}회</div>
          <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:460,overflowY:"auto"}}>
            {list.map(s=>{
              const n=countFor(s.id);
              const active=selSid===s.id;
              return (
                <div key={s.id} onClick={()=>setSelSid(s.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",borderRadius:8,cursor:"pointer",background:active?"var(--accent-soft)":"transparent"}}>
                  <Avatar student={s} photos={photos} size={28}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600}}>{s.no}. {s.name}</div>
                  </div>
                  <span className="pill gray" style={{fontSize:10.5}}>{n}회</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{flex:1,minWidth:0}}>
        {!detail ? (
          <div className="card"><div className="empty" style={{padding:"40px"}}><div className="big">📈</div><p>왼쪽에서 학생을 선택하면<br/>형성평가 누적 기록이 표시됩니다.</p></div></div>
        ) : (
          <FmStudentDetail db={db} update={update} student={detail} clsSets={clsSets}/>
        )}
      </div>
    </div>
  );
}

function FmStudentDetail({db,update,student,clsSets}){
  // 이 학생이 응시한 세트만
  const taken=clsSets.filter(s=>s.results&&s.results[student.id]).map(s=>({set:s, r:s.results[student.id]}));
  if(taken.length===0){
    return <div className="card"><div className="card-h"><h3>{student.name}</h3><span className="sub">{student.cls}</span></div>
      <div className="card-pad"><p style={{fontSize:13,color:"var(--ink-3)"}}>아직 이 학생의 형성평가 응답이 없습니다.</p></div></div>;
  }

  // 점수 추이 (score 있는 것만)
  const scoreSeq=taken.filter(t=>t.r.score!=null).map(t=>({date:t.set.date,title:t.set.title,v:t.r.score}));
  // 집중도 추이
  const focusSeq=taken.filter(t=>t.r.focus!=null).map(t=>({date:t.set.date,title:t.set.title,v:t.r.focus}));
  // 어려운 점 누적 빈도
  const diffCount={};
  taken.forEach(t=>(t.r.difficulties||[]).forEach(d=>{ diffCount[d]=(diffCount[d]||0)+1; }));
  // 피드백/서술 시간순
  const notes=[];
  taken.forEach(t=>{
    if(t.r.feedback) notes.push({date:t.set.date,title:t.set.title,type:"피드백",text:t.r.feedback});
    (t.r.texts||[]).forEach(tx=>notes.push({date:t.set.date,title:t.set.title,type:"학생 서술",text:tx}));
  });
  notes.sort((a,b)=>(a.date||"").localeCompare(b.date||""));

  return (
    <div className="grid" style={{gap:14}}>
      <div className="card">
        <div className="card-h"><h3>{student.name}</h3><span className="sub">{student.cls} · 형성평가 {taken.length}회 응시</span></div>
        <div className="card-pad">
          {/* 점수 추이 */}
          {scoreSeq.length>0 && (
            <div style={{marginBottom:18}}>
              <div className="fld" style={{marginBottom:8}}>점수 추이</div>
              <MiniTrend data={scoreSeq} color="var(--accent)" suffix="점"/>
            </div>
          )}
          {/* 집중도 추이 */}
          {focusSeq.length>0 && (
            <div>
              <div className="fld" style={{marginBottom:8}}>집중도 추이 (5점)</div>
              <MiniTrend data={focusSeq} color="#a8651d" max={5} suffix=""/>
            </div>
          )}
          {scoreSeq.length===0 && focusSeq.length===0 && <p style={{fontSize:12.5,color:"var(--ink-3)"}}>점수·집중도 데이터가 없습니다.</p>}
        </div>
      </div>

      {/* 어려운 점 누적 */}
      {Object.keys(diffCount).length>0 && (
        <div className="card">
          <div className="card-h"><h3>자주 어려워한 점</h3><span className="sub">누적 빈도</span></div>
          <div className="card-pad">
            {Object.entries(diffCount).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",gap:10,fontSize:12.5,padding:"5px 0",borderBottom:"1px solid var(--line)"}}>
                <span style={{flex:1}}>{k}</span><b style={{flexShrink:0,color:v>=2?"var(--danger)":"var(--ink-2)"}}>{v}회</b>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 피드백·서술 시간순 */}
      <div className="card">
        <div className="card-h"><h3>피드백 · 서술 기록</h3><span className="sub">{notes.length}건 · 시간순</span></div>
        <div className="card-pad">
          {notes.length===0 ? <p style={{fontSize:12.5,color:"var(--ink-3)"}}>기록이 없습니다. 결과·피드백 탭에서 피드백을 남기면 여기 누적됩니다.</p> : (
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {notes.map((n,i)=>(
                <div key={i} style={{background:"var(--surface-2)",borderRadius:8,padding:"9px 12px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:10.5,color:"var(--ink-3)"}}>{fmtMD(n.date)}</span>
                    <span className="pill" style={{fontSize:10,background:n.type==="피드백"?"var(--accent-soft)":"var(--surface)",color:n.type==="피드백"?"var(--accent-ink)":"var(--ink-3)"}}>{n.type}</span>
                    <span style={{fontSize:10.5,color:"var(--ink-3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</span>
                  </div>
                  <div style={{fontSize:13,lineHeight:1.5}}>{n.text}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- 미니 추이 그래프 (SVG) ---------- */
function MiniTrend({data, color, max, suffix}){
  if(!data||data.length===0) return null;
  const vals=data.map(d=>d.v);
  const hi=max||Math.max(...vals, 1);
  const lo=0;
  const W=Math.max(data.length*70, 200), H=120, pad=24;
  const x=i=> data.length===1? W/2 : pad + i*((W-2*pad)/(data.length-1));
  const y=v=> H-pad - ((v-lo)/(hi-lo))*(H-2*pad);
  const pts=data.map((d,i)=>`${x(i)},${y(d.v)}`).join(" ");
  return (
    <div className="scrollx">
      <svg width={W} height={H} style={{display:"block"}}>
        {data.length>1 && <polyline points={pts} fill="none" stroke={color} strokeWidth="2"/>}
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={x(i)} cy={y(d.v)} r="4" fill={color}/>
            <text x={x(i)} y={y(d.v)-9} textAnchor="middle" fontSize="11" fontWeight="700" fill={color}>{d.v}{suffix}</text>
            <text x={x(i)} y={H-7} textAnchor="middle" fontSize="10" fill="var(--ink-3)">{fmtMD(d.date)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

const PORT_GRADE_VAL = {A:3, B:2, C:1}; // 고정 환산값

// 포트폴리오: 학생의 그레이드 합산 → 환산점수
function portfolioRawScore(grades, sheetCount){
  let sum=0;
  for(let i=1;i<=sheetCount;i++){ const g=grades&&grades[i]; if(g&&PORT_GRADE_VAL[g]!=null) sum+=PORT_GRADE_VAL[g]; }
  return sum;
}
// 환산점수 → 급간 최종점수
function portfolioFinal(raw, bands){
  for(const b of bands){ if(raw>=b.min) return b.score; }
  return bands.length? bands[bands.length-1].score : 0;
}
// 학생 한 명의 수행평가 총점
function perfTotal(perf, sid){
  const a=perf.areas;
  let total=0, parts={};
  // 문제해결력
  const p=a.problem.scores[sid]; parts.problem = (p!=null?Number(p):null);
  if(p!=null) total+=Number(p);
  // 주제글쓰기
  const t=a.topic.scores[sid]; parts.topic = (t!=null?Number(t):null);
  if(t!=null) total+=Number(t);
  // 포트폴리오
  const grades=a.portfolio.grades[sid];
  if(grades && Object.keys(grades).length>0){
    const raw=portfolioRawScore(grades, a.portfolio.sheetCount);
    const fin=portfolioFinal(raw, a.portfolio.bands);
    parts.portfolio=fin; parts.portfolioRaw=raw; total+=fin;
  } else { parts.portfolio=null; }
  return {total, parts};
}

/* ---------- 학생 전 영역 데이터 수집 (종합카드·세특 공용) ---------- */
function collectStudentData(db, student){
  const sid=student.id;
  const att={present:0,late:0,absent:0,excused:0,total:0};
  Object.values(db.attendance||{}).forEach(day=>{ const v=day[sid]; if(v){att.total++; att[v]=(att[v]||0)+1;} });

  const examData=(db.exams||[]).filter(ex=>ex.scores&&ex.scores[sid]).map(ex=>{
    const sc=ex.scores[sid];
    const score=studentScore(ex,sc); const max=examMax(ex);
    const bands=examBands(ex,db);
    const g=score!=null?gradeOf(score,bands):null;
    const byUnit={};
    if(sc.mode==="item" && ex.items){
      ex.items.forEach(it=>{
        const u=it.unit||"기타";
        byUnit[u]=byUnit[u]||{correct:0,total:0};
        byUnit[u].total++; if(sc.marks&&sc.marks[it.no])byUnit[u].correct++;
      });
    }
    const units=Object.entries(byUnit).map(([u,d])=>({unit:u,rate:d.total?d.correct/d.total:0,...d}));
    const strong=units.filter(u=>u.rate>=0.8).sort((a,b)=>b.rate-a.rate);
    const weak=units.filter(u=>u.rate<0.5).sort((a,b)=>a.rate-b.rate);
    return {ex,score,max,g,strong,weak,units};
  });

  const perf=db.perf;
  const perfRes=perf?perfTotal(perf,sid):null;
  const topicContent=perf&&perf.areas.topic.contents?perf.areas.topic.contents[sid]:null;

  const obsAgg={colearn:0,present:0,question:0,memos:[]};
  Object.entries(db.obs||{}).forEach(([k,o])=>{
    const [d,osid]=k.split("|"); if(osid!==sid) return;
    if(o.colearn)obsAgg.colearn++; if(o.present)obsAgg.present++; if(o.question)obsAgg.question++;
    if(o.memo)obsAgg.memos.push({date:d,memo:o.memo});
  });
  obsAgg.memos.sort((a,b)=>a.date.localeCompare(b.date));

  const fmTaken=(db.formative?.sets||[]).filter(s=>s.results&&s.results[sid]).map(s=>({set:s,r:s.results[sid]})).sort((a,b)=>(a.set.date||"").localeCompare(b.set.date||""));
  const fmScores=fmTaken.filter(t=>t.r.score!=null).map(t=>t.r.score);
  const fmDiff={}; fmTaken.forEach(t=>(t.r.difficulties||[]).forEach(d=>fmDiff[d]=(fmDiff[d]||0)+1));
  const fmFeedbacks=[]; fmTaken.forEach(t=>{ if(t.r.feedback)fmFeedbacks.push({date:t.set.date,title:t.set.title,text:t.r.feedback}); });

  return {att,examData,perf,perfRes,topicContent,obsAgg,fmTaken,fmScores,fmDiff,fmFeedbacks};
}

/* ---------- 역량 추측 (수학 교과역량 5: 내부 태그용) ---------- */
// data 기반으로 드러난 역량 코드 목록 반환. 문장엔 이름을 넣지 않고 내용으로만 표현.
function inferCompetencies(D){
  const tags=new Set();
  // 연결: 주제글에 실생활/타교과 키워드
  const topicText=((D.topicContent?.topic||"")+" "+(D.topicContent?.text||""));
  if(/실생활|생활|일상|연결|응용|활용|타교과|과학|경제|사회|예술/.test(topicText)) tags.add("연결");
  // 정보처리: 자료 수집/정리/분석
  if(/자료|데이터|수집|정리|분석|그래프|표|조사|통계/.test(topicText)) tags.add("정보처리");
  // 추론: 증명/설명/유도/일반화
  if(/증명|설명|유도|일반화|원리|이유|논리/.test(topicText)) tags.add("추론");
  // 의사소통: 발표·질문·코러닝 관찰
  if(D.obsAgg.present>0||D.obsAgg.question>0||D.obsAgg.colearn>0) tags.add("의사소통");
  // 문제해결: 문제해결력 점수 높음 or 지필 강점
  if(D.perfRes&&D.perfRes.parts&&D.perfRes.parts.problem!=null){
    const pr=D.perfRes.parts.problem, pm=D.perf?.areas?.problem?.max||15;
    if(pr/pm>=0.7) tags.add("문제해결");
  }
  if(D.examData.some(e=>e.strong.length>0)) tags.add("문제해결");
  return [...tags];
}

/* ---------- 세특 문형 조합 (두괄식 4단) ---------- */
// 받침 유무에 따라 조사 자동 선택
function josa(word, withBatchim, withoutBatchim){
  if(!word) return withoutBatchim;
  const last=word.charCodeAt(word.length-1);
  if(last<0xAC00||last>0xD7A3) return withoutBatchim; // 한글 아니면 받침없음 취급
  const hasBatchim=(last-0xAC00)%28!==0;
  return hasBatchim?withBatchim:withoutBatchim;
}
// 역량 이름은 문장에 넣지 않고 '내용'으로만 표현. 데이터 없는 단은 건너뜀.
function buildSebteuk(D, opts){
  opts=opts||{};
  const verb=opts.verb||"탐구하여"; const output=opts.output||"보고서로 작성함";
  const order=opts.order||"lead"; // lead=두괄식, base=기본순
  const tags=inferCompetencies(D);

  // --- 리드 문장: 가장 두드러진 특성 + 대표활동 ---
  let lead="";
  const topic=D.topicContent?.topic;
  // 특성 어구 (역량 태그 → 내용 표현, 이름 직접 언급 안 함)
  const traitMap={
    "연결":"수학 개념을 실생활 현상과 연결하는 데 강점을 보이는",
    "정보처리":"자료를 수집·정리하여 해석하는 능력이 돋보이는",
    "추론":"수학적 원리를 논리적으로 따져 이해하려는",
    "의사소통":"자신의 생각을 수학적으로 표현하고 나누는 데 적극적인",
    "문제해결":"주어진 문제를 합리적으로 해결하는 능력이 우수한",
  };
  const primaryTrait = tags.length? traitMap[tags[0]] : "수학 학습에 성실히 임하는";
  if(topic){
    lead=`${primaryTrait} 학생으로, 「${topic}」${josa(topic,"을","를")} 주제로 ${verb} ${output}.`;
  } else {
    lead=`${primaryTrait} 학생임.`;
  }

  // --- 전개: 수행 활동 상세 (주제글 내용 있을 때만) ---
  let develop="";
  if(D.topicContent?.text){
    develop=D.topicContent.text.trim();
    if(!/[.。]$/.test(develop)) develop+=".";
  }

  // --- 학업 기반: 성취수준 (지필 강점 단원 → 성취기준 마스터 서술) ---
  let academic="";
  if(D.examData.length){
    const allStrong=[...new Set(D.examData.flatMap(e=>e.strong.map(u=>u.unit)))];
    const allWeak=[...new Set(D.examData.flatMap(e=>e.weak.map(u=>u.unit)))];
    if(allStrong.length){
      academic=`${allStrong.slice(0,3).join(", ")} 단원의 개념과 성질을 정확히 이해하여 문제 해결에 적용함.`;
    } else if(D.examData[0].score!=null){
      academic=`지필평가에서 ${D.examData[0].g?D.examData[0].g.grade+"수준의 ":""}성취를 보임.`;
    }
  }

  // --- 성장·태도: 형성 추이 + 관찰 ---
  let growth="";
  const parts=[];
  if(D.obsAgg.colearn>0||D.obsAgg.present>0){
    if(D.obsAgg.colearn>=2) parts.push("모둠활동에서 동료와 협력하며 풀이 과정을 함께 나눔");
    else if(D.obsAgg.present>0) parts.push("수업 중 발표에 적극적으로 참여함");
  }
  if(D.fmScores.length>=2){
    const first=D.fmScores[0], last=D.fmScores[D.fmScores.length-1];
    if(last>first) parts.push("형성평가에서 점수가 꾸준히 향상되어 성실한 학습 태도가 나타남");
    else parts.push("형성평가에 꾸준히 참여하며 학습을 점검함");
  }
  // 어미 자연 연결: 마지막 항목만 종결, 앞 항목은 '~하고,'로 연결
  if(parts.length){
    if(parts.length===1){ growth=parts[0]+"."; }
    else {
      const head=parts.slice(0,-1).map(p=>p.replace(/함$/,"하고").replace(/나눔$/,"나누고").replace(/참여함$/,"참여하고"));
      growth=head.join(", ")+", "+parts[parts.length-1]+".";
    }
  }

  // 조합
  const segs={lead,develop,academic,growth};
  let sentences;
  if(order==="lead"){
    sentences=[segs.lead,segs.develop,segs.academic,segs.growth];
  } else {
    sentences=[segs.academic,segs.develop,segs.growth,segs.lead];
  }
  const text=sentences.filter(s=>s&&s.trim()).join(" ").replace(/\s+/g," ").trim();
  return {text, segs, tags};
}
